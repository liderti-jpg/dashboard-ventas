<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financiero — Jota Mundial SAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F8FC;--bg2:#FFFFFF;--bg3:#EEF1F8;--bg4:#E4E9F5;
  --navy:#0B1F4A;--navy2:#1A3A6E;--navy3:#2E5199;
  --blue:#3B6FD4;--blue2:#5B8FE8;--blue3:#EAF0FD;
  --gold:#B8860B;--gold2:#D4A017;--gold3:#FFF8E7;
  --text:#0B1F4A;--text2:#3D5280;--text3:#7A90B8;--text4:#A8BAD8;
  --border:#D8E2F5;--border2:#EEF1F8;
  --green:#0A7A5A;--green2:#E6F7F2;
  --red:#C0392B;--red2:#FDECEA;
  --orange:#D97706;--orange2:#FEF3C7;
  --shadow:0 2px 16px rgba(11,31,74,.07);
  --shadow2:0 8px 40px rgba(11,31,74,.12);
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:var(--navy);padding:0 36px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(11,31,74,.25)}
.hlogo{display:flex;align-items:center;gap:14px}
.logo-ic{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:14px;color:#fff;box-shadow:0 4px 12px rgba(180,130,0,.3);flex-shrink:0}
.logo-nm{font-size:14px;font-weight:700;color:#fff}
.logo-sb{font-size:9px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:1px}
.hdiv{width:1px;height:26px;background:rgba(255,255,255,.12);margin:0 6px}
.htitle{font-size:11px;color:rgba(255,255,255,.4)}
.hright{display:flex;align-items:center;gap:10px}
.badge-live{display:none;align-items:center;gap:5px;background:rgba(10,122,90,.25);border:1px solid rgba(10,122,90,.4);border-radius:20px;padding:4px 11px;font-size:10px;font-weight:600;color:#4ECBA8}
.dot-live{width:6px;height:6px;border-radius:50%;background:#4ECBA8;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-ref{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:var(--rs);padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;box-shadow:0 4px 12px rgba(180,130,0,.25)}
.btn-ref:hover{opacity:.9;transform:translateY(-1px)}
.btn-ref:disabled{opacity:.5;cursor:not-allowed;transform:none}
#ts{font-size:10px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}

/* TICKER */
.ticker-wrap{background:var(--navy2);border-bottom:1px solid rgba(255,255,255,.08);height:36px;overflow:hidden;position:sticky;top:64px;z-index:99}
.ticker-inner{display:flex;align-items:center;height:100%;white-space:nowrap}
.ticker-label{background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:0 14px;height:100%;display:flex;align-items:center;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;z-index:2}
.ticker-track{overflow:hidden;flex:1;position:relative}
.ticker-content{display:inline-flex;animation:ticker 40s linear infinite;gap:0}
.ticker-content:hover{animation-play-state:paused}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 28px;font-size:11px;color:rgba(255,255,255,.75);border-right:1px solid rgba(255,255,255,.1)}
.ticker-item strong{color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px}
.ticker-item .up{color:#4ECBA8}
.ticker-item .dn{color:#FF6B6B}
.ticker-sep{color:rgba(255,255,255,.2);padding:0 6px}

/* MAIN */
.main{padding:24px 36px;max-width:1700px;margin:0 auto}
@media(max-width:700px){.main{padding:12px}}

/* BREADCRUMB */
.bcb{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:11px;color:var(--text3);font-weight:500}
.bcb a{color:var(--text3);text-decoration:none}.bcb a:hover{color:var(--navy)}
.bcs{color:var(--text4)}.bcc{color:var(--navy);font-weight:600}

/* PERIODO */
.psec{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
.psec-title{font-size:10px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;width:100%}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.fg select{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 10px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;min-width:120px;outline:none;transition:border .2s}
.fg select:focus{border-color:var(--blue);background:#fff}
.ba{background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;height:34px;transition:all .2s}
.ba:hover{background:var(--navy2)}

/* MODO SELECTOR */
.modo-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.modo-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.modo-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);font-family:'Inter',sans-serif;transition:all .2s}
.modo-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* TABS */
.vtabs{display:flex;gap:3px;margin-bottom:18px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:4px;width:fit-content;box-shadow:var(--shadow);flex-wrap:wrap}
.vt{padding:7px 16px;border-radius:9px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.vt.active{background:var(--navy);color:#fff;box-shadow:0 3px 10px rgba(11,31,74,.18)}
.vt:not(.active):hover{background:var(--bg3);color:var(--navy)}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--navy));opacity:0;transition:opacity .2s}
.kpi:hover{border-color:var(--blue2);transform:translateY(-2px);box-shadow:var(--shadow2)}
.kpi:hover::after{opacity:1}
.kpi-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;margin-bottom:7px}
.kpi-blue{background:var(--blue3)}.kpi-green{background:var(--green2)}.kpi-gold{background:var(--gold3)}.kpi-red{background:var(--red2)}.kpi-orange{background:var(--orange2)}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:3px}
.kpi-val{font-size:16px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;line-height:1.1;margin-bottom:2px;word-break:break-all}
.kpi-sub{font-size:10px;color:var(--text3);line-height:1.3}
.kpi-ch{font-size:10px;font-weight:600;margin-top:4px;display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:20px}
.up{color:var(--green);background:var(--green2)}.down{color:var(--red);background:var(--red2)}.neutral{color:var(--text3);background:var(--bg3)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(11,31,74,.5);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.open{opacity:1;pointer-events:all}
.mc{background:#fff;border:1.5px solid var(--border);border-radius:22px;padding:28px;width:88%;max-width:440px;position:relative;transform:translateY(20px);transition:transform .25s;box-shadow:0 24px 80px rgba(11,31,74,.18)}
.mo.open .mc{transform:translateY(0)}
.mcl{position:absolute;top:12px;right:12px;background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mcl:hover{background:var(--bg4);color:var(--navy)}
.mv{font-size:32px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy);line-height:1.1;margin:6px 0;word-break:break-all}
.mn{display:flex;gap:8px;margin-top:16px}
.mn button{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:9px;color:var(--navy);cursor:pointer;font-size:15px;transition:all .2s;font-weight:600}
.mn button:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.mdts{display:flex;justify-content:center;gap:5px;margin-top:10px}
.mdt{width:6px;height:6px;border-radius:50%;background:var(--bg4);transition:all .2s}
.mdt.active{background:var(--navy);width:20px;border-radius:3px}
.mc-prog{height:3px;background:var(--bg4);border-radius:3px;margin-top:12px;overflow:hidden}
.mc-prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:3px;transition:width .3s}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.gf{margin-bottom:12px}
@media(max-width:1100px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.g2,.g3{grid-template-columns:1fr}}

/* CARD */
.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.ct{font-size:9px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.1px;margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ct-line{flex:1;height:1px;background:var(--border2);min-width:20px}
.cw{position:relative}
.h200{height:200px}.h240{height:240px}.h260{height:260px}.h280{height:280px}.h300{height:300px}.h320{height:320px}

/* NOTA DE MODO */
.modo-nota{background:var(--blue3);border:1px solid var(--blue2);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--navy3);margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* P&G TABLE */
.pyg{width:100%}
.pyg-hdr{display:flex;padding:4px 10px;margin-bottom:4px}
.pyg-hdr span{font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.7px}
.pyg-section{margin-bottom:6px}
.pyg-sec-title{font-size:9px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;background:var(--bg3);padding:5px 10px;border-radius:5px;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.pyg-row{display:flex;align-items:center;padding:4px 10px;border-radius:5px;transition:background .12s}
.pyg-row:hover{background:var(--blue3)}
.pn{flex:1;font-size:11px;color:var(--text2)}
.pv{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;min-width:130px}
.pa{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);text-align:right;min-width:130px}
.pp{font-size:9px;color:var(--text3);text-align:right;min-width:50px}
.pyg-sub{background:var(--blue3);border-radius:6px;padding:5px 10px;display:flex;align-items:center;margin:3px 0}
.pyg-sub .pn{font-weight:700;color:var(--navy);font-size:11px}
.pyg-sub .pv{font-weight:700;color:var(--navy)}
.pyg-tot{background:var(--navy);border-radius:7px;padding:7px 12px;display:flex;align-items:center;margin-top:5px}
.pyg-tot .pn{font-weight:700;color:#fff;font-size:12px}
.pyg-tot .pv{font-weight:700;color:#fff;font-size:13px}
.pyg-tot .pa{color:rgba(255,255,255,.6);font-size:11px}
.pyg-tot .pp{color:rgba(255,255,255,.4)}

/* BALANCE */
.bal-grp-title{background:var(--navy);border-radius:7px;padding:6px 12px;display:flex;justify-content:space-between;margin-bottom:3px;color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bal-sub{background:var(--bg3);padding:4px 12px;display:flex;justify-content:space-between;border-radius:4px;margin-bottom:2px;font-size:9px;font-weight:700;color:var(--navy3);text-transform:uppercase}
.bal-row{display:flex;justify-content:space-between;padding:3px 12px;border-radius:5px;transition:background .12s}
.bal-row:hover{background:var(--blue3)}
.bal-nm{font-size:11px;color:var(--text2)}
.bal-vl{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--navy);font-weight:600}
.bal-tot{background:var(--gold3);border:1.5px solid var(--gold2);border-radius:7px;padding:7px 12px;display:flex;justify-content:space-between;margin-top:8px}
.bal-tot-nm{font-size:12px;font-weight:700;color:var(--navy)}
.bal-tot-vl{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--gold)}

/* INDICADORES */
.ind-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.ind{background:#fff;border:1.5px solid var(--border);border-radius:var(--rs);padding:13px;box-shadow:var(--shadow)}
.ind-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px}
.ind-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy);margin-bottom:1px}
.ind-ref{font-size:9px;color:var(--text3)}
.ind-bar{height:3px;background:var(--bg4);border-radius:3px;margin-top:5px;overflow:hidden}
.ind-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--navy);color:#fff;padding:7px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:right}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 10px;font-size:11px;border-bottom:1px solid var(--border2);text-align:right}
.tbl td:first-child{text-align:left;color:var(--text2)}
.tbl tr:last-child td{background:var(--navy);color:#fff;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:12px}
.tbl tr:hover:not(:last-child) td{background:var(--blue3)}
.tbl .mono{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--navy)}

/* TAG */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.tag-blue{background:var(--blue3);color:var(--navy3)}.tag-green{background:var(--green2);color:var(--green)}
.tag-red{background:var(--red2);color:var(--red)}.tag-gold{background:var(--gold3);color:var(--gold)}

/* LOADING */
.loading{text-align:center;padding:70px 20px;color:var(--text3);font-size:13px}
.ls{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red2);border:1.5px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:13px 16px;color:var(--red);font-size:13px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;width:200px;margin:8px auto}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:4px;transition:width .3s}
</style>
</head>
<body>

<!-- MODAL KPI -->
<div class="mo" id="kpiMo" onclick="closeMo(event)">
  <div class="mc">
    <button class="mcl" onclick="closeMoBtn()">✕</button>
    <div id="ml" style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px"></div>
    <div id="mv" class="mv"></div>
    <div id="ms" style="font-size:12px;color:var(--text2);margin-top:3px"></div>
    <div id="mc2" style="margin-top:5px"></div>
    <div class="mc-prog"><div class="mc-prog-fill" id="mc-pf"></div></div>
    <div class="mn"><button onclick="sk(-1)">←</button><button onclick="sk(1)">→</button></div>
    <div class="mdts" id="mdts"></div>
    <div style="margin-top:10px;font-size:10px;color:var(--text4);text-align:center">← → teclado · desliza · toca fuera para cerrar</div>
  </div>
</div>

<header>
  <div class="hlogo">
    <div class="logo-ic">JM</div>
    <div><div class="logo-nm">JOTA MUNDIAL SAS</div><span class="logo-sb">Dashboard Financiero</span></div>
    <div class="hdiv"></div>
    <span class="htitle">SIESA SBS · PUC Colombia</span>
  </div>
  <div class="hright">
    <span id="ts"></span>
    <div class="badge-live" id="bl"><span class="dot-live"></span>EN VIVO</div>
    <button class="btn-ref" id="br" onclick="cargar()">↻ Actualizar</button>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-inner">
    <div class="ticker-label">📊 LIVE</div>
    <div class="ticker-track">
      <div class="ticker-content" id="tkc">
        <span class="ticker-item">Cargando datos...</span>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="bcb">
    <a href="https://liderti-jpg.github.io/dashboard-ventas/">Ventas</a>
    <span class="bcs">›</span>
    <a href="https://liderti-jpg.github.io/dashboard-ventas/dashboard-productos.html">Productos</a>
    <span class="bcs">›</span>
    <span class="bcc" id="bcVista">Resumen Financiero</span>
  </div>

  <!-- PERIODO + MODO -->
  <div class="psec">
    <div class="psec-title">📅 Período de análisis</div>
    <div class="fg"><label>Año</label>
      <select id="fano">
        <option value="2026" selected>2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>
    </div>
    <div class="fg"><label>Mes</label>
      <select id="fmes">
        <option value="1">Enero</option><option value="2">Febrero</option>
        <option value="3" selected>Marzo</option><option value="4">Abril</option>
        <option value="5">Mayo</option><option value="6">Junio</option>
        <option value="7">Julio</option><option value="8">Agosto</option>
        <option value="9">Septiembre</option><option value="10">Octubre</option>
        <option value="11">Noviembre</option><option value="12">Diciembre</option>
      </select>
    </div>
    <button class="ba" onclick="ap()">Aplicar</button>
    <div class="modo-wrap">
      <span class="modo-label">Modo P&G:</span>
      <button class="modo-btn active" id="modoMes" onclick="setModo('mes')">Solo mes</button>
      <button class="modo-btn" id="modoAcum" onclick="setModo('acum')">Acumulado año</button>
      <button class="modo-btn" id="modoAmbos" onclick="setModo('ambos')">Ambos</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="vtabs">
    <button class="vt active" onclick="sv('r',this)">📊 Resumen</button>
    <button class="vt" onclick="sv('pyg',this)">📋 P&G</button>
    <button class="vt" onclick="sv('bal',this)">⚖️ Balance</button>
    <button class="vt" onclick="sv('ind',this)">🎯 Indicadores</button>
    <button class="vt" onclick="sv('tend',this)">📈 Tendencia</button>
    <button class="vt" onclick="sv('comp',this)">🔄 Comparativo</button>
  </div>

  <div id="ct"><div class="loading"><div class="ls"></div>Conectando con SIESA…</div></div>
</div>

<script>
const WH='https://jotamundial2.app.n8n.cloud/webhook/financiero';
const MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MF=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ── HELPERS ──────────────────────────────────────────────
const fCOP=v=>{
  if(v===null||v===undefined||isNaN(v))return'—';
  const s=Math.abs(v);
  let r;
  if(s>=1e12)r=(v/1e12).toFixed(2)+'B';
  else if(s>=1e9)r=(v/1e9).toFixed(2)+'MM';
  else if(s>=1e6)r=(v/1e6).toFixed(1)+'M';
  else if(s>=1e3)r=(v/1e3).toFixed(0)+'K';
  else r=Math.round(s).toLocaleString('es-CO');
  return(v<0?'-$':'$')+r;
};
const fFull=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(v||0);
const fPct=v=>v===null||isNaN(v)?'—':(v>=0?'+':'')+v.toFixed(1)+'%';
const pObj=(a,b)=>{
  if(!b||b===0)return{t:'—',c:'neutral'};
  const p=((a-b)/Math.abs(b)*100);
  return{t:(p>=0?'▲ +':'▼ ')+Math.abs(p).toFixed(1)+'%',c:p>=0?'up':'down'};
};
const pHtml=(a,b)=>{const o=pObj(a,b);return`<span class="tag tag-${o.c==='up'?'green':o.c==='down'?'red':'blue'}">${o.t}</span>`;};
const setModo=m=>{modoPyG=m;['mes','acum','ambos'].forEach(x=>document.getElementById('modo'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===m));ap()};

// ── TRM ───────────────────────────────────────────────────
async function fetchTRM(){
  try{
    const r=await fetch('https://www.datos.gov.co/resource/32sa-8pi3.json?$limit=1&$order=vigenciadesde DESC',{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d&&d[0]){trm=parseFloat(d[0].valor);return trm;}
  }catch(e){}
  // Fallback: valor aproximado
  trm=4180;
  return trm;
}

    {lbl:'Utilidad op. '+MN[mes],val:fFull(fin.utilOp),cls:fin.utilOp>=0?'up':'dn'},
    {lbl:'Utilidad neta '+MN[mes],val:fFull(fin.utilNeta),cls:fin.utilNeta>=0?'up':'dn'},
    {lbl:'Margen bruto',val:fPct(fin.margenBruto),cls:fin.margenBruto>=20?'up':'dn'},

    {lbl:'Activo total',val:fFull(fin.activo),cls:''},
    {lbl:'Pasivo total',val:fFull(fin.pasivo),cls:''},
    {lbl:'Patrimonio',val:fFull(fin.patrimonio),cls:''},
    {lbl:'Endeudamiento',val:fPct(fin.endeudamiento),cls:fin.endeudamiento<=70?'up':'dn'},

// ── CARGA PAGINADA ────────────────────────────────────────
async function fetchPag(p){
  const r=await fetch(`${WH}?pagina=${p}`,{signal:AbortSignal.timeout(60000)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
async function cargar(){
  const btn=document.getElementById('br');btn.disabled=true;btn.textContent='⏳';
  setLoad('Conectando con SIESA…',0,0);
  fetchTRM();
  try{
    const p1=await fetchPag(1);
    const tot=p1?.total_páginas||p1?.total_paginas||1;
    let all=p1?.Datos||[];
    setLoad(`Cargando datos contables… (${all.length} de ${p1?.total_registros||0})`,1,tot);
    for(let p=2;p<=tot;p+=5){
      const ps=[];
      for(let pp=p;pp<p+5&&pp<=tot;pp++)ps.push(fetchPag(pp));
      const rs=await Promise.all(ps);
      for(const r of rs)all=all.concat(r?.Datos||[]);
      setLoad(`Cargando… (${all.length} de ${p1?.total_registros||0})`,Math.min(p+4,tot),tot);
    }
    raw=all.map(r=>({...r,
      nombre_cuenta:(r.nombre_cuenta||'').trim(),
      codigo_mayor:(r.codigo_mayor||'').trim()
    }));
    document.getElementById('ts').textContent=new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('bl').style.display='flex';
    ap();
  }catch(e){
    document.getElementById('ct').innerHTML=`<div class="err">❌ ${e.message}<br><small style="margin-top:5px;display:block">Verifica que el webhook n8n "financiero" esté activo.</small><br><button onclick="cargar()" style="margin-top:8px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:7px 16px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">↻ Reintentar</button></div>`;
  }finally{btn.disabled=false;btn.textContent='↻ Actualizar'}
}
function setLoad(msg,p,t){
  const pct=t>0?Math.round((p/t)*100):0;
  document.getElementById('ct').innerHTML=`<div class="loading"><div class="ls"></div><div>${msg}</div>${t>0?`<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><small style="color:var(--text4);font-size:10px">Página ${p} de ${t}</small>`:''}</div>`;
}

// ── PERÍODO ───────────────────────────────────────────────
const getPer=()=>parseInt(`${+document.getElementById('fano').value}${String(+document.getElementById('fmes').value).padStart(2,'0')}`);
const getAno=()=>+document.getElementById('fano').value;
const getMes=()=>+document.getElementById('fmes').value;
const getAcumPers=()=>{const a=getAno(),m=getMes();return Array.from({length:m},(_,i)=>parseInt(`${a}${String(i+1).padStart(2,'0')}`));};
const filPer=(data,ps)=>data.filter(r=>(Array.isArray(ps)?ps:[ps]).includes(r.periodo));

// ═══════════════════════════════════════════════════════
// CÁLCULOS FINANCIEROS — LÓGICA PUC COLOMBIA CORRECTA
//
// BALANCE (acumulado histórico):
//   Activos  (1): saldo_final = saldo_inicial + debitos - creditos
//   Pasivos  (2): saldo_final = saldo_inicial + creditos - debitos → valor positivo = deuda
//   Patrimonio(3): igual que pasivos
//
// P&G (solo movimientos del período seleccionado):
//   Ingresos (4,41): creditos - debitos   → positivo = ingreso real del mes
//   Devoluciones (417501): debitos - creditos → positivo = descuento del ingreso
//   Ingresos no op (42): creditos - debitos
//   Costos (6): debitos - creditos        → positivo = costo real del mes
//   Gastos (5): debitos - creditos        → positivo = gasto real del mes
// ═══════════════════════════════════════════════════════
function getFinanciero(datos){
  const byKey={};
  datos.forEach(r=>{
    const k=`${r.grupo}|${r.subgrupo}|${r.codigo_mayor||r.nombre_cuenta}`;
    if(!byKey[k])byKey[k]={...r,saldo_inicial:0,debitos:0,creditos:0};
    byKey[k].saldo_inicial+=r.saldo_inicial;
    byKey[k].debitos+=r.debitos;
    byKey[k].creditos+=r.creditos;
  });
  const rows=Object.values(byKey);

  // ── P&G: usar SOLO debitos y creditos del período ──
  const R=g=>rows.filter(r=>r.grupo===g);
  const RS=(g,s)=>rows.filter(r=>r.grupo===g&&r.subgrupo===s);
  const RC=c=>rows.filter(r=>r.codigo_mayor===c);

  // Ingresos operacionales brutos (41 sin 417501)
  const ing41rows=rows.filter(r=>r.grupo==='4'&&r.subgrupo==='41'&&r.codigo_mayor!=='417501');
  const devRows=RC('417501');
  const ing42rows=RS('4','42');

  const ingBruto=ing41rows.reduce((s,r)=>s+(r.creditos-r.debitos),0);
  const devol=devRows.reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const ingOpNeto=ingBruto-devol;
  const ingNoOp=ing42rows.reduce((s,r)=>s+(r.creditos-r.debitos),0);

  // Costos
  const cosTotal=R('6').reduce((s,r)=>s+(r.debitos-r.creditos),0);

  // Utilidades
  const utilBruta=ingOpNeto-cosTotal;

  // Gastos
  const gastoAdmon=RS('5','51').reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const gastoVentas=RS('5','52').reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const gastoNoOp=RS('5','53').reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const impRenta=RS('5','54').reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const gastoOp=gastoAdmon+gastoVentas;

  const utilOp=utilBruta-gastoOp;
  const utilAntImp=utilOp+ingNoOp-gastoNoOp;
  const utilNeta=utilAntImp-impRenta;

  // ── Balance: usar saldo_inicial + movimientos del período ──
  const sf1=(g,sg)=>{
    const r2=sg?RS(g,sg):R(g);
    return r2.reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  };
  const sf2=(g,sg)=>{
    const r2=sg?RS(g,sg):R(g);
    return Math.abs(r2.reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  };

  const activo=sf1('1');
  const act11=sf1('1','11'),act12=sf1('1','12'),act13=sf1('1','13'),act14=sf1('1','14');
  const act15=sf1('1','15'),act16=sf1('1','16'),act17=sf1('1','17');
  const actCte=act11+act12+act13+act14;
  const actNoCte=act15+act16+act17;

  const pasivo=sf2('2');
  const pas21=sf2('2','21'),pas22=sf2('2','22'),pas23=sf2('2','23'),pas24=sf2('2','24');
  const pas25=sf2('2','25'),pas26=sf2('2','26'),pas28=sf2('2','28');
  const pasCte=pas22+pas23+pas24+pas25;

  const patrimonio=sf2('3');

  // Indicadores
  const liquidez=pasCte>0?actCte/pasCte:null;
  const endeudamiento=activo>0?pasivo/activo*100:null;
  const margenBruto=ingOpNeto>0?utilBruta/ingOpNeto*100:null;
  const margenOp=ingOpNeto>0?utilOp/ingOpNeto*100:null;
  const margenNeto=ingOpNeto>0?utilNeta/ingOpNeto*100:null;
  const costoRatio=ingOpNeto>0?cosTotal/ingOpNeto*100:null;

  return{
    ingBruto,devol,ingOpNeto,ingNoOp,cosTotal,
    utilBruta,gastoAdmon,gastoVentas,gastoOp,gastoNoOp,impRenta,
    utilOp,utilAntImp,utilNeta,
    activo,actCte,actNoCte,act11,act12,act13,act14,act15,act16,act17,
    pasivo,pasCte,pas21,pas22,pas23,pas24,pas25,pas26,pas28,
    patrimonio,
    liquidez,endeudamiento,margenBruto,margenOp,margenNeto,costoRatio,
    ing41rows,devRows,ing42rows,
    g51:RS('5','51'),g52:RS('5','52'),g53:RS('5','53'),cos:R('6')
  };
}

function sv(v,el){vista=v;document.querySelectorAll('.vt').forEach(t=>t.classList.remove('active'));el.classList.add('active');const lbl={r:'Resumen',pyg:'Estado de Resultados (P&G)',bal:'Balance General',ind:'Indicadores',tend:'Tendencia',comp:'Comparativo'};document.getElementById('bcVista').textContent=lbl[v];ap()}
function ap(){if(!raw.length)return;dC();render()}
function dC(){Object.values(ch).forEach(c=>{try{c.destroy()}catch(e){}});ch={}}

Chart.defaults.font.family="'Inter',sans-serif";
const tOpts=(cb,leg)=>({responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
  plugins:{legend:{display:!!leg,position:'top',labels:{color:'#3D5280',font:{size:9},boxWidth:9,padding:10}},
  tooltip:{backgroundColor:'rgba(11,31,74,.92)',titleColor:'rgba(255,255,255,.5)',titleFont:{size:9},bodyColor:'#fff',bodyFont:{size:11,weight:'600'},padding:9,cornerRadius:7,callbacks:{label:cb||undefined}}},
  scales:{y:{ticks:{callback:v=>fCOP(v),color:'#7A90B8',font:{size:8}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},
  x:{ticks:{color:'#7A90B8',font:{size:8},maxRotation:25},grid:{display:false},border:{display:false}}}});

function render(){
  const per=getPer(),ano=getAno(),mes=getMes();
  const dM=filPer(raw,[per]);
  const dAcum=filPer(raw,getAcumPers());
  const perAnt=mes===1?parseInt(`${ano-1}12`):parseInt(`${ano}${String(mes-1).padStart(2,'0')}`);
  const dAnt=filPer(raw,[perAnt]);
  const fin=getFinanciero(dM);
  const finAcum=getFinanciero(dAcum);
  const finAnt=getFinanciero(dAnt);

  // Actualizar ticker
  buildTicker(fin,finAcum,mes,ano);

  if(vista==='r')vR(fin,finAcum,finAnt,mes,ano);
  else if(vista==='pyg')vPyG(fin,finAcum,finAnt,mes,ano);
  else if(vista==='bal')vBal(fin,mes,ano);
  else if(vista==='ind')vInd(fin,finAcum,mes,ano);
  else if(vista==='tend')vTend(mes,ano);
  else if(vista==='comp')vComp(fin,finAnt,mes,ano);
}

// ── P&G ───────────────────────────────────────────────────
function vPyG(fin,finAcum,finAnt,mes,ano){
  // Determinar qué columnas mostrar según modo
  const modoMes=modoPyG==='mes'||modoPyG==='ambos';
  const modoAcum=modoPyG==='acum'||modoPyG==='ambos';
  const base=fin.ingOpNeto;
  const baseA=finAcum.ingOpNeto;

  const row=(n,m,a,bm,ba)=>{
    const pm=bm>0?((m/bm)*100).toFixed(1)+'%':'—';
    const pa=ba>0?((a/ba)*100).toFixed(1)+'%':'—';
    return`<div class="pyg-row">
      <span class="pn">${n}</span>
      ${modoMes?`<span class="pv" style="color:${m>=0?'var(--navy)':'var(--red)'}">${fFull(m)}</span>`:''}
      ${modoAcum?`<span class="pa" style="color:${a>=0?'var(--text2)':'var(--red)'}">${fFull(a)}</span>`:''}
      ${modoMes?`<span class="pp">${pm}</span>`:''}
    </div>`;
  };
  const sub=(n,m,a)=>`<div class="pyg-sub">
    <span class="pn">${n}</span>
    ${modoMes?`<span class="pv">${fFull(m)}</span>`:''}
    ${modoAcum?`<span class="pa">${fFull(a)}</span>`:''}
    ${modoMes?`<span class="pp">${base>0?((m/base)*100).toFixed(1)+'%':'—'}</span>`:''}
  </div>`;
  const tot=(n,m,a)=>`<div class="pyg-tot">
    <span class="pn">${n}</span>
    ${modoMes?`<span class="pv">${fFull(m)}</span>`:''}
    ${modoAcum?`<span class="pa">${fFull(a)}</span>`:''}
    ${modoMes?`<span class="pp"></span>`:''}
  </div>`;

  document.getElementById('ct').innerHTML=`
    <div class="modo-nota">ℹ️ Modo: <strong>${modoPyG==='mes'?'Solo movimientos de '+MF[mes]:modoPyG==='acum'?'Acumulado enero–'+MF[mes]+' '+ano:'Mes + Acumulado'}</strong> — Los valores reflejan únicamente débitos y créditos del período seleccionado.</div>
    <div class="g2 gf">
      <div class="card" style="overflow:auto;max-height:620px">
        <div class="ct">Estado de Resultados · ${MF[mes]} ${ano}<span class="ct-line"></span><span class="tag tag-blue">PUC Colombia</span></div>
        <div class="pyg-hdr">
          <span class="pn" style="color:var(--text4)">Concepto</span>
          ${modoMes?`<span class="pv" style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;text-align:right;min-width:130px">${MF[mes]}</span>`:''}
          ${modoAcum?`<span class="pa" style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;text-align:right;min-width:130px">Acum. ${ano}</span>`:''}
          ${modoMes?`<span class="pp" style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;text-align:right;min-width:50px">% Ing.</span>`:''}
        </div>
        <div class="pyg-section">
          <div class="pyg-sec-title">📥 Ingresos operacionales</div>
          ${row('(+) Ventas brutas',fin.ingBruto,finAcum.ingBruto,base,baseA)}
          ${row('(−) Devoluciones y descuentos',-fin.devol,-finAcum.devol,base,baseA)}
          ${sub('= Ingresos Operacionales Netos',fin.ingOpNeto,finAcum.ingOpNeto)}
        </div>
        <div class="pyg-section">
          <div class="pyg-sec-title">📦 Costo de ventas (cuenta 6)</div>
          ${row('(−) Costo de ventas',-fin.cosTotal,-finAcum.cosTotal,base,baseA)}
          ${sub('= Utilidad Bruta',fin.utilBruta,finAcum.utilBruta)}
        </div>
        <div class="pyg-section">
          <div class="pyg-sec-title">🏭 Gastos operacionales</div>
          ${row('(−) Gastos administración (51)',-fin.gastoAdmon,-finAcum.gastoAdmon,base,baseA)}
          ${row('(−) Gastos de ventas (52)',-fin.gastoVentas,-finAcum.gastoVentas,base,baseA)}
          ${sub('= Utilidad Operacional',fin.utilOp,finAcum.utilOp)}
        </div>
        <div class="pyg-section">
          <div class="pyg-sec-title">💹 No operacionales</div>
          ${row('(+) Ingresos no operacionales (42)',fin.ingNoOp,finAcum.ingNoOp,base,baseA)}
          ${row('(−) Gastos no operacionales (53)',-fin.gastoNoOp,-finAcum.gastoNoOp,base,baseA)}
          ${sub('= Utilidad antes de impuestos',fin.utilAntImp,finAcum.utilAntImp)}
        </div>
        <div class="pyg-section">
          <div class="pyg-sec-title">🏛️ Impuesto de renta (54)</div>
          ${row('(−) Impuesto de renta',-fin.impRenta,-finAcum.impRenta,base,baseA)}
          ${tot('= UTILIDAD NETA DEL PERÍODO',fin.utilNeta,finAcum.utilNeta)}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card"><div class="ct">Cascada de utilidades<span class="ct-line"></span></div><div class="cw h260"><canvas id="cPYGC"></canvas></div></div>
        <div class="card"><div class="ct">Comparativo vs mes anterior<span class="ct-line"></span></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px">
            ${[['Ing. Op.',fin.ingOpNeto,finAnt.ingOpNeto],['Costos',fin.cosTotal,finAnt.cosTotal],
               ['G. Admón',fin.gastoAdmon,finAnt.gastoAdmon],['G. Ventas',fin.gastoVentas,finAnt.gastoVentas],
               ['Ut. Bruta',fin.utilBruta,finAnt.utilBruta],['Ut. Neta',fin.utilNeta,finAnt.utilNeta]]
              .map(([n,a,b])=>`<div style="background:var(--bg3);border-radius:var(--rs);padding:9px">
                <div style="font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-bottom:2px">${n}</div>
                <div style="font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${a>=0?'var(--navy)':'var(--red)'};margin-bottom:2px">${fFull(a)}</div>
                ${pHtml(a,b)}
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;

  setTimeout(()=>{
    const c=document.getElementById('cPYGC');if(!c)return;
    ch.pygc=new Chart(c,{type:'bar',data:{
      labels:['Ing.Op','–Costos','Ut.Bruta','–G.Op','Ut.Op','ING NoOp','–G.NoOp','Ut.Neta'],
      datasets:[{data:[fin.ingOpNeto,-fin.cosTotal,fin.utilBruta,-fin.gastoOp,fin.utilOp,fin.ingNoOp,-fin.gastoNoOp,fin.utilNeta],
        backgroundColor:c=>c.raw>=0?'rgba(10,122,90,.8)':'rgba(192,57,43,.8)',
        borderColor:c=>c.raw>=0?'#0A7A5A':'#C0392B',
        borderWidth:2,borderRadius:6,borderSkipped:false}]
    },options:tOpts(c=>` ${fFull(c.raw)}`)});
  },80);
}

      <table class="tbl">
        <thead><tr>
          <th style="text-align:left;min-width:200px">Concepto</th>
          <th>${MF[mes]} ${ano}</th><th>${MF[mA]} ${aA}</th><th>Var.</th>
          <th>${MF[mes]} ${ano-1}</th><th>Var.</th>
        </tr></thead>
        <tbody>
          ${fila('Ingresos operacionales netos',fin.ingOpNeto,finAnt.ingOpNeto,finMA.ingOpNeto,true)}
          ${fila('(−) Costo de ventas',fin.cosTotal,finAnt.cosTotal,finMA.cosTotal,true)}
          ${fila('= Utilidad Bruta',fin.utilBruta,finAnt.utilBruta,finMA.utilBruta,false)}
          ${fila('(−) Gastos administración',fin.gastoAdmon,finAnt.gastoAdmon,finMA.gastoAdmon,true)}
          ${fila('(−) Gastos de ventas',fin.gastoVentas,finAnt.gastoVentas,finMA.gastoVentas,true)}
          ${fila('= Utilidad Operacional',fin.utilOp,finAnt.utilOp,finMA.utilOp,false)}
          ${fila('(+) Ingresos no operacionales',fin.ingNoOp,finAnt.ingNoOp,finMA.ingNoOp,true)}
          ${fila('(−) Gastos no operacionales',fin.gastoNoOp,finAnt.gastoNoOp,finMA.gastoNoOp,true)}
          ${fila('(−) Impuesto de renta',fin.impRenta,finAnt.impRenta,finMA.impRenta,true)}
          ${fila('= UTILIDAD NETA',fin.utilNeta,finAnt.utilNeta,finMA.utilNeta,false)}
        </tbody>
      </table>
    </div>
    <div class="g2">
      <div class="card"><div class="ct">Utilidades comparadas — 3 períodos<span class="ct-line"></span></div><div class="cw h260"><canvas id="cCMP1"></canvas></div></div>
      <div class="card"><div class="ct">Márgenes comparados<span class="ct-line"></span></div><div class="cw h260"><canvas id="cCMP2"></canvas></div></div>
    </div>`;
  setTimeout(()=>{
    const c1=document.getElementById('cCMP1');if(!c1)return;
    ch.c1=new Chart(c1,{type:'bar',data:{
      labels:['Ing.Op','Ut.Bruta','Ut.Op','Ut.Neta'],
      datasets:[
        {label:`${MF[mes]} ${ano}`,data:[fin.ingOpNeto,fin.utilBruta,fin.utilOp,fin.utilNeta],backgroundColor:'rgba(26,58,110,.85)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mA]} ${aA}`,data:[finAnt.ingOpNeto,finAnt.utilBruta,finAnt.utilOp,finAnt.utilNeta],backgroundColor:'rgba(26,58,110,.3)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mes]} ${ano-1}`,data:[finMA.ingOpNeto,finMA.utilBruta,finMA.utilOp,finMA.utilNeta],backgroundColor:'rgba(184,134,11,.5)',borderRadius:5,borderSkipped:false}
      ]},options:{...tOpts(c=>` ${fFull(c.raw)}`,true)}});
    const c2=document.getElementById('cCMP2');if(!c2)return;
    ch.c2=new Chart(c2,{type:'bar',data:{
      labels:['Margen bruto','Margen op.','Margen neto'],
      datasets:[
        {label:`${MF[mes]} ${ano}`,data:[fin.margenBruto||0,fin.margenOp||0,fin.margenNeto||0],backgroundColor:'rgba(26,58,110,.85)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mA]} ${aA}`,data:[finAnt.margenBruto||0,finAnt.margenOp||0,finAnt.margenNeto||0],backgroundColor:'rgba(26,58,110,.3)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mes]} ${ano-1}`,data:[finMA.margenBruto||0,finMA.margenOp||0,finMA.margenNeto||0],backgroundColor:'rgba(184,134,11,.5)',borderRadius:5,borderSkipped:false}
      ]},options:{...tOpts(c=>` ${c.raw?.toFixed(1)}%`,true),scales:{y:{ticks:{callback:v=>`${v.toFixed(0)}%`,color:'#7A90B8',font:{size:8}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:8}},grid:{display:false},border:{display:false}}}}});
  },80);
}

cargar();
setInterval(()=>{fetchTRM().then(()=>{if(raw.length)ap();});},60*60*1000);
setInterval(cargar,30*60*1000);
</script>
</body>
