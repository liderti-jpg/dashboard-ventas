<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financiero — Jota Mundial SAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F8FC;--bg2:#FFFFFF;--bg3:#EEF1F8;--bg4:#E4E9F5;
  --navy:#0B1F4A;--navy2:#1A3A6E;--navy3:#2E5199;
  --blue:#3B6FD4;--blue2:#5B8FE8;--blue3:#EAF0FD;
  --gold:#B8860B;--gold2:#D4A017;--gold3:#FFF8E7;
  --text:#0B1F4A;--text2:#3D5280;--text3:#7A90B8;--text4:#A8BAD8;
  --border:#D8E2F5;--border2:#EEF1F8;
  --green:#0A7A5A;--green2:#E6F7F2;--green3:#D1FAE5;
  --red:#C0392B;--red2:#FDECEA;
  --orange:#D97706;--orange2:#FEF3C7;
  --shadow:0 2px 16px rgba(11,31,74,.07);
  --shadow2:0 8px 40px rgba(11,31,74,.12);
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:var(--navy);padding:0 36px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(11,31,74,.25)}
.hlogo{display:flex;align-items:center;gap:16px}
.logo-ic{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:15px;color:#fff;box-shadow:0 4px 12px rgba(180,130,0,.3)}
.logo-nm{font-size:15px;font-weight:700;color:#fff}
.logo-sb{font-size:9px;color:rgba(255,255,255,.5);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:1px}
.hdiv{width:1px;height:28px;background:rgba(255,255,255,.12);margin:0 4px}
.htitle{font-size:12px;color:rgba(255,255,255,.45);padding-left:4px}
.hright{display:flex;align-items:center;gap:12px}
.badge-live{display:none;align-items:center;gap:6px;background:rgba(10,122,90,.25);border:1px solid rgba(10,122,90,.4);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:600;color:#4ECBA8}
.dot-live{width:6px;height:6px;border-radius:50%;background:#4ECBA8;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-ref{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:var(--rs);padding:9px 20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;box-shadow:0 4px 12px rgba(180,130,0,.3)}
.btn-ref:hover{opacity:.9;transform:translateY(-1px)}
.btn-ref:disabled{opacity:.5;cursor:not-allowed;transform:none}
#ts{font-size:11px;color:rgba(255,255,255,.35);font-family:'JetBrains Mono',monospace}

/* MAIN */
.main{padding:28px 36px;max-width:1700px;margin:0 auto}
@media(max-width:700px){.main{padding:14px}}

/* BREADCRUMB */
.bcb{display:flex;align-items:center;gap:8px;margin-bottom:22px;font-size:12px;color:var(--text3);font-weight:500}
.bcb a{color:var(--text3);text-decoration:none}.bcb a:hover{color:var(--navy)}
.bcs{color:var(--text4)}.bcc{color:var(--navy);font-weight:600}

/* PERIODO SELECTOR */
.psec{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:20px;box-shadow:var(--shadow)}
.psh{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:10px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px}
.pr{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.fg select{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 11px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;min-width:130px;outline:none;transition:all .2s}
.fg select:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,111,212,.1)}
.ba{background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;height:36px;transition:all .2s}
.ba:hover{background:var(--navy2);transform:translateY(-1px)}

/* TABS */
.vtabs{display:flex;gap:4px;margin-bottom:22px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:5px;width:fit-content;box-shadow:var(--shadow)}
.vt{padding:8px 18px;border-radius:11px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);font-family:'Inter',sans-serif;transition:all .2s}
.vt.active{background:var(--navy);color:#fff;box-shadow:0 4px 14px rgba(11,31,74,.2)}
.vt:not(.active):hover{background:var(--bg3);color:var(--navy)}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--navy));opacity:0;transition:opacity .2s}
.kpi:hover{border-color:var(--blue2);transform:translateY(-3px);box-shadow:var(--shadow2)}
.kpi:hover::after{opacity:1}
.kpi-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px}
.kpi-blue{background:var(--blue3)}.kpi-green{background:var(--green2)}.kpi-gold{background:var(--gold3)}.kpi-red{background:var(--red2)}.kpi-orange{background:var(--orange2)}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.kpi-val{font-size:17px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;line-height:1.1;margin-bottom:3px;word-break:break-all}
.kpi-sub{font-size:10px;color:var(--text3)}
.kpi-ch{font-size:11px;font-weight:600;margin-top:4px;display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px}
.up{color:var(--green);background:var(--green2)}.down{color:var(--red);background:var(--red2)}.neutral{color:var(--text3);background:var(--bg3)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(11,31,74,.5);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.mo.open{opacity:1;pointer-events:all}
.mc{background:var(--bg2);border:1.5px solid var(--border);border-radius:24px;padding:32px;width:90%;max-width:480px;position:relative;transform:translateY(24px);transition:transform .3s;box-shadow:0 24px 80px rgba(11,31,74,.18)}
.mo.open .mc{transform:translateY(0)}
.mcl{position:absolute;top:14px;right:14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:50%;width:32px;height:32px;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;border:none}
.mcl:hover{background:var(--bg4);color:var(--navy)}
.mv{font-size:36px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy);line-height:1.1;margin:8px 0;word-break:break-all}
.mn{display:flex;gap:10px;margin-top:18px}
.mn button{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px;color:var(--navy);cursor:pointer;font-size:16px;transition:all .2s;font-weight:600}
.mn button:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.mdts{display:flex;justify-content:center;gap:6px;margin-top:12px}
.mdt{width:6px;height:6px;border-radius:50%;background:var(--bg4);transition:all .2s}
.mdt.active{background:var(--navy);width:22px;border-radius:3px}
.mc-prog{height:3px;background:var(--bg4);border-radius:3px;margin-top:14px;overflow:hidden}
.mc-prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:3px;transition:width .4s}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.gf{margin-bottom:14px}
@media(max-width:1100px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:800px){.g2,.g3{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.ct{font-size:10px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.ct-line{flex:1;height:1px;background:var(--border2)}
.cw{position:relative}.h200{height:200px}.h240{height:240px}.h280{height:280px}.h320{height:320px}.h360{height:360px}

/* PYGE TABLE — Estado de Resultados */
.pyg{width:100%}
.pyg-section{margin-bottom:8px}
.pyg-title{font-size:9px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;background:var(--bg3);padding:6px 12px;border-radius:6px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.pyg-row{display:flex;align-items:center;padding:5px 12px;border-radius:6px;transition:background .15s;gap:4px}
.pyg-row:hover{background:var(--blue3)}
.pyg-name{flex:1;font-size:11px;color:var(--text2)}
.pyg-mes{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--navy);font-weight:600;text-align:right;min-width:120px}
.pyg-acum{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2);text-align:right;min-width:120px}
.pyg-pct{font-size:10px;color:var(--text3);text-align:right;min-width:55px}
.pyg-subtotal{background:var(--blue3);border-radius:6px;padding:6px 12px;display:flex;align-items:center;gap:4px;margin:4px 0}
.pyg-subtotal .pyg-name{font-weight:700;color:var(--navy)}
.pyg-subtotal .pyg-mes{font-weight:700;color:var(--navy)}
.pyg-total{background:var(--navy);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:4px;margin-top:6px}
.pyg-total .pyg-name{font-weight:700;color:#fff;font-size:12px}
.pyg-total .pyg-mes{font-weight:700;color:#fff;font-size:13px}
.pyg-total .pyg-acum{color:rgba(255,255,255,.7);font-size:12px}
.pyg-total .pyg-pct{color:rgba(255,255,255,.5)}
.pyg-header{display:flex;align-items:center;gap:4px;padding:4px 12px;margin-bottom:6px}
.pyg-header .pyg-name{font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.8px}
.pyg-header .pyg-mes{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;text-align:right}
.pyg-header .pyg-acum{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;text-align:right}
.pyg-header .pyg-pct{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;text-align:right}

/* BALANCE TABLE */
.bal{width:100%}
.bal-group{margin-bottom:10px}
.bal-group-title{font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;background:var(--navy);padding:7px 14px;border-radius:8px;margin-bottom:4px;display:flex;justify-content:space-between}
.bal-sub{font-size:9px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:.8px;background:var(--bg3);padding:5px 14px;margin-bottom:2px;display:flex;justify-content:space-between}
.bal-row{display:flex;justify-content:space-between;padding:4px 14px;border-radius:6px;transition:background .15s}
.bal-row:hover{background:var(--blue3)}
.bal-row-name{font-size:11px;color:var(--text2)}
.bal-row-val{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--navy);font-weight:600}
.bal-total{display:flex;justify-content:space-between;background:var(--gold3);border:1.5px solid var(--gold2);border-radius:8px;padding:8px 14px;margin-top:8px}
.bal-total-name{font-size:12px;font-weight:700;color:var(--navy)}
.bal-total-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--gold)}

/* INDICADORES */
.ind-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.ind{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:14px;box-shadow:var(--shadow)}
.ind-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.ind-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy);margin-bottom:2px}
.ind-ref{font-size:9px;color:var(--text3)}
.ind-bar{height:4px;background:var(--bg4);border-radius:4px;margin-top:6px;overflow:hidden}
.ind-bar-fill{height:100%;border-radius:4px;transition:width .8s ease}

/* LOADING */
.loading{text-align:center;padding:80px 20px;color:var(--text3);font-size:14px}
.ls{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red2);border:1.5px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:14px 18px;color:var(--red);font-size:13px}

/* TAG */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.tag-blue{background:var(--blue3);color:var(--navy3)}
.tag-green{background:var(--green2);color:var(--green)}
.tag-red{background:var(--red2);color:var(--red)}
.tag-gold{background:var(--gold3);color:var(--gold)}
.tag-orange{background:var(--orange2);color:var(--orange)}
</style>
</head>
<body>

<!-- MODAL KPI -->
<div class="mo" id="kpiMo" onclick="closeMo(event)">
  <div class="mc">
    <button class="mcl" onclick="closeMoBtn()">✕</button>
    <div id="ml" style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px"></div>
    <div id="mv" class="mv"></div>
    <div id="ms" style="font-size:13px;color:var(--text2);margin-top:4px"></div>
    <div id="mc2" style="margin-top:6px"></div>
    <div class="mc-prog"><div class="mc-prog-fill" id="mc-pf"></div></div>
    <div class="mn"><button onclick="sk(-1)">←</button><button onclick="sk(1)">→</button></div>
    <div class="mdts" id="mdts"></div>
    <div style="margin-top:12px;font-size:11px;color:var(--text4);text-align:center">← → para navegar · toca fuera para cerrar</div>
  </div>
</div>

<header>
  <div class="hlogo">
    <div class="logo-ic">JM</div>
    <div><div class="logo-nm">JOTA MUNDIAL SAS</div><span class="logo-sb">Dashboard Financiero</span></div>
    <div class="hdiv"></div>
    <span class="htitle">SIESA SBS · Producción · PUC Colombia</span>
  </div>
  <div class="hright">
    <span id="ts"></span>
    <div class="badge-live" id="bl"><span class="dot-live"></span>EN VIVO</div>
    <button class="btn-ref" id="br" onclick="cargar()">↻ Actualizar</button>
  </div>
</header>

<div class="main">
  <div class="bcb">
    <a href="https://liderti-jpg.github.io/dashboard-ventas/">Ventas</a>
    <span class="bcs">›</span>
    <a href="https://liderti-jpg.github.io/dashboard-ventas/dashboard-productos.html">Productos</a>
    <span class="bcs">›</span>
    <span class="bcc" id="bcVista">Resumen Financiero</span>
  </div>

  <!-- SELECTOR DE PERÍODO -->
  <div class="psec">
    <div class="psh">📅 Período de análisis</div>
    <div class="pr">
      <div class="fg"><label>Año</label>
        <select id="fano">
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
      </div>
      <div class="fg"><label>Mes</label>
        <select id="fmes">
          <option value="1">Enero</option><option value="2">Febrero</option>
          <option value="3" selected>Marzo</option><option value="4">Abril</option>
          <option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option>
          <option value="9">Septiembre</option><option value="10">Octubre</option>
          <option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
      </div>
      <button class="ba" onclick="ap()">Aplicar</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="vtabs">
    <button class="vt active" onclick="sv('r',this)">📊 Resumen</button>
    <button class="vt" onclick="sv('pyg',this)">📋 P&G</button>
    <button class="vt" onclick="sv('bal',this)">⚖️ Balance</button>
    <button class="vt" onclick="sv('ind',this)">🎯 Indicadores</button>
    <button class="vt" onclick="sv('tend',this)">📈 Tendencia</button>
    <button class="vt" onclick="sv('comp',this)">⚖️ Comparativo</button>
  </div>

  <div id="ct"><div class="loading"><div class="ls"></div>Cargando datos financieros desde SIESA…</div></div>
</div>

<script>
const WH='https://jotamundial2.app.n8n.cloud/webhook/financiero';
const MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MF=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let raw=[],vista='r',ch={},kpArr=[],kpIdx=0;

// HELPERS
const fCOP=v=>{if(v===null||v===undefined||isNaN(v))return'—';const abs=Math.abs(v);let s;if(abs>=1e12)s=(v/1e12).toFixed(2)+'B';else if(abs>=1e9)s=(v/1e9).toFixed(2)+'MM';else if(abs>=1e6)s=(v/1e6).toFixed(1)+'M';else if(abs>=1e3)s=(v/1e3).toFixed(0)+'K';else s=Math.round(v).toLocaleString('es-CO');return(v<0?'-$':'$')+s};
const fCOPFull=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(v||0);
const fPct=v=>v===null||isNaN(v)?'—':(v>=0?'+':'')+v.toFixed(1)+'%';
const pObj=(a,b)=>{if(!b||b===0)return{t:'—',c:'neutral'};const p=((a-b)/Math.abs(b)*100);const u=p>=0;return{t:(u?'▲ +':'▼ ')+Math.abs(p).toFixed(1)+'%',c:u?'up':'down'}};
const pHtml=(a,b)=>{const o=pObj(a,b);return`<span class="tag tag-${o.c==='up'?'green':o.c==='down'?'red':'blue'}">${o.t}</span>`};

// MODAL
function openMo(arr,i){kpArr=arr;kpIdx=i;rkm();document.getElementById('kpiMo').classList.add('open')}
function closeMo(e){if(e.target.id==='kpiMo')closeMoBtn()}
function closeMoBtn(){document.getElementById('kpiMo').classList.remove('open')}
function sk(d){kpIdx=(kpIdx+d+kpArr.length)%kpArr.length;rkm()}
function rkm(){
  const d=kpArr[kpIdx];
  document.getElementById('ml').textContent=d.label;
  document.getElementById('mv').textContent=d.value;
  document.getElementById('ms').textContent=d.sub||'';
  const c=document.getElementById('mc2');
  c.innerHTML=d.change?`<span class="tag tag-${d.cc==='up'?'green':d.cc==='down'?'red':'blue'}">${d.change}</span>`:'';
  document.getElementById('mdts').innerHTML=kpArr.map((_,i)=>`<div class="mdt ${i===kpIdx?'active':''}"></div>`).join('');
  const pf=document.getElementById('mc-pf');if(pf)pf.style.width=`${((kpIdx+1)/kpArr.length)*100}%`;
}
let tx=0;
document.getElementById('kpiMo').addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.getElementById('kpiMo').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)sk(dx<0?1:-1)},{passive:true});
document.addEventListener('keydown',e=>{if(!document.getElementById('kpiMo').classList.contains('open'))return;if(e.key==='ArrowLeft')sk(-1);if(e.key==='ArrowRight')sk(1);if(e.key==='Escape')closeMoBtn()});

// CARGA CON PAGINACIÓN
async function fetchPag(pagina){
  const r=await fetch(`${WH}?pagina=${pagina}`,{signal:AbortSignal.timeout(60000)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function cargar(){
  const btn=document.getElementById('br');btn.disabled=true;btn.textContent='⏳';
  setLoad('Conectando con SIESA…',0,0);
  try{
    const p1=await fetchPag(1);
    const totalPags=p1?.total_páginas||p1?.total_paginas||1;
    let todos=p1?.Datos||[];
    setLoad(`Cargando datos contables… (${todos.length} de ${p1?.total_registros||0})`,1,totalPags);
    const BATCH=5;
    for(let p=2;p<=totalPags;p+=BATCH){
      const ps=[];
      for(let pp=p;pp<p+BATCH&&pp<=totalPags;pp++)ps.push(fetchPag(pp));
      const rs=await Promise.all(ps);
      for(const r of rs)todos=todos.concat(r?.Datos||[]);
      setLoad(`Cargando… (${todos.length} de ${p1?.total_registros||0})`,Math.min(p+BATCH-1,totalPags),totalPags);
    }
    raw=todos.map(r=>({...r,nombre_cuenta:(r.nombre_cuenta||'').trim()}));
    document.getElementById('ts').textContent=new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('bl').style.display='flex';
    ap();
  }catch(e){
    document.getElementById('ct').innerHTML=`<div class="err">❌ ${e.message}<br><small style="margin-top:6px;display:block">Verifica que el webhook n8n "financiero" esté activo.</small><br><button onclick="cargar()" style="margin-top:10px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:8px 18px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">↻ Reintentar</button></div>`;
  }finally{btn.disabled=false;btn.textContent='↻ Actualizar'}
}

function setLoad(msg,p,t){
  const pct=t>0?Math.round((p/t)*100):0;
  document.getElementById('ct').innerHTML=`<div class="loading"><div class="ls"></div><div>${msg}</div>${t>0?`<div style="margin-top:10px;width:200px;height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-left:auto;margin-right:auto"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:4px;transition:width .3s"></div></div><small style="color:var(--text4);margin-top:6px;display:block">Página ${p} de ${t}</small>`:''}</div>`;
}

function getPeriodo(){

  const m=parseInt(document.getElementById('fmes').value);
  return parseInt(`${a}${String(m).padStart(2,'0')}`);
}
function getAno(){return parseInt(document.getElementById('fano').value)}
function getMes(){return parseInt(document.getElementById('fmes').value)}

// Períodos del año actual (enero hasta mes seleccionado)
function getPeriodosAcum(){
  const a=getAno(),m=getMes();
  const ps=[];
  for(let i=1;i<=m;i++)ps.push(parseInt(`${a}${String(i).padStart(2,'0')}`));
  return ps;
}

// Filtrar por período
function filPer(data,periodos){
  if(!Array.isArray(periodos))periodos=[periodos];
  return data.filter(r=>periodos.includes(r.periodo));
}

// ═══════════════════════════════════════════
// CÁLCULOS FINANCIEROS — LÓGICA PUC COLOMBIA
// ═══════════════════════════════════════════
// Saldo final según naturaleza:
//   Débito (1,5,6): saldo_inicial + debitos - creditos
//   Crédito (2,3,4): saldo_inicial + creditos - debitos
// Estado de resultados (solo movimientos del período):
//   Ingresos (41,42): creditos - debitos  → resultado positivo = ingreso
//   Costos (6):       debitos - creditos  → resultado positivo = costo
//   Gastos (51,52,53,54): debitos - creditos → resultado positivo = gasto

function calcSaldo(rows, grupo){
  // Para balance: usar saldo acumulado
  const nat_debito=['1'];
  const nat_credito=['2','3'];
  return rows.reduce((s,r)=>{
    const g=r.grupo;
    if(nat_debito.includes(g)) return s+(r.saldo_inicial+r.debitos-r.creditos);
    if(nat_credito.includes(g)) return s+(r.saldo_inicial+r.creditos-r.debitos);
    return s;
  },0);
}

function calcResultado(rows){
  // Para P&G: usar solo movimientos del período
  return rows.reduce((s,r)=>{
    const g=r.grupo, sg=r.subgrupo;
    if(g==='4') return s+(r.creditos-r.debitos); // ingresos: crédito - débito
    if(g==='5'||g==='6') return s+(r.debitos-r.creditos); // gastos/costos: débito - crédito
    return s;
  },0);
}

function getFinanciero(datos){
  // Agrupar por grupo/subgrupo
  const byGS={};
  datos.forEach(r=>{
    const k=`${r.grupo}|${r.subgrupo}|${r.nombre_cuenta}`;
    if(!byGS[k])byGS[k]={...r,saldo_inicial:0,debitos:0,creditos:0};
    byGS[k].saldo_inicial+=r.saldo_inicial;
    byGS[k].debitos+=r.debitos;
    byGS[k].creditos+=r.creditos;
  });
  const rows=Object.values(byGS);

  // INGRESOS
  const ing41=rows.filter(r=>r.subgrupo==='41'&&r.nombre_cuenta!=='DEVOLUCIONES');
  const dev=rows.filter(r=>r.subgrupo==='41'&&r.nombre_cuenta==='DEVOLUCIONES');
  const ing42=rows.filter(r=>r.subgrupo==='42');
  const ingOp=ing41.reduce((s,r)=>s+(r.creditos-r.debitos),0);
  const devol=dev.reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const ingOpNeto=ingOp-devol;
  const ingNoOp=ing42.reduce((s,r)=>s+(r.creditos-r.debitos),0);
  const ingTotal=ingOpNeto+ingNoOp;

  // COSTOS (6)
  const cos=rows.filter(r=>r.grupo==='6');
  const cosTotal=cos.reduce((s,r)=>s+(r.debitos-r.creditos),0);

  // UTILIDAD BRUTA
  const utilBruta=ingOpNeto-cosTotal;

  // GASTOS
  const g51=rows.filter(r=>r.subgrupo==='51');
  const g52=rows.filter(r=>r.subgrupo==='52');
  const g53=rows.filter(r=>r.subgrupo==='53');
  const g54=rows.filter(r=>r.subgrupo==='54');
  const gastoAdmon=g51.reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const gastoVentas=g52.reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const gastoNoOp=g53.reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const impRenta=g54.reduce((s,r)=>s+(r.debitos-r.creditos),0);
  const gastoOp=gastoAdmon+gastoVentas;
  const gastoTotal=gastoOp+gastoNoOp+impRenta;

  // UTILIDADES
  const utilOp=utilBruta-gastoOp;
  const utilAntImp=utilOp+ingNoOp-gastoNoOp;
  const utilNeta=utilAntImp-impRenta;

  // BALANCE — usar saldo acumulado (saldo_inicial del período + movimientos del mes)
  // Para el mes actual, el saldo final = saldo_inicial + movimientos del mes
  const actRows=rows.filter(r=>r.grupo==='1');
  const pasRows=rows.filter(r=>r.grupo==='2');
  const patRows=rows.filter(r=>r.grupo==='3');

  const activo=actRows.reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const pasivo=Math.abs(pasRows.reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  const patrimonio=Math.abs(patRows.reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));

  // Subgrupos activo
  const act11=actRows.filter(r=>r.subgrupo==='11').reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const act12=actRows.filter(r=>r.subgrupo==='12').reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const act13=actRows.filter(r=>r.subgrupo==='13').reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const act14=actRows.filter(r=>r.subgrupo==='14').reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const act15=actRows.filter(r=>r.subgrupo==='15').reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const act16=actRows.filter(r=>r.subgrupo==='16').reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const act17=actRows.filter(r=>r.subgrupo==='17').reduce((s,r)=>s+(r.saldo_inicial+r.debitos-r.creditos),0);
  const actCte=act11+act12+act13+act14;
  const actNoCte=act15+act16+act17;

  // Subgrupos pasivo
  const pas21=Math.abs(pasRows.filter(r=>r.subgrupo==='21').reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  const pas22=Math.abs(pasRows.filter(r=>r.subgrupo==='22').reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  const pas23=Math.abs(pasRows.filter(r=>r.subgrupo==='23').reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  const pas24=Math.abs(pasRows.filter(r=>r.subgrupo==='24').reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  const pas25=Math.abs(pasRows.filter(r=>r.subgrupo==='25').reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  const pas26=Math.abs(pasRows.filter(r=>r.subgrupo==='26').reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));
  const pas28=Math.abs(pasRows.filter(r=>r.subgrupo==='28').reduce((s,r)=>s+(r.saldo_inicial+r.creditos-r.debitos),0));

  // Indicadores
  const liquidez=actCte>0&&pas22+pas23+pas24+pas25>0?actCte/(pas22+pas23+pas24+pas25):null;
  const endeudamiento=activo>0?pasivo/activo*100:null;
  const margenBruto=ingOpNeto>0?utilBruta/ingOpNeto*100:null;
  const margenOp=ingOpNeto>0?utilOp/ingOpNeto*100:null;
  const margenNeto=ingOpNeto>0?utilNeta/ingOpNeto*100:null;
  const rotInv=cosTotal>0&&act14>0?cosTotal/act14:null;

  return{
    // P&G
    ingOp,devol,ingOpNeto,ingNoOp,ingTotal,
    cosTotal,utilBruta,
    gastoAdmon,gastoVentas,gastoOp,gastoNoOp,impRenta,gastoTotal,
    utilOp,utilAntImp,utilNeta,
    // Balance
    activo,actCte,actNoCte,act11,act12,act13,act14,act15,act16,act17,
    pasivo,pas21,pas22,pas23,pas24,pas25,pas26,pas28,
    patrimonio,
    // Indicadores
    liquidez,endeudamiento,margenBruto,margenOp,margenNeto,rotInv,
    // Detalle cuentas
    g51rows:g51,g52rows:g52,cos,
    ing41rows:ing41,devRows:dev,ing42rows:ing42
  };
}

function render(){
  const per=getPeriodo();
  const ano=getAno(),mes=getMes();
  const persMes=filPer(raw,[per]);
  const persAcum=filPer(raw,getPeriodosAcum());
  // Mes anterior
  const perAnt=mes===1?parseInt(`${ano-1}12`):parseInt(`${ano}${String(mes-1).padStart(2,'0')}`);
  const persMesAnt=filPer(raw,[perAnt]);

  const fin=getFinanciero(persMes);
  const finAcum=getFinanciero(persAcum);
  const finAnt=getFinanciero(persMesAnt);

  if(vista==='r')vR(fin,finAcum,finAnt,mes,ano);
  else if(vista==='pyg')vPyG(fin,finAcum,finAnt,mes,ano);
  else if(vista==='bal')vBal(fin,mes,ano);
  else if(vista==='ind')vInd(fin,finAcum,finAnt);
  else if(vista==='tend')vTend(mes,ano);
  else if(vista==='comp')vComp(fin,finAnt,mes,ano);
}

  };
  const sub=(name,mes,acum,base)=>{

// ══ TENDENCIA ════════════════════════════════════

  const labels=pers.map(p=>`${MN[p%100]} ${Math.floor(p/100)}`);

  ch.tune=new Chart(document.getElementById('cTUNE'),{type:'bar',data:{

              <td style="padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.7);text-align:right">${fCOP(finAnt.utilNeta)}</td>
              <td style="padding:8px 12px;text-align:right">${pHtml(fin.utilNeta,finAnt.utilNeta)}</td>
              <td style="padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.7);text-align:right">${fCOP(finMismoMes.utilNeta)}</td>
              <td style="padding:8px 12px;text-align:right">${pHtml(fin.utilNeta,finMismoMes.utilNeta)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="g2">
      <div class="card"><div class="ct">Ingresos vs Utilidad — 3 períodos <span class="ct-line"></span></div><div class="cw h260"><canvas id="cCMP1"></canvas></div></div>
      <div class="card"><div class="ct">Márgenes comparados <span class="ct-line"></span></div><div class="cw h260"><canvas id="cCMP2"></canvas></div></div>
    </div>`;

  setTimeout(()=>{
    const lbls=[`${MF[mesAntNum]} ${anoAntNum}`,`${MF[mes]} ${ano}`,`${MF[mes]} ${ano-1}`];
    const c1=document.getElementById('cCMP1');if(!c1)return;
    ch.cmp1=new Chart(c1,{type:'bar',data:{
      labels:['Ing.Op.','Ut.Bruta','Ut.Op.','Ut.Neta'],
      datasets:[
        {label:`${MF[mes]} ${ano}`,data:[fin.ingOpNeto,fin.utilBruta,fin.utilOp,fin.utilNeta],backgroundColor:'rgba(26,58,110,.8)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mesAntNum]} ${anoAntNum}`,data:[finAnt.ingOpNeto,finAnt.utilBruta,finAnt.utilOp,finAnt.utilNeta],backgroundColor:'rgba(26,58,110,.25)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mes]} ${ano-1}`,data:[finMismoMes.ingOpNeto,finMismoMes.utilBruta,finMismoMes.utilOp,finMismoMes.utilNeta],backgroundColor:'rgba(184,134,11,.5)',borderRadius:5,borderSkipped:false}
      ]
    },options:{...tOpts(ctx=>` ${fCOP(ctx.raw)}`,true)}});

    const c2=document.getElementById('cCMP2');if(!c2)return;
    ch.cmp2=new Chart(c2,{type:'bar',data:{
      labels:['Margen bruto','Margen op.','Margen neto'],
      datasets:[
        {label:`${MF[mes]} ${ano}`,data:[fin.margenBruto||0,fin.margenOp||0,fin.margenNeto||0],backgroundColor:'rgba(26,58,110,.8)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mesAntNum]} ${anoAntNum}`,data:[finAnt.margenBruto||0,finAnt.margenOp||0,finAnt.margenNeto||0],backgroundColor:'rgba(26,58,110,.25)',borderRadius:5,borderSkipped:false},
        {label:`${MF[mes]} ${ano-1}`,data:[finMismoMes.margenBruto||0,finMismoMes.margenOp||0,finMismoMes.margenNeto||0],backgroundColor:'rgba(184,134,11,.5)',borderRadius:5,borderSkipped:false}
      ]
    },options:{...tOpts(ctx=>` ${ctx.raw?.toFixed(1)}%`,true),scales:{y:{ticks:{callback:v=>`${v.toFixed(0)}%`,color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}}}});
  },100);
}

cargar();
setInterval(cargar,30*60*1000);
