<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://i.ibb.co/BKyTpZ1g/logo-JOTA-MUNDIAL-SAS-original-mundoo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventarios — Jota Mundial SAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F7FD;--bg2:#FFFFFF;--bg3:#EEF2FB;--bg4:#E3EAF8;
  --navy:#0B1F4A;--navy2:#1A3A6E;--navy3:#2E5199;
  --blue:#3B6FD4;--blue2:#5B8FE8;--blue3:#EAF0FD;
  --teal:#0A7A5A;--teal2:#E6F7F2;
  --gold:#B8860B;--gold2:#D4A017;--gold3:#FFF8E7;
  --text:#0B1F4A;--text2:#3D5280;--text3:#7A90B8;--text4:#A8BAD8;
  --border:#D4DFFA;--border2:#EEF2FB;
  --green:#0A7A5A;--green2:#E6F7F2;
  --red:#C0392B;--red2:#FDECEA;
  --orange:#D97706;--orange2:#FFFBEB;
  --yellow:#CA8A04;--yellow2:#FEF9C3;
  --purple:#6B21A8;--purple2:#F0E6FF;
  --shadow:0 2px 16px rgba(11,31,74,.07);
  --shadow2:0 8px 40px rgba(11,31,74,.12);
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:linear-gradient(135deg,#071530 0%,#0B1F4A 60%,#1A3A6E 100%);padding:0 36px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 24px rgba(0,0,0,.3)}
.hlogo{display:flex;align-items:center;gap:14px}
.logo-nm{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.logo-sb{font-size:9px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:1.8px;text-transform:uppercase;display:block;margin-top:1px}
.hdiv{width:1px;height:28px;background:rgba(255,255,255,.12);margin:0 6px}
.htitle{font-size:11px;color:rgba(255,255,255,.4)}
.hright{display:flex;align-items:center;gap:10px}
.badge-live{display:none;align-items:center;gap:5px;background:rgba(10,122,90,.25);border:1px solid rgba(10,122,90,.4);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:#4ECBA8}
.dot-live{width:5px;height:5px;border-radius:50%;background:#4ECBA8;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.btn-ref{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:var(--rs);padding:8px 18px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;box-shadow:0 3px 10px rgba(180,130,0,.3)}
.btn-ref:hover{opacity:.9;transform:translateY(-1px)}
.btn-ref:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-centro{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--rs);padding:7px 14px;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;transition:all .2s}
.btn-centro:hover{background:rgba(255,255,255,.15)}
#ts{font-size:10px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}

/* MAIN */
.main{padding:24px 36px;max-width:1700px;margin:0 auto}
@media(max-width:700px){.main{padding:12px}.hlogo .logo-sb{display:none}}

/* FILTROS */
.fp{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
.fph{font-size:10px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.fr{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.fg select,.fg input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 11px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;min-width:130px;outline:none;transition:all .2s}
.fg select:focus,.fg input:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,111,212,.1)}
.ba{background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:7px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;height:34px;transition:all .2s}
.ba:hover{background:var(--navy2)}
.bcl{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 12px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;height:34px}

/* TABS */
.vtabs{display:flex;gap:3px;margin-bottom:20px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:4px;width:fit-content;box-shadow:var(--shadow);flex-wrap:wrap}
.vt{padding:7px 15px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.vt.active{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;box-shadow:0 3px 12px rgba(11,31,74,.2)}
.vt:not(.active):hover{background:var(--bg3);color:var(--navy)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;transition:all .22s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kbar,linear-gradient(90deg,var(--blue),var(--navy)));opacity:.8}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow2)}
.kpi-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;background:var(--kbg,var(--blue3))}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;line-height:1.1;margin-bottom:3px;word-break:break-all}
.kpi-sub{font-size:10px;color:var(--text3)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.gf{margin-bottom:14px}
@media(max-width:1200px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.ct{font-size:9px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ct-line{flex:1;height:1px;background:var(--border2)}
.cw{position:relative}.h200{height:200px}.h240{height:240px}.h260{height:260px}.h280{height:280px}.h300{height:300px}.h340{height:340px}

/* TABLA */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;background:var(--bg3);color:var(--text3);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1.5px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--blue3)}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px}
.bb{background:var(--bg4);border-radius:4px;height:4px;margin-top:4px;min-width:50px}
.bf{background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:4px;height:4px;transition:width .8s ease}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.tag-blue{background:var(--blue3);color:var(--navy3)}
.tag-green{background:var(--green2);color:var(--green)}
.tag-red{background:var(--red2);color:var(--red)}
.tag-gold{background:var(--gold3);color:var(--gold)}
.tag-orange{background:var(--orange2);color:var(--orange)}
.tag-purple{background:var(--purple2);color:var(--purple)}
.tag-a{background:#DCFCE7;color:#15803D}
.tag-b{background:#FEF9C3;color:#854D0E}
.tag-c{background:#FEE2E2;color:#991B1B}

/* SEMÁFOROS */
.sf-ok{color:var(--green);background:var(--green2);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}
.sf-warn{color:var(--orange);background:var(--orange2);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}
.sf-low{color:var(--red);background:var(--red2);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}
.sf-zero{color:#fff;background:var(--red);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}

/* ALERTA BANNERS */
.alert-bar{border-radius:var(--r);padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.alert-critico{background:linear-gradient(135deg,#450a0a,#7F1D1D);color:#FCA5A5;border:1px solid rgba(220,38,38,.3)}
.alert-warn{background:var(--orange2);color:var(--orange);border:1.5px solid rgba(217,119,6,.2)}

/* BUSCADOR PRODUCTO */
.prod-search{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 14px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:all .2s;width:100%}
.prod-search:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,111,212,.1)}

/* CIERRES PERÍODO */
.periodo-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:14px;transition:all .2s;cursor:pointer}
.periodo-card:hover{border-color:var(--blue);background:var(--blue3)}
.periodo-card.active{border-color:var(--navy);background:var(--blue3)}
.periodo-lbl{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:4px}
.periodo-stats{font-size:10px;color:var(--text3)}

/* LOADING */
.loading{text-align:center;padding:70px 20px;color:var(--text3);font-size:13px}
.ls{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red2);border:1.5px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:13px 16px;color:var(--red);font-size:12px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;width:200px;margin:10px auto}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:4px;transition:width .3s}
</style>
</head>
<body>
<header>
  <div class="hlogo">
    <img src="https://i.ibb.co/gbVD1bq5/logo-JOTA-MUNDIAL-SAS-original.png" alt="JM" style="height:42px;width:auto;object-fit:contain;display:block;mix-blend-mode:lighten">
    <div><div class="logo-nm">JOTA MUNDIAL SAS</div><span class="logo-sb">Inventarios · Bodega</span></div>
    <div class="hdiv"></div>
    <span class="htitle">SIESA SBS · Tiempo Real</span>
  </div>
  <div class="hright">
    <a href="https://liderti-jpg.github.io/dashboard-ventas/centro-dashboards-jm.html" class="btn-centro">← Centro</a>
    <span id="ts"></span>
    <div class="badge-live" id="bl"><span class="dot-live"></span>EN VIVO</div>
    <button class="btn-ref" id="br" onclick="cargar()">↻ Actualizar</button>
  </div>
</header>

<div class="main">
  <!-- FILTROS -->
  <div class="fp">
    <div class="fph">⊞ Filtros</div>
    <div class="fr">
      <div class="fg"><label>Tipo inventario</label>
        <select id="ftipo"><option value="">Todos</option></select>
      </div>
      <div class="fg"><label>ABC Rotación</label>
        <select id="fabc">
          <option value="">Todos</option>
          <option value="A">A — Alta rotación</option>
          <option value="B">B — Media rotación</option>
          <option value="C">C — Baja rotación</option>
        </select>
      </div>
      <div class="fg"><label>Stock</label>
        <select id="fstock">
          <option value="">Todos</option>
          <option value="con">Con stock</option>
          <option value="sin">Sin stock</option>
          <option value="bajo">Bajo mínimo</option>
          <option value="critico">Sin mov. +90d</option>
        </select>
      </div>
      <div class="fg"><label>Buscar producto</label>
        <input type="text" id="fbuscar" placeholder="Referencia o descripción…" oninput="ap()" style="min-width:220px">
      </div>
      <button class="ba" onclick="ap()">Aplicar</button>
      <button class="bcl" onclick="rst()">Limpiar</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="vtabs">
    <button class="vt active" onclick="sv('r',this)">📊 Resumen</button>
    <button class="vt" onclick="sv('s',this)">📦 Stock Actual</button>
    <button class="vt" onclick="sv('v',this)">💤 Sin Movimiento</button>
    <button class="vt" onclick="sv('abc',this)">🏆 Análisis ABC</button>
    <button class="vt" onclick="sv('c',this)">📅 Cierres Mensuales</button>
    <button class="vt" onclick="sv('t',this)">📈 Tendencia</button>
    <button class="vt" onclick="sv('p',this)">🔍 Por Producto</button>
  </div>

  <div id="ct"><div class="loading"><div class="ls"></div>Conectando con SIESA…</div></div>
</div>

<script>
const WH_S='https://jotamundial2.app.n8n.cloud/webhook/inventarios-stock';
const WH_C='https://jotamundial2.app.n8n.cloud/webhook/inventarios-cierres';
const MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MF=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CL=['#1A3A6E','#3B6FD4','#0A7A5A','#B8860B','#6B21A8','#C0392B','#0E6655','#D4851A','#1A5276','#6C3483','#148F77','#A04000'];
let rawS=[],rawC=[],vista='r',ch={};

const fCOP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(v);
const fM=v=>{if(v<0)return'-'+fM(-v);if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'MM';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v).toLocaleString('es-CO')};
const fQ=v=>{if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return parseFloat(v).toLocaleString('es-CO',{maximumFractionDigits:2})};

function setLoad(msg,p,t){
  const pct=t>0?Math.round((p/t)*100):0;
  document.getElementById('ct').innerHTML=`<div class="loading"><div class="ls"></div><div>${msg}</div>${t>0?`<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><small style="color:var(--text4);font-size:10px">Página ${p} de ${t} · ${pct}%</small>`:''}</div>`;
}

async function fetchAll(wh,label){
  const r1=await fetch(`${wh}?pagina=1`,{signal:AbortSignal.timeout(60000)});
  if(!r1.ok)throw new Error('HTTP '+r1.status);
  const j1=await r1.json();
  const tot=j1?.detalle?.total_páginas||j1?.detalle?.total_paginas||1;
  const totR=j1?.detalle?.total_registros||0;
  let datos=j1?.detalle?.Datos||[];
  setLoad(`Cargando ${label}… (${datos.length} de ${totR})`,1,tot);
  const BATCH=5;
  for(let p=2;p<=tot;p+=BATCH){
    const ps=[];
    for(let pp=p;pp<p+BATCH&&pp<=tot;pp++)
      ps.push(fetch(`${wh}?pagina=${pp}`,{signal:AbortSignal.timeout(60000)}).then(r=>r.json()).catch(()=>null));
    const res=await Promise.all(ps);
    for(const rx of res) if(rx?.detalle?.Datos) datos=datos.concat(rx.detalle.Datos);
    setLoad(`Cargando ${label}… (${datos.length} de ${totR})`,Math.min(p+BATCH-1,tot),tot);
  }
  return datos;
}

async function cargar(){
  const btn=document.getElementById('br');btn.disabled=true;btn.textContent='⏳';
  try{
    setLoad('Cargando stock actual…',0,0);
    rawS=await fetchAll(WH_S,'stock');
    setLoad('Cargando cierres mensuales…',0,0);
    rawC=await fetchAll(WH_C,'cierres');

    // Normalizar
    rawS=rawS.map(r=>({...r,
      referencia:(r.referencia||'').trim(),
      descripcion:(r.descripcion||'').trim(),
      tipo_inventario:(r.tipo_inventario||'').trim(),
      abc_rotacion:(r.abc_rotacion||'').trim()
    }));
    rawC=rawC.map(r=>({...r,
      referencia:(r.referencia||'').trim(),
      descripcion:(r.descripcion||'').trim()
    }));

    // Poblar filtros
    const tipos=[...new Set(rawS.map(r=>r.tipo_inventario).filter(Boolean))].sort();
    const selTipo=document.getElementById('ftipo');
    selTipo.innerHTML='<option value="">Todos</option>'+tipos.map(t=>`<option value="${t}">${t}</option>`).join('');

    document.getElementById('ts').textContent=new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('bl').style.display='flex';
    ap();
  }catch(e){
    document.getElementById('ct').innerHTML=`<div class="err">❌ ${e.message}<br><button onclick="cargar()" style="margin-top:8px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:7px 14px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700">↻ Reintentar</button></div>`;
  }finally{btn.disabled=false;btn.textContent='↻ Actualizar'}
}

function gF(){return{tipo:document.getElementById('ftipo').value,abc:document.getElementById('fabc').value,stock:document.getElementById('fstock').value,buscar:document.getElementById('fbuscar').value.toLowerCase().trim()}}

function filS(data,f){
  return data.filter(r=>{
    if(f.tipo&&r.tipo_inventario!==f.tipo)return false;
    if(f.abc&&r.abc_rotacion!==f.abc)return false;
    if(f.stock==='con'&&!(r.existencia_actual>0))return false;
    if(f.stock==='sin'&&r.existencia_actual>0)return false;
    if(f.stock==='bajo'&&!(r.stock_minimo>0&&r.disponible<r.stock_minimo))return false;
    if(f.stock==='critico'&&!((r.dias_sin_salida||9999)>90&&r.existencia_actual>0))return false;
    if(f.buscar&&!r.referencia.toLowerCase().includes(f.buscar)&&!r.descripcion.toLowerCase().includes(f.buscar))return false;
    return true;
  });
}

function ap(){dC();const f=gF();const d=filS(rawS,f);render(d,f)}
function rst(){['ftipo','fabc','fstock'].forEach(id=>document.getElementById(id).value='');document.getElementById('fbuscar').value='';ap()}
function sv(v,el){vista=v;document.querySelectorAll('.vt').forEach(t=>t.classList.remove('active'));el.classList.add('active');ap()}
function dC(){Object.values(ch).forEach(c=>{try{c.destroy()}catch(e){}});ch={}}

Chart.defaults.font.family="'Inter',sans-serif";
const tOpts=(cb,leg)=>({responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:!!leg,position:'top',labels:{color:'#3D5280',font:{size:9,weight:'600'},boxWidth:9,padding:10}},tooltip:{backgroundColor:'rgba(11,31,74,.95)',titleColor:'rgba(255,255,255,.5)',titleFont:{size:9},bodyColor:'#fff',bodyFont:{size:11,weight:'700'},padding:10,cornerRadius:8,callbacks:{label:cb||(ctx=>`  ${fCOP(ctx.raw)}`)}}},scales:{y:{ticks:{callback:v=>fM(v),color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9},maxRotation:30},grid:{display:false},border:{display:false}}}});

function render(d,f){
  const c=document.getElementById('ct');
  if(!d.length&&vista!=='c'&&vista!=='t'){c.innerHTML='<div class="loading" style="color:var(--text3)">Sin datos para los filtros seleccionados.</div>';return;}
  if(vista==='r')vR(d,c);
  else if(vista==='s')vS(d,c);
  else if(vista==='v')vV(d,c);
  else if(vista==='abc')vABC(d,c);
  else if(vista==='c')vC(c);
  else if(vista==='t')vT(c);
  else if(vista==='p')vP(d,c);
}

// ══ ANÁLISIS ABC ══════════════════════════════════════════════
function vABC(d,c){
  const abc={A:{items:[],valor:0,unidades:0},B:{items:[],valor:0,unidades:0},C:{items:[],valor:0,unidades:0}};
  d.filter(r=>r.existencia_actual>0).forEach(r=>{
    const k=r.abc_rotacion||'C';
    if(abc[k]){abc[k].items.push(r);abc[k].valor+=parseFloat(r.valor_inventario||0);abc[k].unidades+=parseFloat(r.existencia_actual||0);}
  });
  const totValor=abc.A.valor+abc.B.valor+abc.C.valor;
  const totItems=abc.A.items.length+abc.B.items.length+abc.C.items.length;

  c.innerHTML=`
    <div class="g3" style="margin-bottom:16px">
      ${['A','B','C'].map(k=>{
        const pV=totValor>0?((abc[k].valor/totValor)*100).toFixed(1):0;
        const pI=totItems>0?((abc[k].items.length/totItems)*100).toFixed(1):0;
        const color=k==='A'?'var(--green)':k==='B'?'var(--orange)':'var(--red)';
        const bg=k==='A'?'var(--green2)':k==='B'?'var(--orange2)':'var(--red2)';
        const desc=k==='A'?'Alta rotación — prioridad máxima':k==='B'?'Rotación media — gestión regular':'Baja rotación — revisar existencias';
        return`<div class="card" style="border-color:${color}">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
            <div style="width:44px;height:44px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:${color};font-family:'Playfair Display',serif">${k}</div>
            <div><div style="font-size:11px;font-weight:600;color:var(--text2)">${desc}</div></div>
          </div>

let pTimer=null;
function pSearch(){
  clearTimeout(pTimer);
  pTimer=setTimeout(()=>{
    const q=(document.getElementById('pq')?.value||'').trim().toLowerCase();
    const sug=document.getElementById('pSug');
    const res=document.getElementById('pRes');
    if(!sug||!res)return;
    if(q.length<2){sug.innerHTML='';res.innerHTML='';return;}
    const matches=rawS.filter(r=>r.referencia.toLowerCase().includes(q)||r.descripcion.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){sug.innerHTML='<div style="font-size:12px;color:var(--text3);padding:4px 2px">Sin resultados</div>';res.innerHTML='';return;}
    sug.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${matches.map(m=>`<button onclick="pDetalle('${m.referencia}')" style="background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:6px 12px;font-size:11px;font-family:inherit;cursor:pointer;color:var(--navy);font-weight:600;transition:all .15s" onmouseover="this.style.background='var(--blue3)'" onmouseout="this.style.background='var(--bg3)'">
        <span class="tag tag-${m.abc_rotacion==='A'?'a':m.abc_rotacion==='B'?'b':'c'}" style="margin-right:5px">${m.abc_rotacion||'?'}</span>${m.descripcion.length>35?m.descripcion.substring(0,35)+'…':m.descripcion}
      </button>`).join('')}
    </div>`;
  },220);
}

function pClear(){
  const pq=document.getElementById('pq');if(pq)pq.value='';
  const ps=document.getElementById('pSug');if(ps)ps.innerHTML='';
  const pr=document.getElementById('pRes');if(pr)pr.innerHTML='';
}

function pDetalle(ref){
  dC();
  const stock=rawS.find(r=>r.referencia===ref);
  const movs=rawC.filter(r=>r.referencia===ref).sort((a,b)=>a.periodo-b.periodo);

  const totE=movs.reduce((s,r)=>s+parseFloat(r.cant_entradas||0),0);
  const totS=movs.reduce((s,r)=>s+parseFloat(r.cant_salidas||0),0);
  const totVE=movs.reduce((s,r)=>s+parseFloat(r.vlr_entradas||0),0);
  const totVS=movs.reduce((s,r)=>s+parseFloat(r.vlr_salidas||0),0);
  const perLabels=movs.map(p=>`${MN[p.periodo%100]} ${String(Math.floor(p.periodo/100)).slice(2)}`);

  res.innerHTML=`

        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif">${stock.descripcion}</div>
          <div style="display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center">
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);background:var(--bg3);padding:3px 8px;border-radius:6px">${stock.referencia}</span>
            <span class="tag tag-${stock.abc_rotacion==='A'?'a':stock.abc_rotacion==='B'?'b':'c'}">ABC: ${stock.abc_rotacion||'?'}</span>
            <span class="tag tag-blue">${stock.tipo_inventario.replace('INV143501','IMPORTADO').replace('INV143502','NACIONAL').replace('INV143503','SERVICIO')}</span>
            ${stock.pendiente_entrar>0?`<span class="tag tag-purple">🚚 En tránsito: ${fQ(stock.pendiente_entrar)}</span>`:''}
          </div>
        </div>
      </div>
    </div>
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(155px,1fr));margin-bottom:14px">
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📦</div><div class="kpi-lbl">Stock actual</div><div class="kpi-val">${fQ(stock.existencia_actual)}</div><div class="kpi-sub">Disponible: ${fQ(stock.disponible)}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">💰</div><div class="kpi-lbl">Valor inventario</div><div class="kpi-val">${fM(parseFloat(stock.valor_inventario||0))}</div><div class="kpi-sub">Costo prom: ${fCOP(parseFloat(stock.costo_prom_uni||0))}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📥</div><div class="kpi-lbl">Total entradas</div><div class="kpi-val">${fQ(totE)} und</div><div class="kpi-sub">${fCOP(totVE)}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📤</div><div class="kpi-lbl">Total salidas</div><div class="kpi-val">${fQ(totS)} und</div><div class="kpi-sub">${fCOP(totVS)}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📅</div><div class="kpi-lbl">Últ. salida</div><div class="kpi-val" style="font-size:14px">${stock.fecha_ult_salida?stock.fecha_ult_salida.split('T')[0]:'Sin registro'}</div><div class="kpi-sub">${stock.dias_sin_salida?stock.dias_sin_salida+' días sin salida':''}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📈</div><div class="kpi-lbl">Períodos activo</div><div class="kpi-val">${movs.length}</div><div class="kpi-sub">En historial</div></div>
    </div>
    ${movs.length>0?`
    <div class="card gf"><div class="ct">Historial movimientos — ${stock.descripcion.substring(0,35)} <span class="ct-line"></span></div><div class="cw h280"><canvas id="cPD"></canvas></div></div>
    <div class="card gf">
      <div class="ct">Movimientos por período <span class="ct-line"></span></div>
      <div class="tw"><table><thead><tr>
        <th>Período</th><th class="num">Cant. entradas</th><th class="num">Valor entradas</th>
        <th class="num">Cant. salidas</th><th class="num">Valor salidas</th>
        <th class="num">Neto</th><th class="num">Costo prom.</th><th class="num">Movimientos</th>
      </tr></thead><tbody>
        ${[...movs].reverse().map((r,i)=>{const neto=parseFloat(r.cant_entradas||0)-parseFloat(r.cant_salidas||0);const odd=i%2===0?'':'background:rgba(238,241,248,.3)';
          return`<tr style="${odd}"><td style="font-weight:600">${MF[r.periodo%100]} ${Math.floor(r.periodo/100)}</td>
            <td class="num" style="color:var(--teal)">${fQ(r.cant_entradas||0)}</td>
            <td class="num" style="color:var(--teal);font-weight:700">${fCOP(parseFloat(r.vlr_entradas||0))}</td>
            <td class="num" style="color:var(--orange)">${fQ(r.cant_salidas||0)}</td>
            <td class="num" style="color:var(--orange);font-weight:700">${fCOP(parseFloat(r.vlr_salidas||0))}</td>
            <td class="num"><span class="${neto>=0?'tag tag-green':'tag tag-red'}">${neto>=0?'+':''}${fQ(neto)}</span></td>
            <td class="num">${fCOP(parseFloat(r.costo_prom_cierre||0))}</td>
            <td class="num">${r.num_movimientos||0}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`:'<div class="card gf" style="text-align:center;padding:30px;color:var(--text3)">Sin historial de movimientos para este producto</div>'}`;

  if(movs.length>0){
    setTimeout(()=>{
      const cv=document.getElementById('cPD');if(!cv)return;
      ch.pd=new Chart(cv,{type:'bar',data:{
        labels:perLabels,
        datasets:[
          {type:'bar',label:'Entradas',data:movs.map(r=>parseFloat(r.cant_entradas||0)),backgroundColor:'rgba(10,122,90,.7)',borderRadius:5,borderSkipped:false,order:2},
          {type:'bar',label:'Salidas',data:movs.map(r=>parseFloat(r.cant_salidas||0)),backgroundColor:'rgba(217,119,6,.7)',borderRadius:5,borderSkipped:false,order:2},
          {type:'line',label:'Costo prom.',data:movs.map(r=>parseFloat(r.costo_prom_cierre||0)),borderColor:'#1A3A6E',backgroundColor:'transparent',tension:.4,pointRadius:4,borderWidth:2,yAxisID:'y2',order:1}
        ]
      },options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:9},boxWidth:9,padding:10}},tooltip:{backgroundColor:'rgba(11,31,74,.95)',bodyColor:'#fff',bodyFont:{size:11,weight:'700'},padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.datasetIndex===2?fCOP(ctx.raw):fQ(ctx.raw)+' und'}`}}},scales:{y:{ticks:{callback:v=>fQ(v),color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},y2:{ticks:{callback:v=>fM(v),color:'#7A90B8',font:{size:9}},position:'right',grid:{display:false},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}}}});
    },100);
  }
}

cargar();
setInterval(cargar,30*60*1000);
</script>
</body>
</html>
