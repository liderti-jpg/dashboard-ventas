<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://i.ibb.co/BKyTpZ1g/logo-JOTA-MUNDIAL-SAS-original-mundoo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventarios — Jota Mundial SAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F7FD;--bg2:#FFFFFF;--bg3:#EEF2FB;--bg4:#E3EAF8;
  --navy:#0B1F4A;--navy2:#1A3A6E;--navy3:#2E5199;
  --blue:#3B6FD4;--blue2:#5B8FE8;--blue3:#EAF0FD;
  --teal:#0A7A5A;--teal2:#E6F7F2;
  --gold:#B8860B;--gold2:#D4A017;--gold3:#FFF8E7;
  --text:#0B1F4A;--text2:#3D5280;--text3:#7A90B8;--text4:#A8BAD8;
  --border:#D4DFFA;--border2:#EEF2FB;
  --green:#0A7A5A;--green2:#E6F7F2;
  --red:#C0392B;--red2:#FDECEA;
  --orange:#D97706;--orange2:#FFFBEB;
  --yellow:#CA8A04;--yellow2:#FEF9C3;
  --purple:#6B21A8;--purple2:#F0E6FF;
  --shadow:0 2px 16px rgba(11,31,74,.07);
  --shadow2:0 8px 40px rgba(11,31,74,.12);
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:linear-gradient(135deg,#071530 0%,#0B1F4A 60%,#1A3A6E 100%);padding:0 36px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 24px rgba(0,0,0,.3)}
.hlogo{display:flex;align-items:center;gap:14px}
.logo-nm{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.logo-sb{font-size:9px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:1.8px;text-transform:uppercase;display:block;margin-top:1px}
.hdiv{width:1px;height:28px;background:rgba(255,255,255,.12);margin:0 6px}
.htitle{font-size:11px;color:rgba(255,255,255,.4)}
.hright{display:flex;align-items:center;gap:10px}
.badge-live{display:none;align-items:center;gap:5px;background:rgba(10,122,90,.25);border:1px solid rgba(10,122,90,.4);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:#4ECBA8}
.dot-live{width:5px;height:5px;border-radius:50%;background:#4ECBA8;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.btn-ref{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:var(--rs);padding:8px 18px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;box-shadow:0 3px 10px rgba(180,130,0,.3)}
.btn-ref:hover{opacity:.9;transform:translateY(-1px)}
.btn-ref:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-centro{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--rs);padding:7px 14px;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;transition:all .2s}
.btn-centro:hover{background:rgba(255,255,255,.15)}
#ts{font-size:10px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}

/* MODAL POPUP */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(7,21,48,.7);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border-radius:20px;width:90%;max-width:750px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.35);overflow:hidden;animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px 16px;background:linear-gradient(135deg,#450a0a,#7F1D1D);display:flex;align-items:center;gap:14px;flex-shrink:0}
.modal-head-icon{font-size:26px}
.modal-head-title{font-size:16px;font-weight:700;color:#fff;font-family:'Playfair Display',serif}
.modal-head-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.modal-close{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,.25)}
.modal-body{overflow-y:auto;padding:20px 24px;flex:1}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.btn-sm{padding:7px 16px;border-radius:var(--rs);font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:.15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border)}

/* MAIN */
.main{padding:24px 36px;max-width:1700px;margin:0 auto}
@media(max-width:700px){.main{padding:12px}.hlogo .logo-sb{display:none}}

/* FILTROS */
.fp{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
.fph{font-size:10px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.fr{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.fg select,.fg input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 11px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;min-width:130px;outline:none;transition:all .2s}
.fg select:focus,.fg input:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,111,212,.1)}
.ba{background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:7px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;height:34px;transition:all .2s}
.ba:hover{background:var(--navy2)}
.bcl{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 12px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;height:34px}

/* TABS */
.vtabs{display:flex;gap:3px;margin-bottom:20px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:4px;width:fit-content;box-shadow:var(--shadow);flex-wrap:wrap}
.vt{padding:7px 15px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.vt.active{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;box-shadow:0 3px 12px rgba(11,31,74,.2)}
.vt:not(.active):hover{background:var(--bg3);color:var(--navy)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;transition:all .22s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kbar,linear-gradient(90deg,var(--blue),var(--navy)));opacity:.8}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow2)}
.kpi-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;background:var(--kbg,var(--blue3))}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;line-height:1.1;margin-bottom:3px;word-break:break-all}
.kpi-sub{font-size:10px;color:var(--text3)}
.kpi-clickable{cursor:pointer;border-color:var(--red)!important}
.kpi-clickable:hover{background:var(--red2)!important;transform:translateY(-3px)}
.kpi-clickable .kpi-hint{font-size:9px;color:var(--red);margin-top:5px;font-weight:700;display:flex;align-items:center;gap:4px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.gf{margin-bottom:14px}
@media(max-width:1200px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.ct{font-size:9px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ct-line{flex:1;height:1px;background:var(--border2)}
.cw{position:relative}.h200{height:200px}.h240{height:240px}.h260{height:260px}.h280{height:280px}.h300{height:300px}.h340{height:340px}

/* FILTRO INTERNO (stock actual / sin movimiento) */
.inner-filter{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.inner-filter input,.inner-filter select{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:.2s}
.inner-filter input:focus,.inner-filter select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,111,212,.1)}
.inner-filter input{min-width:200px}
.if-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:3px}

/* GRUPOS DESPLEGABLE */
.grupo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.grupo-row{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden;transition:.2s}
.grupo-row.open{border-color:var(--blue)}
.grupo-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:.2s}
.grupo-header:hover{background:var(--blue3)}
.grupo-row.open .grupo-header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff}
.grupo-arrow{font-size:11px;margin-left:auto;transition:.2s;color:var(--text3)}
.grupo-row.open .grupo-arrow{transform:rotate(90deg);color:#fff}
.grupo-row.open .grupo-stats-lbl{color:rgba(255,255,255,.6)!important}
.grupo-name{font-size:13px;font-weight:700}
.grupo-stats{display:flex;gap:14px;margin-left:auto;margin-right:8px}
.grupo-stat{text-align:right}
.grupo-stats-lbl{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.grupo-stats-val{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.grupo-body{display:none;padding:0 0 4px}
.grupo-row.open .grupo-body{display:block}
.grupo-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)}
.grupo-badge-dark{background:var(--blue3);color:var(--navy3)}

/* TABLA */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;background:var(--bg3);color:var(--text3);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1.5px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--blue3)}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px}
.bb{background:var(--bg4);border-radius:4px;height:4px;margin-top:4px;min-width:50px}
.bf{background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:4px;height:4px;transition:width .8s ease}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.tag-blue{background:var(--blue3);color:var(--navy3)}
.tag-green{background:var(--green2);color:var(--green)}
.tag-red{background:var(--red2);color:var(--red)}
.tag-gold{background:var(--gold3);color:var(--gold)}
.tag-orange{background:var(--orange2);color:var(--orange)}
.tag-purple{background:var(--purple2);color:var(--purple)}
.tag-a{background:#DCFCE7;color:#15803D}
.tag-b{background:#FEF9C3;color:#854D0E}
.tag-c{background:#FEE2E2;color:#991B1B}

/* SEMÁFOROS */
.sf-ok{color:var(--green);background:var(--green2);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}
.sf-warn{color:var(--orange);background:var(--orange2);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}
.sf-low{color:var(--red);background:var(--red2);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}
.sf-zero{color:#fff;background:var(--red);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;display:inline-block}

/* ALERTAS BANNER */
.alert-bar{border-radius:var(--r);padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.2s}
.alert-bar:hover{opacity:.88;transform:translateX(3px)}
.alert-critico{background:linear-gradient(135deg,#450a0a,#7F1D1D);color:#FCA5A5;border:1px solid rgba(220,38,38,.3)}
.alert-warn{background:var(--orange2);color:var(--orange);border:1.5px solid rgba(217,119,6,.2)}
.alert-hint{font-size:10px;font-weight:700;margin-top:3px;opacity:.8}

/* BUSCADOR PRODUCTO */
.prod-search{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 14px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:all .2s;width:100%}
.prod-search:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,111,212,.1)}

/* LOADING */
.loading{text-align:center;padding:70px 20px;color:var(--text3);font-size:13px}
.ls{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red2);border:1.5px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:13px 16px;color:var(--red);font-size:12px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;width:200px;margin:10px auto}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:4px;transition:width .3s}
</style>
</head>
<body>

<!-- MODAL BAJO STOCK -->
<div class="modal-overlay" id="modalBajoStock" onclick="if(event.target===this)cerrarModal('modalBajoStock')">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-icon">⚠️</div>
      <div>
        <div class="modal-head-title" id="mBajoTitulo">Productos bajo stock mínimo</div>
        <div class="modal-head-sub" id="mBajoSub"></div>
      </div>
      <button class="modal-close" onclick="cerrarModal('modalBajoStock')">✕</button>
    </div>
    <div class="modal-body" id="mBajoCuerpo"></div>
    <div class="modal-foot">
      <button class="btn-sm btn-ghost" onclick="cerrarModal('modalBajoStock')">Cerrar</button>
      <button class="btn-sm btn-primary" onclick="irAStock()">Ver en Stock Actual →</button>
    </div>
  </div>
</div>

<!-- MODAL SIN MOVIMIENTO -->
<div class="modal-overlay" id="modalSinMov" onclick="if(event.target===this)cerrarModal('modalSinMov')">
  <div class="modal-box">
    <div class="modal-head" style="background:linear-gradient(135deg,#1e1b4b,#4c1d95)">
      <div class="modal-head-icon">💀</div>
      <div>
        <div class="modal-head-title" id="mSinTitulo">Productos sin movimiento</div>
        <div class="modal-head-sub" id="mSinSub"></div>
      </div>
      <button class="modal-close" onclick="cerrarModal('modalSinMov')">✕</button>
    </div>
    <div class="modal-body" id="mSinCuerpo"></div>
    <div class="modal-foot">
      <button class="btn-sm btn-ghost" onclick="cerrarModal('modalSinMov')">Cerrar</button>
      <button class="btn-sm btn-primary" onclick="irASinMov()">Ver en Sin Movimiento →</button>
    </div>
  </div>
</div>

<header>
  <div class="hlogo">
    <img src="https://i.ibb.co/gbVD1bq5/logo-JOTA-MUNDIAL-SAS-original.png" alt="JM" style="height:42px;width:auto;object-fit:contain;display:block;mix-blend-mode:lighten">
    <div><div class="logo-nm">JOTA MUNDIAL SAS</div><span class="logo-sb">Inventarios · Bodega</span></div>
    <div class="hdiv"></div>
    <span class="htitle">SIESA SBS · Tiempo Real</span>
  </div>
  <div class="hright">
    <a href="https://liderti-jpg.github.io/dashboard-ventas/centro-dashboards-jm.html" class="btn-centro">← Centro</a>
    <span id="ts"></span>
    <div class="badge-live" id="bl"><span class="dot-live"></span>EN VIVO</div>
    <button class="btn-ref" id="br" onclick="cargar()">↻ Actualizar</button>
  </div>
</header>

<div class="main">
  <div class="fp">
    <div class="fph">⊞ Filtros globales</div>
    <div class="fr">
      <div class="fg"><label>Grupo</label>
        <select id="fgrupo"><option value="">Todos</option></select>
      </div>
      <div class="fg"><label>Tipo inventario</label>
        <select id="ftipo"><option value="">Todos</option></select>
      </div>
      <div class="fg"><label>ABC Rotación</label>
        <select id="fabc">
          <option value="">Todos</option>
          <option value="A">A — Alta rotación</option>
          <option value="B">B — Media rotación</option>
          <option value="C">C — Baja rotación</option>
        </select>
      </div>
      <div class="fg"><label>Estado stock</label>
        <select id="fstock">
          <option value="">Todos</option>
          <option value="con">Con stock</option>
          <option value="sin">Sin stock</option>
          <option value="bajo">Bajo mínimo</option>
          <option value="critico">Sin mov. +90d</option>
        </select>
      </div>
      <div class="fg"><label>Buscar producto</label>
        <input type="text" id="fbuscar" placeholder="Referencia o descripción…" oninput="ap()" style="min-width:220px">
      </div>
      <button class="ba" onclick="ap()">Aplicar</button>
      <button class="bcl" onclick="rst()">Limpiar</button>
    </div>
  </div>

  <div class="vtabs">
    <button class="vt active" onclick="sv('r',this)">📊 Resumen</button>
    <button class="vt" onclick="sv('s',this)">📦 Stock Actual</button>
    <button class="vt" onclick="sv('v',this)">💤 Sin Movimiento</button>
    <button class="vt" onclick="sv('abc',this)">🏆 Análisis ABC</button>
    <button class="vt" onclick="sv('c',this)">📅 Cierres Mensuales</button>
    <button class="vt" onclick="sv('t',this)">📈 Tendencia</button>
    <button class="vt" onclick="sv('p',this)">🔍 Por Producto</button>
  </div>

  <div id="ct"><div class="loading"><div class="ls"></div>Conectando con SIESA…</div></div>
</div>

<script>
const WH_S='https://jotamundial2.app.n8n.cloud/webhook/inventarios-stock';
const WH_C='https://jotamundial2.app.n8n.cloud/webhook/inventarios-cierres';
const MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function abrirModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}
function cerrarModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}
function irAStock(){cerrarModal('modalBajoStock');sv('s',document.querySelectorAll('.vt')[1]);document.getElementById('fstock').value='bajo';ap()}
function irASinMov(){cerrarModal('modalSinMov');sv('v',document.querySelectorAll('.vt')[2]);ap()}

function mostrarModalBajoStock(data){
  const bajMin=data.filter(r=>r.stock_minimo>0&&r.disponible<r.stock_minimo);
  if(!bajMin.length)return;
  document.getElementById('mBajoTitulo').textContent=`⚠️ ${bajMin.length} producto${bajMin.length>1?'s':''} bajo stock mínimo`;
  document.getElementById('mBajoSub').textContent=`Capital en riesgo: ${fCOP(bajMin.reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0))}`;
  document.getElementById('mBajoCuerpo').innerHTML=`
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th style="text-align:left;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Descripción</th>
        <th style="text-align:right;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Stock actual</th>
        <th style="text-align:right;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Mínimo</th>
        <th style="text-align:right;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Diferencia</th>
        <th style="text-align:right;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Valor</th>
      </tr></thead>
      <tbody>${bajMin.sort((a,b)=>(a.disponible/a.stock_minimo)-(b.disponible/b.stock_minimo)).map((r,i)=>{
        const diff=r.disponible-r.stock_minimo;
        const pct=Math.round((r.disponible/r.stock_minimo)*100);
        const odd=i%2===0?'':'background:rgba(238,241,248,.4)';
        return`<tr style="${odd}">
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2)">
            <div style="font-weight:600;font-size:11px">${r.descripcion.length>38?r.descripcion.substring(0,38)+'…':r.descripcion}</div>
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace">${r.referencia}</div>
          </td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--red)">${fQ(r.disponible)}</td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right;font-family:'JetBrains Mono',monospace">${fQ(r.stock_minimo)}</td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right"><span style="background:var(--red2);color:var(--red);border-radius:20px;padding:2px 7px;font-size:9px;font-weight:700">${fQ(diff)} (${pct}%)</span></td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--gold)">${fCOP(parseFloat(r.valor_inventario||0))}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  abrirModal('modalBajoStock');
}

function mostrarModalSinMov(data,diasMin,diasMax){
  // diasMax = undefined significa "sin límite superior" (ej: +180d)
  const sinMov=data.filter(r=>{
    if(!(r.existencia_actual>0))return false;
    const d=r.dias_sin_salida||9999;
    if(d<=diasMin)return false;
    if(diasMax!==undefined&&d>diasMax)return false;
    return true;
  });
  if(!sinMov.length)return;

  // Configuración visual por rango
  const cfg={
    30:{emoji:'⏰',label:'31–60 días',color:'linear-gradient(135deg,#92400E,#D97706)',sub:'Atención temprana'},
    60:{emoji:'⚡',label:'61–90 días',color:'linear-gradient(135deg,#78350F,#B45309)',sub:'Requiere revisión'},
    90:{emoji:'🔴',label:'91–180 días',color:'linear-gradient(135deg,#7F1D1D,#C0392B)',sub:'Stock crítico'},
    180:{emoji:'💀',label:'+180 días',color:'linear-gradient(135deg,#1e1b4b,#4c1d95)',sub:'Posiblemente obsoleto'},
  }[diasMin]||{emoji:'💤',label:`+${diasMin}d`,color:'linear-gradient(135deg,#1A3A6E,#3B6FD4)',sub:''};

  const totalVal=sinMov.reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0);
  document.getElementById('mSinTitulo').textContent=`${cfg.emoji} ${sinMov.length} productos sin movimiento — ${cfg.label}`;
  document.getElementById('mSinSub').textContent=`Capital inmovilizado: ${fCOP(totalVal)}`;
  // Cambiar color del header del modal dinámicamente
  const head=document.querySelector('#modalSinMov .modal-head');
  if(head)head.style.background=cfg.color;

  document.getElementById('mSinCuerpo').innerHTML=`
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr>
        <th style="text-align:left;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Descripción</th>
        <th style="text-align:right;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Stock</th>
        <th style="text-align:right;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Días sin salida</th>
        <th style="text-align:right;padding:8px 10px;background:var(--bg3);color:var(--text3);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1.5px solid var(--border)">Valor</th>
      </tr></thead>
      <tbody>${sinMov.sort((a,b)=>(b.dias_sin_salida||0)-(a.dias_sin_salida||0)).map((r,i)=>{
        const d=r.dias_sin_salida||0;
        const cls=d>180?'background:#4c1d95;color:#DDD6FE':d>90?'background:var(--red2);color:var(--red)':'background:var(--orange2);color:var(--orange)';
        const odd=i%2===0?'':'background:rgba(238,241,248,.4)';
        return`<tr style="${odd}">
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2)">
            <div style="font-weight:600;font-size:11px">${r.descripcion.length>40?r.descripcion.substring(0,40)+'…':r.descripcion}</div>
            <div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace">${r.referencia}</div>
          </td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700">${fQ(r.existencia_actual)}</td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right"><span style="border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;${cls}">${d}d</span></td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--gold)">${fCOP(parseFloat(r.valor_inventario||0))}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  abrirModal('modalSinMov');
}

/* ── LOADING ─────────────────────────────── */
function setLoad(msg,p,t){
  const pct=t>0?Math.round((p/t)*100):0;
  document.getElementById('ct').innerHTML=`<div class="loading"><div class="ls"></div><div>${msg}</div>${t>0?`<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><small style="color:var(--text4);font-size:10px">Página ${p} de ${t} · ${pct}%</small>`:''}</div>`;
}

async function fetchAll(wh,label){
  const r1=await fetch(`${wh}?pagina=1`,{signal:AbortSignal.timeout(60000)});
  if(!r1.ok)throw new Error('HTTP '+r1.status+' en '+label);
  const j1=await r1.json();
  // Tolerancia case: Datos / datos
  // Connekta a veces devuelve [{...}] (array) en lugar de {...} — desenvolver si es necesario
  const unwrap=j=>Array.isArray(j)?j[0]:j;
  const getDatos=j=>{const u=unwrap(j);return u?.detalle?.Datos||u?.detalle?.datos||u?.Datos||u?.datos||[];};
  const j1u=unwrap(j1);
  const tot=j1u?.detalle?.total_páginas||j1u?.detalle?.total_paginas||1;
  const totPag=parseInt(tot)||1;
  const totR=j1u?.detalle?.total_registros||0;
  let datos=getDatos(j1);
  setLoad(`Cargando ${label}… (${datos.length} de ${totR})`,1,totPag);
  const BATCH=5;
  for(let p=2;p<=totPag;p+=BATCH){
    const ps=[];
    for(let pp=p;pp<p+BATCH&&pp<=totPag;pp++)
      ps.push(fetch(`${wh}?pagina=${pp}`,{signal:AbortSignal.timeout(60000)}).then(r=>r.json()).catch(()=>null));
    const res=await Promise.all(ps);
    for(const rx of res){const d=getDatos(rx);if(d.length)datos=datos.concat(d);}
    setLoad(`Cargando ${label}… (${datos.length} de ${totR})`,Math.min(p+BATCH-1,totPag),totPag);
  }
  return datos;
}

/* ── CARGAR ─────────────────────────────── */
async function cargar(){
  const btn=document.getElementById('br');btn.disabled=true;btn.textContent='⏳';
  try{
    setLoad('Cargando stock actual…',0,0);
    rawS=await fetchAll(WH_S,'stock');
    setLoad('Cargando cierres mensuales…',0,0);
    rawC=await fetchAll(WH_C,'cierres');

    rawS=rawS.map(r=>{const ref=nrm(r.referencia);return{...r,referencia:ref,descripcion:nrm(r.descripcion),tipo_inventario:nrm(r.tipo_inventario),abc_rotacion:nrm(r.abc_rotacion),grupo:GRUPOS[ref]||'Sin grupo'};});
    rawC=rawC.map(r=>({...r,referencia:nrm(r.referencia),descripcion:nrm(r.descripcion)}));

    const grupos=[...new Set(rawS.map(r=>r.grupo).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    const selGrupo=document.getElementById('fgrupo');
    selGrupo.innerHTML='<option value="">Todos</option>'+grupos.map(g=>`<option value="${g}">${g}</option>`).join('');
    const tipos=[...new Set(rawS.map(r=>r.tipo_inventario).filter(Boolean))].sort();
    const selTipo=document.getElementById('ftipo');
    selTipo.innerHTML='<option value="">Todos</option>'+tipos.map(t=>`<option value="${t}">${t}</option>`).join('');

    document.getElementById('ts').textContent=new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('bl').style.display='flex';
    ap();
  }catch(e){
    document.getElementById('ct').innerHTML=`<div class="err">❌ ${e.message}<br><small>Stock: ${rawS.length} reg · Cierres: ${rawC.length} reg</small><br><button onclick="cargar()" style="margin-top:8px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:7px 14px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700">↻ Reintentar</button></div>`;
  }finally{btn.disabled=false;btn.textContent='↻ Actualizar'}
}

/* ── FILTROS ─────────────────────────────── */
function gF(){return{grupo:document.getElementById('fgrupo').value,tipo:document.getElementById('ftipo').value,abc:document.getElementById('fabc').value,stock:document.getElementById('fstock').value,buscar:document.getElementById('fbuscar').value.toLowerCase().trim()}}
function filS(data,f){
  return data.filter(r=>{
    if(f.grupo&&r.grupo!==f.grupo)return false;
    if(f.tipo&&r.tipo_inventario!==f.tipo)return false;
    if(f.abc&&r.abc_rotacion!==f.abc)return false;
    if(f.stock==='con'&&!(r.existencia_actual>0))return false;
    if(f.stock==='sin'&&r.existencia_actual>0)return false;
    if(f.stock==='bajo'&&!(r.stock_minimo>0&&r.disponible<r.stock_minimo))return false;
    if(f.stock==='critico'&&!((r.dias_sin_salida||9999)>90&&r.existencia_actual>0))return false;
    if(f.buscar&&!r.referencia.toLowerCase().includes(f.buscar)&&!r.descripcion.toLowerCase().includes(f.buscar))return false;
    return true;
  });
}
function ap(){dC();const f=gF();const d=filS(rawS,f);render(d,f)}

function render(d,f){

  else if(vista==='c')vC(c);
  else if(vista==='t')vT(c);
  else if(vista==='p')vP(d,c);
}

function sFilS(){

  const abc=document.getElementById('sfAbc')?.value||'';
  const vista=document.getElementById('sfVista')?.value||'grupos';
  let data=window._stockData||[];
  if(q)data=data.filter(r=>r.referencia.toLowerCase().includes(q)||r.descripcion.toLowerCase().includes(q));
  if(abc)data=data.filter(r=>r.abc_rotacion===abc);
  const cnt=document.getElementById('sfCount');if(cnt)cnt.textContent=fQ(data.length);
  const val=document.getElementById('sfVal');if(val)val.textContent=fCOP(data.reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0));
  const res=document.getElementById('sfResult');if(!res)return;
  if(vista==='tabla'){res.innerHTML=tablaStock(data)}
  else{
    // Por grupos
    const grupos={};data.forEach(r=>{const k=r.grupo||r.tipo_inventario||'Sin grupo';if(!grupos[k])grupos[k]=[];grupos[k].push(r);});
    const gs=Object.entries(grupos).sort((a,b)=>b[1].reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0)-a[1].reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0));
    res.innerHTML=`<div class="grupo-list">${gs.map(([g,items],gi)=>{
      const valG=items.reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0);
      const undG=items.reduce((s,r)=>s+parseFloat(r.existencia_actual||0),0);
      const firstOpen=gi===0?' open':'';
      return`<div class="grupo-row${firstOpen}" id="gS_${gi}">
        <div class="grupo-header" onclick="toggleGrupo('gS_${gi}')">
          <span class="grupo-name">📦 ${g}</span>
          <span class="grupo-badge${firstOpen?'':' grupo-badge-dark'}" style="margin-left:8px">${fQ(items.length)} productos</span>
          <div class="grupo-stats">
            <div class="grupo-stat"><div class="grupo-stats-lbl">Unidades</div><div class="grupo-stats-val">${fQ(undG)}</div></div>

        </div>

    }).join('')}</div>`;
  }
}

        <td class="num" style="color:var(--gold);font-weight:700">${fCOP(parseFloat(r.valor_inventario||0))}</td>
        <td><span class="${st}">${stTxt}</span></td>
        <td style="font-size:10px;color:var(--text3)">${r.fecha_ult_salida?r.fecha_ult_salida.split('T')[0]:'-'}</td>
      </tr>`;
    }).join('')}
  </tbody></table></div>`;
}

function vmFil(){
  const q=(document.getElementById('vmBuscar')?.value||'').toLowerCase().trim();
  const rango=parseInt(document.getElementById('vmRango')?.value||'90');
  const vista=document.getElementById('vmVista')?.value||'grupos';
  let data=(window._sinMovData||[]).filter(r=>(r.dias_sin_salida||9999)>rango);
  if(q)data=data.filter(r=>r.referencia.toLowerCase().includes(q)||r.descripcion.toLowerCase().includes(q));
  data.sort((a,b)=>(b.dias_sin_salida||0)-(a.dias_sin_salida||0));
  const cnt=document.getElementById('vmCount');if(cnt)cnt.textContent=fQ(data.length);
  const val=document.getElementById('vmVal');if(val)val.textContent=fCOP(data.reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0));
  const res=document.getElementById('vmResult');if(!res)return;
  if(vista==='tabla'){res.innerHTML=tablaMovimiento(data);}
  else{
    const grupos={};data.forEach(r=>{const k=r.grupo||r.tipo_inventario||'Sin grupo';if(!grupos[k])grupos[k]=[];grupos[k].push(r);});
    const gs=Object.entries(grupos).sort((a,b)=>b[1].reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0)-a[1].reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0));
    res.innerHTML=`<div class="grupo-list">${gs.map(([g,items],gi)=>{
      const valG=items.reduce((s,r)=>s+parseFloat(r.valor_inventario||0),0);
      const maxDias=Math.max(...items.map(r=>r.dias_sin_salida||0));
      const firstOpen=gi===0?' open':'';
      return`<div class="grupo-row${firstOpen}" id="gV_${gi}">
        <div class="grupo-header" onclick="toggleGrupo('gV_${gi}')">
          <span class="grupo-name">💤 ${g}</span>
          <span class="grupo-badge${firstOpen?'':' grupo-badge-dark'}" style="margin-left:8px">${fQ(items.length)} productos</span>
          <div class="grupo-stats">
            <div class="grupo-stat"><div class="grupo-stats-lbl">Máx. días</div><div class="grupo-stats-val">${maxDias}d</div></div>
            <div class="grupo-stat"><div class="grupo-stats-lbl">Capital inm.</div><div class="grupo-stats-val">${fCOP(valG)}</div></div>
          </div>
          <span class="grupo-arrow">›</span>
        </div>
        <div class="grupo-body">${tablaMovimiento(items)}</div>
      </div>`;
    }).join('')}</div>`;
  }
}

/* ══ CIERRES ════════════════════════════════════════════════════ */
function vC(c){
  if(!rawC.length){c.innerHTML='<div class="loading" style="color:var(--text3)">⏳ Cargando cierres… si persiste pulsa Actualizar.</div>';return;}
  const byPer={};
  rawC.forEach(r=>{
    const k=r.periodo;if(!k)return;
    if(!byPer[k])byPer[k]={periodo:k,entradas:0,salidas:0,vlr_entradas:0,vlr_salidas:0,movimientos:0,productos:new Set()};
    byPer[k].entradas+=parseFloat(r.cant_entradas||0);byPer[k].salidas+=parseFloat(r.cant_salidas||0);
    byPer[k].vlr_entradas+=parseFloat(r.vlr_entradas||0);byPer[k].vlr_salidas+=parseFloat(r.vlr_salidas||0);
    byPer[k].movimientos+=parseInt(r.num_movimientos||0);byPer[k].productos.add(r.referencia);
  });
  const pers=Object.values(byPer).map(x=>({...x,productos:x.productos.size})).sort((a,b)=>a.periodo-b.periodo);
  if(!pers.length){c.innerHTML='<div class="err">Sin datos en rawC — '+rawC.length+' registros cargados pero sin campo período válido.</div>';return;}
  const perLabels=pers.map(p=>`${MN[p.periodo%100]||'?'} ${String(Math.floor(p.periodo/100))}`);

  c.innerHTML=`
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-bottom:18px">
      <div class="kpi" style="--kbg:var(--green2)"><div class="kpi-ic">📅</div><div class="kpi-lbl">Períodos</div><div class="kpi-val">${pers.length}</div><div class="kpi-sub">${perLabels[0]||'—'} → ${perLabels[perLabels.length-1]||'—'}</div></div>
      <div class="kpi" style="--kbg:var(--blue3)"><div class="kpi-ic">📥</div><div class="kpi-lbl">Total entradas</div><div class="kpi-val">${fCOP(pers.reduce((s,p)=>s+p.vlr_entradas,0))}</div><div class="kpi-sub">${fQ(pers.reduce((s,p)=>s+p.entradas,0))} und</div></div>
      <div class="kpi" style="--kbg:var(--orange2)"><div class="kpi-ic">📤</div><div class="kpi-lbl">Total salidas</div><div class="kpi-val">${fCOP(pers.reduce((s,p)=>s+p.vlr_salidas,0))}</div><div class="kpi-sub">${fQ(pers.reduce((s,p)=>s+p.salidas,0))} und</div></div>
      <div class="kpi" style="--kbg:var(--purple2)"><div class="kpi-ic">🔄</div><div class="kpi-lbl">Total movimientos</div><div class="kpi-val">${fQ(pers.reduce((s,p)=>s+p.movimientos,0))}</div><div class="kpi-sub">Prom. ${fQ(Math.round(pers.reduce((s,p)=>s+p.movimientos,0)/Math.max(pers.length,1)))} / período</div></div>
    </div>
    <div class="g2">
      <div class="card gf"><div class="ct">Entradas vs Salidas — valor <span class="ct-line"></span></div><div class="cw h280"><canvas id="cCierreEV"></canvas></div></div>
      <div class="card gf"><div class="ct">Unidades movidas por período <span class="ct-line"></span></div><div class="cw h280"><canvas id="cCierreU"></canvas></div></div>
    </div>
    <div class="card gf">
      <div class="ct">Resumen por período <span class="ct-line"></span><span class="tag tag-blue">${pers.length} períodos</span></div>
      <div class="tw"><table><thead><tr>
        <th>Período</th><th class="num">Cant. entradas</th><th class="num">Valor entradas</th>
        <th class="num">Cant. salidas</th><th class="num">Valor salidas</th>
        <th class="num">Neto und.</th><th class="num">Movimientos</th><th class="num">Productos</th>
      </tr></thead><tbody>
        ${[...pers].reverse().map((p,i)=>{
          const neto=p.entradas-p.salidas;const odd=i%2===0?'':'background:rgba(238,241,248,.3)';
          return`<tr style="${odd}">
            <td style="font-weight:700">${MF[p.periodo%100]||'?'} ${Math.floor(p.periodo/100)}</td>
            <td class="num" style="color:var(--teal)">${fQ(p.entradas)}</td>
            <td class="num" style="color:var(--teal);font-weight:700">${fCOP(p.vlr_entradas)}</td>
            <td class="num" style="color:var(--orange)">${fQ(p.salidas)}</td>
            <td class="num" style="color:var(--orange);font-weight:700">${fCOP(p.vlr_salidas)}</td>
            <td class="num"><span class="${neto>=0?'tag tag-green':'tag tag-red'}">${neto>=0?'+':''}${fQ(neto)}</span></td>
            <td class="num">${fQ(p.movimientos)}</td>
            <td class="num">${fQ(p.productos)}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`;

  ch.cEV=new Chart(document.getElementById('cCierreEV'),{type:'bar',data:{labels:perLabels,datasets:[{label:'Entradas',data:pers.map(p=>p.vlr_entradas),backgroundColor:'rgba(10,122,90,.75)',borderRadius:5,borderSkipped:false},{label:'Salidas',data:pers.map(p=>p.vlr_salidas),backgroundColor:'rgba(217,119,6,.75)',borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:9},boxWidth:9,padding:10}},tooltip:{backgroundColor:'rgba(11,31,74,.95)',bodyColor:'#fff',bodyFont:{size:11,weight:'700'},padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fCOP(ctx.raw)}`}}},scales:{y:{ticks:{callback:v=>fCOP(v),color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}}}});
  ch.cU=new Chart(document.getElementById('cCierreU'),{type:'line',data:{labels:perLabels,datasets:[{label:'Entradas',data:pers.map(p=>p.entradas),borderColor:'#0A7A5A',backgroundColor:'rgba(10,122,90,.08)',fill:true,tension:.4,pointRadius:5,pointBackgroundColor:'#0A7A5A',pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5},{label:'Salidas',data:pers.map(p=>p.salidas),borderColor:'#D97706',backgroundColor:'rgba(217,119,6,.06)',fill:true,tension:.4,pointRadius:5,pointBackgroundColor:'#D97706',pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:9},boxWidth:9,padding:10}},tooltip:{backgroundColor:'rgba(11,31,74,.95)',bodyColor:'#fff',bodyFont:{size:11,weight:'700'},padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fQ(ctx.raw)} und`}}},scales:{y:{ticks:{callback:v=>fQ(v),color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}}}});
}

/* ══ TENDENCIA ══════════════════════════════════════════════════ */
function vT(c){
  if(!rawC.length){c.innerHTML='<div class="loading" style="color:var(--text3)">⏳ Sin datos de cierres cargados aún.</div>';return;}
  const byProd={};
  rawC.forEach(r=>{const k=r.referencia;if(!byProd[k])byProd[k]={ref:k,desc:r.descripcion,salidas:0,entradas:0,vlr_salidas:0};byProd[k].salidas+=parseFloat(r.cant_salidas||0);byProd[k].entradas+=parseFloat(r.cant_entradas||0);byProd[k].vlr_salidas+=parseFloat(r.vlr_salidas||0);});
  const top5=Object.values(byProd).sort((a,b)=>b.vlr_salidas-a.vlr_salidas).slice(0,5);
  const pers=[...new Set(rawC.map(r=>r.periodo).filter(Boolean))].sort();
  const perLabels=pers.map(p=>`${MN[p%100]||'?'} ${String(Math.floor(p/100))}`);
  const rotByPer={};rawC.forEach(r=>{const k=r.periodo;if(!k)return;if(!rotByPer[k])rotByPer[k]={e:0,s:0};rotByPer[k].e+=parseFloat(r.cant_entradas||0);rotByPer[k].s+=parseFloat(r.cant_salidas||0);});

  c.innerHTML=`
    <div class="g2">
      <div class="card gf"><div class="ct">Rotación total — und por período <span class="ct-line"></span></div><div class="cw h280"><canvas id="cTRot"></canvas></div></div>
      <div class="card gf"><div class="ct">Top 5 — valor salidas acumulado <span class="ct-line"></span></div><div class="cw h280"><canvas id="cTTop"></canvas></div></div>
    </div>
    <div class="card gf"><div class="ct">Top 5 productos — tendencia salidas por período <span class="ct-line"></span></div><div class="cw h300"><canvas id="cT5"></canvas></div></div>
    <div class="card gf">
      <div class="ct">Ranking por volumen total de salidas <span class="ct-line"></span><span class="tag tag-blue">${Object.keys(byProd).length} productos</span></div>
      <div class="tw"><table><thead><tr><th>#</th><th>Descripción</th><th class="num">Cant. salidas</th><th class="num">Valor salidas</th><th class="num">Cant. entradas</th><th>Balance</th></tr></thead><tbody>
        ${Object.values(byProd).sort((a,b)=>b.vlr_salidas-a.vlr_salidas).slice(0,20).map((r,i)=>{
          const bal=r.entradas-r.salidas;const ic=['🥇','🥈','🥉'];const odd=i%2===0?'':'background:rgba(238,241,248,.3)';
          return`<tr style="${odd}"><td style="font-size:13px">${ic[i]||`<span style="font-weight:700;color:var(--navy)">${i+1}</span>`}</td>
            <td><div style="font-weight:600;font-size:11px">${r.desc.length>38?r.desc.substring(0,38)+'…':r.desc}</div><div style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace">${r.ref}</div></td>
            <td class="num" style="font-weight:700">${fQ(r.salidas)}</td>
            <td class="num" style="color:var(--orange);font-weight:700">${fCOP(r.vlr_salidas)}</td>
            <td class="num">${fQ(r.entradas)}</td>
            <td><span class="${bal>=0?'tag tag-green':'tag tag-red'}">${bal>=0?'+':''}${fQ(bal)}</span></td>
          </tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`;

  ch.trot=new Chart(document.getElementById('cTRot'),{type:'line',data:{labels:perLabels,datasets:[{label:'Entradas',data:pers.map(p=>rotByPer[p]?.e||0),borderColor:'#0A7A5A',backgroundColor:'rgba(10,122,90,.08)',fill:true,tension:.4,pointRadius:4,borderWidth:2.5,pointBackgroundColor:'#0A7A5A',pointBorderColor:'#fff',pointBorderWidth:2},{label:'Salidas',data:pers.map(p=>rotByPer[p]?.s||0),borderColor:'#D97706',backgroundColor:'rgba(217,119,6,.06)',fill:true,tension:.4,pointRadius:4,borderWidth:2.5,pointBackgroundColor:'#D97706',pointBorderColor:'#fff',pointBorderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:9},boxWidth:9,padding:10}},tooltip:{backgroundColor:'rgba(11,31,74,.95)',bodyColor:'#fff',bodyFont:{size:11,weight:'700'},padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fQ(ctx.raw)} und`}}},scales:{y:{ticks:{callback:v=>fQ(v),color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}}}});
  ch.ttop=new Chart(document.getElementById('cTTop'),{type:'bar',data:{labels:top5.map(r=>r.desc.length>18?r.desc.substring(0,18)+'…':r.desc),datasets:[{data:top5.map(r=>r.vlr_salidas),backgroundColor:CL,borderColor:CL,borderWidth:1.5,borderRadius:6,borderSkipped:false}]},options:{indexAxis:'y',...tOpts()}});
  const td={};top5.forEach(p=>{td[p.ref]=pers.map(per=>{const recs=rawC.filter(r=>r.referencia===p.ref&&r.periodo===per);return recs.reduce((s,r)=>s+parseFloat(r.cant_salidas||0),0);});});
  ch.t5=new Chart(document.getElementById('cT5'),{type:'line',data:{labels:perLabels,datasets:top5.map((p,i)=>({label:p.desc.length>22?p.desc.substring(0,22)+'…':p.desc,data:td[p.ref],borderColor:CL[i],backgroundColor:'transparent',tension:.4,pointRadius:3,borderWidth:2,pointBackgroundColor:CL[i],pointBorderColor:'#fff',pointBorderWidth:1.5,pointHoverRadius:6}))},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:9},boxWidth:9,padding:10}},tooltip:{backgroundColor:'rgba(11,31,74,.95)',bodyColor:'#fff',bodyFont:{size:11,weight:'700'},padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fQ(ctx.raw)} und`}}},scales:{y:{ticks:{callback:v=>fQ(v),color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}}}});
}

/* ══ POR PRODUCTO ═══════════════════════════════════════════════ */
function vP(d,c){
  c.innerHTML=`
    <div class="card gf">
      <div class="ct">🔍 Buscar producto <span class="ct-line"></span></div>
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div class="fg" style="flex:1;min-width:280px"><label>Referencia o descripción</label>
          <input type="text" id="pq" class="prod-search" placeholder="Ej: UPVCH1070 o COVERMAS…" oninput="pSearch()" style="font-size:13px;padding:10px 14px">
        </div>
        <button class="ba" onclick="pSearch()">Buscar</button>
        <button class="bcl" onclick="pClear()">Limpiar</button>
      </div>
      <div id="pSug" style="margin-top:8px"></div>
    </div>
    <div id="pRes"></div>`;
}

let pTimer=null;
function pSearch(){
  clearTimeout(pTimer);
  pTimer=setTimeout(()=>{
    const q=(document.getElementById('pq')?.value||'').trim().toLowerCase();
    const sug=document.getElementById('pSug'),res=document.getElementById('pRes');
    if(!sug||!res)return;
    if(q.length<2){sug.innerHTML='';res.innerHTML='';return;}
    const matches=rawS.filter(r=>r.referencia.toLowerCase().includes(q)||r.descripcion.toLowerCase().includes(q)).slice(0,8);
    if(!matches.length){sug.innerHTML='<div style="font-size:12px;color:var(--text3);padding:4px 2px">Sin resultados</div>';res.innerHTML='';return;}
    sug.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${matches.map(m=>`<button onclick="pDetalle('${m.referencia.replace(/'/g,"&#39;")}')" style="background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:6px 12px;font-size:11px;font-family:inherit;cursor:pointer;color:var(--navy);font-weight:600;transition:all .15s" onmouseover="this.style.background='var(--blue3)'" onmouseout="this.style.background='var(--bg3)'">
        <span class="tag tag-${m.abc_rotacion==='A'?'a':m.abc_rotacion==='B'?'b':'c'}" style="margin-right:5px">${m.abc_rotacion||'?'}</span>${m.descripcion.length>35?m.descripcion.substring(0,35)+'…':m.descripcion}
      </button>`).join('')}
    </div>`;
  },220);
}
function pClear(){const pq=document.getElementById('pq');if(pq)pq.value='';const ps=document.getElementById('pSug');if(ps)ps.innerHTML='';const pr=document.getElementById('pRes');if(pr)pr.innerHTML='';}

function pDetalle(ref){
  dC();
  const stock=rawS.find(r=>r.referencia===ref);
  // Cruce robusto: trim en ambos lados por si quedan diferencias residuales
  const movs=rawC.filter(r=>r.referencia.trim()===ref.trim()).sort((a,b)=>a.periodo-b.periodo);
  // Debug badge
  const _dbg=rawC.length>0?`<span class="tag tag-green" style="margin-left:4px">✓ ${rawC.length} reg. cierres cargados</span>`:`<span class="tag tag-red" style="margin-left:4px">⚠️ rawC vacío — verifica webhook</span>`;
  const res=document.getElementById('pRes');if(!res)return;
  if(!stock){res.innerHTML='<div class="err">Sin datos de stock para este producto.</div>';return;}
  const totE=movs.reduce((s,r)=>s+parseFloat(r.cant_entradas||0),0);
  const totS=movs.reduce((s,r)=>s+parseFloat(r.cant_salidas||0),0);
  const totVE=movs.reduce((s,r)=>s+parseFloat(r.vlr_entradas||0),0);
  const totVS=movs.reduce((s,r)=>s+parseFloat(r.vlr_salidas||0),0);
  const perLabels=movs.map(p=>`${MN[p.periodo%100]||'?'} ${String(Math.floor(p.periodo/100))}`);
  res.innerHTML=`
    <div class="card gf" style="border-color:var(--blue)">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📦</div>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif">${stock.descripcion}</div>
          <div style="display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center">
            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);background:var(--bg3);padding:3px 8px;border-radius:6px">${stock.referencia}</span>
            <span class="tag tag-${stock.abc_rotacion==='A'?'a':stock.abc_rotacion==='B'?'b':'c'}">ABC: ${stock.abc_rotacion||'?'}</span>
            <span class="tag tag-blue">${stock.tipo_inventario}</span>
            ${stock.pendiente_entrar>0?`<span class="tag tag-purple">🚚 En tránsito: ${fQ(stock.pendiente_entrar)}</span>`:''}
          </div>
        </div>
      </div>
    </div>
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(155px,1fr));margin-bottom:14px">
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📦</div><div class="kpi-lbl">Stock actual</div><div class="kpi-val">${fQ(stock.existencia_actual)}</div><div class="kpi-sub">Disponible: ${fQ(stock.disponible)}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">💰</div><div class="kpi-lbl">Valor inventario</div><div class="kpi-val">${fCOP(parseFloat(stock.valor_inventario||0))}</div><div class="kpi-sub">Costo prom: ${fCOP(parseFloat(stock.costo_prom_uni||0))}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📥</div><div class="kpi-lbl">Total entradas</div><div class="kpi-val">${fQ(totE)} und</div><div class="kpi-sub">${fCOP(totVE)}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📤</div><div class="kpi-lbl">Total salidas</div><div class="kpi-val">${fQ(totS)} und</div><div class="kpi-sub">${fCOP(totVS)}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📅</div><div class="kpi-lbl">Últ. salida</div><div class="kpi-val" style="font-size:14px">${stock.fecha_ult_salida?stock.fecha_ult_salida.split('T')[0]:'Sin registro'}</div><div class="kpi-sub">${stock.dias_sin_salida?stock.dias_sin_salida+' días sin salida':''}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📈</div><div class="kpi-lbl">Períodos activo</div><div class="kpi-val">${movs.length}</div><div class="kpi-sub">En historial de cierres ${_dbg}</div></div>
    </div>
    ${movs.length>0?`<div class="card gf"><div class="ct">Historial movimientos <span class="ct-line"></span></div><div class="cw h280"><canvas id="cPD"></canvas></div></div>
    <div class="card gf"><div class="ct">Detalle por período <span class="ct-line"></span></div>
      <div class="tw"><table><thead><tr><th>Período</th><th class="num">Cant. ent.</th><th class="num">Valor ent.</th><th class="num">Cant. sal.</th><th class="num">Valor sal.</th><th class="num">Neto</th><th class="num">Costo prom.</th><th class="num">Movs.</th></tr></thead><tbody>
        ${[...movs].reverse().map((r,i)=>{const neto=parseFloat(r.cant_entradas||0)-parseFloat(r.cant_salidas||0);const odd=i%2===0?'':'background:rgba(238,241,248,.3)';
          return`<tr style="${odd}"><td style="font-weight:600">${MF[r.periodo%100]||'?'} ${Math.floor(r.periodo/100)}</td>
            <td class="num" style="color:var(--teal)">${fQ(r.cant_entradas||0)}</td><td class="num" style="color:var(--teal);font-weight:700">${fCOP(parseFloat(r.vlr_entradas||0))}</td>
            <td class="num" style="color:var(--orange)">${fQ(r.cant_salidas||0)}</td><td class="num" style="color:var(--orange);font-weight:700">${fCOP(parseFloat(r.vlr_salidas||0))}</td>
            <td class="num"><span class="${neto>=0?'tag tag-green':'tag tag-red'}">${neto>=0?'+':''}${fQ(neto)}</span></td>
            <td class="num">${fCOP(parseFloat(r.costo_prom_cierre||0))}</td><td class="num">${r.num_movimientos||0}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`:'<div class="card gf" style="text-align:center;padding:30px;color:var(--text3)">Sin historial de movimientos para este producto en el período consultado</div>'}`;

  if(movs.length>0){
    setTimeout(()=>{
      const cv=document.getElementById('cPD');if(!cv)return;
      ch.pd=new Chart(cv,{type:'bar',data:{labels:perLabels,datasets:[{type:'bar',label:'Entradas',data:movs.map(r=>parseFloat(r.cant_entradas||0)),backgroundColor:'rgba(10,122,90,.7)',borderRadius:5,borderSkipped:false,order:2},{type:'bar',label:'Salidas',data:movs.map(r=>parseFloat(r.cant_salidas||0)),backgroundColor:'rgba(217,119,6,.7)',borderRadius:5,borderSkipped:false,order:2},{type:'line',label:'Costo prom.',data:movs.map(r=>parseFloat(r.costo_prom_cierre||0)),borderColor:'#1A3A6E',backgroundColor:'transparent',tension:.4,pointRadius:4,borderWidth:2,yAxisID:'y2',order:1}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:9},boxWidth:9,padding:10}},tooltip:{backgroundColor:'rgba(11,31,74,.95)',bodyColor:'#fff',bodyFont:{size:11,weight:'700'},padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.datasetIndex===2?fCOP(ctx.raw):fQ(ctx.raw)+' und'}`}}},scales:{y:{ticks:{callback:v=>fQ(v),color:'#7A90B8',font:{size:9}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},y2:{ticks:{callback:v=>fCOP(v),color:'#7A90B8',font:{size:9}},position:'right',grid:{display:false},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}}}});
    },100);
  }
}

cargar();
setInterval(cargar,30*60*1000);
</script>
