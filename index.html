<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas por Asesor — Jota Mundial SAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }

  header { background: #1a1a2e; color: white; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 17px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #last-update { font-size: 12px; opacity: 0.55; }
  #btn-refresh { background: #4f46e5; color: white; border: none; border-radius: 6px; padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 500; }
  #btn-refresh:hover { background: #4338ca; }
  #btn-refresh:disabled { background: #6b7280; cursor: not-allowed; }

  .main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

  .info-bar {
    background: white;
    border-radius: 10px;
    padding: 12px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid #e5e7eb;
    font-size: 12px;
    color: #6b7280;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; margin-right: 6px; }

  .period-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 8px 20px; border-radius: 20px; border: 1.5px solid #d1d5db; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: #6b7280; transition: all 0.15s; }
  .tab.active { background: #4f46e5; border-color: #4f46e5; color: white; }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: white; border-radius: 12px; padding: 20px 22px; border-left: 4px solid #4f46e5; }
  .kpi.green { border-left-color: #10b981; }
  .kpi.amber { border-left-color: #f59e0b; }
  .kpi.red   { border-left-color: #ef4444; }
  .kpi-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
  .kpi-value { font-size: 24px; font-weight: 700; color: #1a1a2e; line-height: 1.2; }
  .kpi-sub   { font-size: 12px; color: #9ca3af; margin-top: 4px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media(max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
  .card { background: white; border-radius: 12px; padding: 22px; }
  .card h2 { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.4px; }
  .chart-wrap { position: relative; height: 280px; }

  .table-card { background: white; border-radius: 12px; padding: 22px; }
  .table-card h2 { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; background: #f9fafb; color: #6b7280; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e5e7eb; white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid #f3f4f6; color: #374151; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }
  .rank { font-weight: 700; color: #9ca3af; font-size: 12px; }
  .rank.top1 { color: #f59e0b; font-size: 16px; }
  .rank.top2 { color: #94a3b8; font-size: 15px; }
  .rank.top3 { color: #b45309; font-size: 14px; }
  .name-cell strong { display: block; font-size: 13px; color: #1f2937; }
  .name-cell small { font-size: 11px; color: #9ca3af; }
  .bar-bg { background: #e5e7eb; border-radius: 4px; height: 5px; margin-top: 5px; min-width: 80px; }
  .bar-fill { background: #4f46e5; border-radius: 4px; height: 5px; transition: width 0.6s ease; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pct-cell { min-width: 80px; }

  .loading { text-align: center; padding: 60px; color: #9ca3af; font-size: 14px; }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: #b91c1c; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>

<header>
  <h1>📊 Ventas por Asesor — Jota Mundial SAS</h1>
  <div class="header-right">
    <span id="last-update"></span>
    <button id="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
</header>

<div class="main">

  <div class="info-bar">
    <div><span class="dot"></span><span id="conn-text">Conectando...</span></div>
    <div>Datos en tiempo real · SIESA SBS · Se actualiza cada 30 min</div>
  </div>

  <div class="period-tabs">
    <button class="tab active" onclick="setPeriod('semana', this)">Esta semana</button>
    <button class="tab" onclick="setPeriod('mes', this)">Este mes</button>
    <button class="tab" onclick="setPeriod('año', this)">Este año</button>
  </div>

  <div id="content">
    <div class="loading">⏳ Cargando datos desde SIESA...</div>
  </div>

</div>

<script>
// ═══════════════════════════════════════
// URL del webhook de n8n — no cambiar
const WEBHOOK_URL = 'https://jotamundial2.app.n8n.cloud/webhook/ventas-asesores';
// ═══════════════════════════════════════

let globalData = null;
let currentPeriod = 'semana';
let chartBar = null;
let chartDona = null;

const formatCOP = v =>
  new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(v);
const formatM = v => {
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  return '$' + (v/1e3).toFixed(0) + 'K';
};

function getSemanaActual() {
  const d = new Date();
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
}

async function cargarDatos() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  btn.textContent = '⏳ Cargando...';
  document.getElementById('last-update').textContent = 'Actualizando...';
  document.getElementById('conn-text').textContent = 'Consultando SIESA...';

  try {
    const r1 = await fetch(WEBHOOK_URL);
    if (!r1.ok) throw new Error(`HTTP ${r1.status}`);
    const d1 = await r1.json();
    const detalle = d1.detalle || d1;
    const todos = detalle.Datos || [];

    globalData = procesarDatos(todos);
    renderAll(globalData);

    const ahora = new Date();
    document.getElementById('last-update').textContent =
      'Actualizado: ' + ahora.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('conn-text').textContent = '✅ Conectado · SIESA SBS QA';

  } catch(e) {
    document.getElementById('conn-text').textContent = '❌ Error de conexión';
    document.getElementById('content').innerHTML =
      `<div class="error-msg">❌ Error al cargar datos: ${e.message}<br><small>Verifica que el workflow de n8n esté activo.</small></div>`;
    document.getElementById('last-update').textContent = 'Error';
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Actualizar';
  }
}

function procesarDatos(registros) {
  const hoy = new Date();
  const añoActual = hoy.getFullYear();
  const mesActual = hoy.getMonth() + 1;
  const semanaActual = getSemanaActual();

  const map = {};
  for (const r of registros) {
    const codigo = (r.asesor_codigo || '').trim();
    const nombre = (r.asesor_nombre || codigo).trim();
    const año = parseInt(r.año);
    const mes = parseInt(r.mes);
    const semana = parseInt(r.semana);
    const neto = parseFloat(r.venta_neta || 0);
    const bruto = parseFloat(r.venta_bruta || 0);
    const facturas = parseInt(r.num_facturas || 0);

    if (!map[codigo]) {
      map[codigo] = {
        codigo, nombre,
        acum_semana: 0, acum_mes: 0, acum_año: 0,
        fact_semana: 0, fact_mes: 0, fact_año: 0,
        bruto_mes: 0, bruto_año: 0
      };
    }
    const a = map[codigo];
    if (año === añoActual) {
      a.acum_año += neto; a.fact_año += facturas; a.bruto_año += bruto;
      if (mes === mesActual) {
        a.acum_mes += neto; a.fact_mes += facturas; a.bruto_mes += bruto;
        if (semana === semanaActual) {
          a.acum_semana += neto; a.fact_semana += facturas;
        }
      }
    }
  }
  return {
    semana: semanaActual, mes: mesActual, año: añoActual,
    asesores: Object.values(map).filter(a => a.codigo !== '9999')
  };
}

function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (globalData) renderAll(globalData);
}

function getVal(a) {
  if (currentPeriod === 'semana') return { v: a.acum_semana, f: a.fact_semana };
  if (currentPeriod === 'mes')    return { v: a.acum_mes,    f: a.fact_mes    };
  return                                 { v: a.acum_año,    f: a.fact_año    };
}

function periodoLabel() {
  if (currentPeriod === 'semana') return `Semana ${globalData.semana}`;
  if (currentPeriod === 'mes') {
    const meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return meses[globalData.mes] + ' ' + globalData.año;
  }
  return 'Año ' + globalData.año;
}

function renderAll(d) {
  const sorted = [...d.asesores].sort((a,b) => getVal(b).v - getVal(a).v);
  const total = sorted.reduce((s,a) => s + getVal(a).v, 0);
  const totalF = sorted.reduce((s,a) => s + getVal(a).f, 0);
  const top = sorted[0];
  const totalAño = sorted.reduce((s,a) => s + a.acum_año, 0);

  document.getElementById('content').innerHTML = `
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Total ventas · ${periodoLabel()}</div>
        <div class="kpi-value">${formatM(total)}</div>
        <div class="kpi-sub">${formatCOP(total)}</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">Líder · ${periodoLabel()}</div>
        <div class="kpi-value" style="font-size:17px">${top ? top.nombre.split(' ').slice(-2).join(' ') : '-'}</div>
        <div class="kpi-sub">${top ? formatM(getVal(top).v) : ''}</div>
      </div>
      <div class="kpi amber">
        <div class="kpi-label">Facturas · ${periodoLabel()}</div>
        <div class="kpi-value">${totalF.toLocaleString('es-CO')}</div>
        <div class="kpi-sub">${sorted.length} asesores activos</div>
      </div>
      <div class="kpi red">
        <div class="kpi-label">Acumulado año ${d.año}</div>
        <div class="kpi-value">${formatM(totalAño)}</div>
        <div class="kpi-sub">${formatCOP(totalAño)}</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>Ventas por asesor · ${periodoLabel()}</h2>
        <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
      </div>
      <div class="card">
        <h2>Participación del total</h2>
        <div class="chart-wrap"><canvas id="chartDona"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <h2>Ranking completo · ${periodoLabel()}</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Asesor</th>
            <th class="num">Esta semana</th>
            <th class="num">Este mes</th>
            <th class="num">Este año</th>
            <th class="num">Facturas</th>
            <th>Participación</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((a, i) => {
            const pct = total > 0 ? ((getVal(a).v / total)*100).toFixed(1) : 0;
            const barW = sorted[0] && getVal(sorted[0]).v > 0
              ? Math.round((getVal(a).v / getVal(sorted[0]).v) * 100) : 0;
            const rankClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
            const rankIcon = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
            return `<tr>
              <td class="rank ${rankClass}">${rankIcon}</td>
              <td class="name-cell">
                <strong>${a.nombre}</strong>
                <small>Cód. ${a.codigo}</small>
              </td>
              <td class="num">${formatM(a.acum_semana)}</td>
              <td class="num">${formatM(a.acum_mes)}</td>
              <td class="num">${formatM(a.acum_año)}</td>
              <td class="num">${getVal(a).f}</td>
              <td class="pct-cell">
                <span style="font-size:12px;font-weight:600;color:#4f46e5">${pct}%</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  const top8 = sorted.slice(0, 8);
  const colores = ['#4f46e5','#7c3aed','#2563eb','#0891b2','#059669','#d97706','#dc2626','#9333ea'];

  const ctx1 = document.getElementById('chartBar').getContext('2d');
  if (chartBar) chartBar.destroy();
  chartBar = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: top8.map(a => a.nombre.split(' ').slice(-2).join(' ')),
      datasets: [{ label: 'Venta neta', data: top8.map(a => getVal(a).v), backgroundColor: colores, borderRadius: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { callback: v => formatM(v), font: {size:11} }, grid: { color: '#f3f4f6' } },
        x: { ticks: { font: {size:10} }, grid: { display: false } }
      }
    }
  });

  const ctx2 = document.getElementById('chartDona').getContext('2d');
  if (chartDona) chartDona.destroy();
  chartDona = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: top8.map(a => a.nombre.split(' ').slice(-2).join(' ')),
      datasets: [{ data: top8.map(a => getVal(a).v), backgroundColor: colores, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: {size:11}, padding: 10, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${formatM(ctx.raw)} (${((ctx.raw/total)*100).toFixed(1)}%)` } }
      }
    }
  });
}

// Cargar al inicio
cargarDatos();

// Auto-refresh cada 30 minutos
setInterval(cargarDatos, 30 * 60 * 1000);
</script>
</body>
</html>
