<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://i.ibb.co/BKyTpZ1g/logo-JOTA-MUNDIAL-SAS-original-mundoo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas — Jota Mundial SAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F8FC;--bg2:#FFFFFF;--bg3:#EEF1F8;--bg4:#E4E9F5;
  --navy:#0B1F4A;--navy2:#1A3A6E;--navy3:#2E5199;
  --blue:#3B6FD4;--blue2:#5B8FE8;--blue3:#EAF0FD;
  --gold:#B8860B;--gold2:#D4A017;--gold3:#FFF8E7;
  --text:#0B1F4A;--text2:#3D5280;--text3:#7A90B8;--text4:#A8BAD8;
  --border:#D8E2F5;--border2:#EEF1F8;
  --green:#0A7A5A;--green2:#E6F7F2;
  --orange:#D97706;--orange2:#FFF7ED;
  --red:#C0392B;--red2:#FDECEA;
  --shadow:0 2px 16px rgba(11,31,74,.07);--shadow2:0 8px 40px rgba(11,31,74,.12);
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{background:var(--navy);padding:0 36px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(11,31,74,.25)}
.hlogo{display:flex;align-items:center;gap:16px}
.logo-nm{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.logo-sb{font-size:9px;color:rgba(255,255,255,.5);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:1px}
.hdivider{width:1px;height:28px;background:rgba(255,255,255,.12);margin:0 4px}
.htitle{font-size:12px;color:rgba(255,255,255,.45);padding-left:4px}
.hright{display:flex;align-items:center;gap:12px}
.badge-live{display:none;align-items:center;gap:6px;background:rgba(10,122,90,.25);border:1px solid rgba(10,122,90,.4);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:600;color:#4ECBA8}
.dot-live{width:6px;height:6px;border-radius:50%;background:#4ECBA8;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.btn-ref{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:var(--rs);padding:9px 20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.3px;transition:all .2s;box-shadow:0 4px 12px rgba(180,130,0,.3)}
.btn-ref:hover{opacity:.9;transform:translateY(-1px)}
.btn-ref:disabled{opacity:.5;cursor:not-allowed;transform:none}
#ts{font-size:11px;color:rgba(255,255,255,.35);font-family:'JetBrains Mono',monospace}
#prog-bar{position:fixed;top:68px;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--blue));width:0;transition:width .3s;z-index:99;display:none}
.main{padding:28px 36px;max-width:1600px;margin:0 auto}
@media(max-width:700px){.main{padding:16px}}
.bc-bar{display:flex;align-items:center;gap:8px;margin-bottom:22px;font-size:12px;color:var(--text3);font-weight:500}
.bc-sep{color:var(--text4)}.bc-cur{color:var(--navy);font-weight:600}
.fp{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:20px;box-shadow:var(--shadow)}
.fph{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:10px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px}
.fr{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.fg select,.fg input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 13px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;min-width:120px;outline:none;transition:all .2s;-webkit-appearance:none}
.fg select:focus,.fg input:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,111,212,.1)}
.fg input[type=date]{min-width:145px}
.ba{background:var(--navy);color:#fff;border:none;border-radius:var(--rs);padding:9px 20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;height:38px;transition:all .2s}
.ba:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(11,31,74,.2)}
.bcl{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 16px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;height:38px;transition:all .2s}
.bcl:hover{background:var(--bg4)}
.vtabs{display:flex;gap:4px;margin-bottom:22px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:5px;width:fit-content;box-shadow:var(--shadow);flex-wrap:wrap}
.vt{padding:8px 18px;border-radius:11px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.2px}
.vt.active{background:var(--navy);color:#fff;box-shadow:0 4px 14px rgba(11,31,74,.2)}
.vt:not(.active):hover{background:var(--bg3);color:var(--navy)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:22px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--navy));opacity:0;transition:opacity .2s}
.kpi:hover{border-color:var(--blue2);transform:translateY(-3px);box-shadow:var(--shadow2)}
.kpi:hover::after{opacity:1}
.kpi-ic{width:36px;height:36px;border-radius:10px;background:var(--blue3);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;line-height:1.1;margin-bottom:5px;word-break:break-all}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-ch{font-size:12px;font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px}
.up{color:var(--green);background:var(--green2)}
.down{color:var(--red);background:var(--red2)}
.neutral{color:var(--text3);background:var(--bg3)}
.kpi-hint{position:absolute;top:12px;right:12px;font-size:9px;color:var(--text4);opacity:0;transition:opacity .2s}
.kpi:hover .kpi-hint{opacity:1}
.mo{position:fixed;inset:0;background:rgba(11,31,74,.5);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.mo.open{opacity:1;pointer-events:all}
.mc{background:var(--bg2);border:1.5px solid var(--border);border-radius:24px;padding:36px;width:90%;max-width:500px;position:relative;transform:translateY(24px);transition:transform .3s;box-shadow:0 24px 80px rgba(11,31,74,.18)}
.mo.open .mc{transform:translateY(0)}
.mcl{position:absolute;top:16px;right:16px;background:var(--bg3);border:1.5px solid var(--border);border-radius:50%;width:32px;height:32px;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mcl:hover{background:var(--bg4);color:var(--navy)}
.mv{font-size:42px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy);line-height:1.1;margin:8px 0;word-break:break-all}
.mn{display:flex;gap:10px;margin-top:24px}
.mn button{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px;color:var(--navy);cursor:pointer;font-size:18px;transition:all .2s;font-weight:600}
.mn button:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.mdts{display:flex;justify-content:center;gap:6px;margin-top:14px}
.mdt{width:6px;height:6px;border-radius:50%;background:var(--bg4);transition:all .2s}
.mdt.active{background:var(--navy);width:22px;border-radius:3px}
.mc-prog{height:3px;background:var(--bg4);border-radius:3px;margin-top:18px;overflow:hidden}
.mc-prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--navy));border-radius:3px;transition:width .4s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.gf{margin-bottom:16px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
.ct{font-size:10px;font-weight:700;color:var(--navy3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px;display:flex;align-items:center;gap:7px}
.ct-line{flex:1;height:1px;background:var(--border2)}
.cw{position:relative}.h240{height:240px}.h280{height:280px}.h320{height:320px}.h360{height:360px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;background:var(--bg3);color:var(--text3);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1.5px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border2);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--blue3)}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
.bb{background:var(--bg4);border-radius:4px;height:6px;margin-top:5px;min-width:80px;overflow:hidden}
.bf{height:6px;border-radius:4px;transition:width .8s ease}
.bf-green{background:linear-gradient(90deg,#0A7A5A,#34D399)}
.bf-orange{background:linear-gradient(90deg,#D97706,#FBBF24)}
.bf-red{background:linear-gradient(90deg,#C0392B,#F87171)}
.bf-blue{background:linear-gradient(90deg,var(--blue),var(--navy))}
.cb2{background:linear-gradient(135deg,var(--blue3),var(--bg2));border:1.5px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
.cr2{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.cvs{background:var(--navy);color:#fff;font-weight:700;font-size:11px;padding:5px 12px;border-radius:20px;letter-spacing:.5px;align-self:center}
.pc{background:linear-gradient(135deg,rgba(59,111,212,.06),var(--bg2) 60%);border:1.5px solid var(--blue2);border-radius:var(--r);padding:22px;margin-bottom:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(59,111,212,.1),transparent 70%);border-radius:50%}
.pb{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border-radius:20px;padding:5px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;box-shadow:0 4px 14px rgba(11,31,74,.2)}
.pg{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:14px}
.pi{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:16px;box-shadow:var(--shadow)}
.pl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-weight:700}
.pv{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy)}
.ps{font-size:11px;color:var(--text3);margin-top:3px}
.loading{text-align:center;padding:80px 20px;color:var(--text3);font-size:14px}
.ls{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
.ls-small{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red2);border:1.5px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:16px 20px;color:var(--red);font-size:13px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-blue{background:var(--blue3);color:var(--navy3)}
.tag-gold{background:#FFF3CD;color:#856404}
.tag-green{background:var(--green2);color:var(--green)}
.tag-orange{background:var(--orange2);color:var(--orange)}
.tag-red{background:var(--red2);color:var(--red)}

/* ── CUMPLIMIENTO ─────────────────────────────────────── */
.cump-anual{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--r);padding:24px 28px;margin-bottom:20px;color:#fff;position:relative;overflow:hidden}
.cump-anual::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:rgba(255,255,255,.04);border-radius:50%}
.cump-anual-title{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.cump-anual-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.cump-anual-val{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff}
.cump-anual-pct{font-size:36px;font-weight:700;font-family:'JetBrains Mono',monospace}
.cump-anual-bar-wrap{flex:1;min-width:200px}
.cump-anual-bar-bg{height:10px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
.cump-anual-bar-fill{height:10px;border-radius:99px;transition:width 1s ease}
.cump-anual-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:5px}
.meta-input-wrap{position:relative;display:inline-flex;align-items:center;gap:6px}
.meta-input{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:var(--rs);padding:6px 12px;font-size:13px;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace;width:160px;outline:none;transition:all .2s}
.meta-input:focus{background:rgba(255,255,255,.2);border-color:var(--gold2)}
.meta-input::placeholder{color:rgba(255,255,255,.4)}
.meta-input-label{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:4px}
.btn-meta-save{background:var(--gold);color:#fff;border:none;border-radius:var(--rs);padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-meta-save:hover{background:var(--gold2);transform:translateY(-1px)}
.cump-table-meta{width:130px}
.meta-cell-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--navy);width:120px;outline:none;transition:all .2s;text-align:right}
.meta-cell-input:focus{border-color:var(--blue);background:var(--bg2);box-shadow:0 0 0 3px rgba(59,111,212,.1)}
.pct-bar-wrap{display:flex;align-items:center;gap:8px;min-width:140px}
.pct-label{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:42px;text-align:right}
.semaforo{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:sem-pulse 2s infinite}
@keyframes sem-pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sem-green{background:var(--green)}
.sem-orange{background:var(--orange)}
.sem-red{background:var(--red)}
.cump-hint{font-size:10px;color:var(--text3);margin-top:4px;font-style:italic}
.global-meta-banner{background:var(--gold3);border:1.5px solid rgba(184,134,11,.25);border-radius:var(--rs);padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.global-meta-banner label{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px}
.global-meta-input{background:#fff;border:1.5px solid rgba(184,134,11,.4);border-radius:8px;padding:6px 12px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--navy);width:150px;outline:none;transition:all .2s}
.global-meta-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.12)}
.btn-aplicar-global{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-aplicar-global:hover{background:var(--gold2)}
@media(max-width:600px){header{padding:0 16px}.vtabs{flex-wrap:wrap;width:100%}.vt{flex:1;text-align:center;padding:7px 8px;font-size:11px}.kpi-val{font-size:17px}.mv{font-size:32px}}
</style>
</head>
<body>
<div id="prog-bar"></div>
<div class="mo" id="kpiMo" onclick="closeMo(event)">
  <div class="mc">
    <button class="mcl" onclick="closeMoBtn()">✕</button>
    <div id="ml" style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px"></div>
    <div id="mv" class="mv"></div>
    <div id="ms" style="font-size:13px;color:var(--text2);margin-top:4px"></div>
    <div id="mc2" style="font-size:13px;font-weight:600;margin-top:8px"></div>
    <div class="mc-prog"><div class="mc-prog-fill" id="mc-pf"></div></div>
    <div class="mn"><button onclick="sk(-1)">←</button><button onclick="sk(1)">→</button></div>
    <div class="mdts" id="mdts"></div>
    <div style="margin-top:14px;font-size:11px;color:var(--text4);text-align:center">← → para navegar · toca fuera para cerrar</div>
  </div>
</div>
<header>
  <div class="hlogo">
    <img src="https://i.ibb.co/gbVD1bq5/logo-JOTA-MUNDIAL-SAS-original.png" alt="Jota Mundial SAS" style="height:42px;width:auto;object-fit:contain;mix-blend-mode:lighten">
    <div>
      <div class="logo-nm">JOTA MUNDIAL SAS</div>
      <span class="logo-sb">Intelligence Dashboard</span>
    </div>
    <div class="hdivider"></div>
    <span class="htitle">SIESA SBS · Producción</span>
  </div>
  <div class="hright">
    <a href="https://liderti-jpg.github.io/dashboard-ventas/centro-dashboards-jm.html" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--rs);padding:7px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);text-decoration:none;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.15)'" onmouseout="this.style.background='rgba(255,255,255,.08)'">← Centro</a>
    <span id="ts"></span>
    <div class="badge-live" id="bl"><span class="dot-live"></span>EN VIVO</div>
    <button class="btn-ref" id="br" onclick="cargar()">↻ Actualizar</button>
  </div>
</header>
<div class="main">
  <div class="bc-bar">
    <span>Ventas</span><span class="bc-sep">›</span>
    <span id="bcVista" class="bc-cur">Resumen</span>
  </div>
  <div class="fp">
    <div class="fph">⊞ Filtros de período</div>
    <div class="fr">
      <div class="fg"><label>Asesor</label><select id="fa"><option value="">Todos los asesores</option></select></div>
      <div class="fg"><label>Año</label>
        <select id="fy">
          <option value="">Todos</option>
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
        </select>
      </div>
      <div class="fg"><label>Mes</label>
        <select id="fm">
          <option value="">Todos</option>
          <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
          <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
          <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
      </div>
      <div class="fg"><label>Desde</label><input type="date" id="fd"></div>
      <div class="fg"><label>Hasta</label><input type="date" id="fh"></div>
      <button class="ba" onclick="ap()">Aplicar</button>
      <button class="bcl" onclick="rst()">Limpiar</button>
    </div>
    <div id="filtro-nota" style="display:none;margin-top:10px;font-size:11px;color:var(--text3);background:var(--blue3);padding:7px 12px;border-radius:var(--rs);border:1px solid var(--border)">
      ℹ️ El rango de fechas filtra por día exacto. Tendencia se agrupa por día si el rango es ≤ 2 meses.
    </div>
  </div>
  <div class="vtabs">
    <button class="vt active" onclick="sv('r',this)">📊 Resumen</button>
    <button class="vt" onclick="sv('c',this)">⚖️ Comparativo</button>
    <button class="vt" onclick="sv('t',this)">📈 Tendencia</button>
    <button class="vt" onclick="sv('k',this)">🏆 Ranking</button>
    <button class="vt" onclick="sv('m',this)">🎯 Cumplimiento</button>
    <button class="vt" onclick="sv('p',this)">🔮 Predicción</button>
  </div>
  <div id="ct">
    <div class="loading"><div class="ls"></div>Cargando datos desde SIESA…</div>
  </div>
</div>
<script>
const WH='https://jotamundial2.app.n8n.cloud/webhook/ventas-asesores';
const MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MF=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CL=['#1A3A6E','#3B6FD4','#0A7A5A','#B8860B','#5B2C8D','#C0392B','#0E6655','#D4851A','#1A5276','#6C3483','#148F77','#A04000'];
let raw=[],vista='r',ch={},kpArr=[],kpIdx=0;

// ── FORMATO ──────────────────────────────────────────────────
const fCOP=v=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(v);
const fM=v=>{if(v<0)return'-'+fM(-v);if(v>=1e12)return'$'+(v/1e12).toFixed(2)+'B';if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'MM';if(v>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v).toLocaleString('es-CO')};
// El usuario ingresa el valor en millones: 215 = $215,000,000
// Si el valor tiene punto o coma de miles (215.000 o 215,000) se limpia
const parseMeta=s=>{
  if(!s)return 0;
  // Quitar símbolo $ y espacios
  let v=s.trim().replace(/\$/g,'').replace(/\s/g,'');
  // Si tiene punto Y coma, el separador de miles es el punto y decimal la coma
  if(v.includes('.') && v.includes(',')) v=v.replace(/\./g,'').replace(',','.');
  // Si solo tiene punto y tiene 3 dígitos después → separador de miles
  else if(v.includes('.') && v.split('.')[1]?.length===3) v=v.replace(/\./g,'');
  // Si solo tiene coma → separador decimal o de miles
  else if(v.includes(',') && v.split(',')[1]?.length===3) v=v.replace(/,/g,'');
  else v=v.replace(',','.');
  const num=parseFloat(v)||0;
  // Si el número es mayor a 100,000 ya está en pesos → usarlo directo
  // Si es menor o igual a 100,000 → multiplicar por 1,000,000 (está en millones)
  return num > 100000 ? num : num * 1e6;
};
const pct=(a,b)=>b===0?null:((a-b)/b*100).toFixed(1);
const pHtml=(a,b)=>{const p=pct(a,b);if(!p)return'<span class="tag neutral">—</span>';const u=parseFloat(p)>=0;return`<span class="tag ${u?'up':'down'}">${u?'▲':'▼'} ${Math.abs(p)}%</span>`};
const pObj=(a,b)=>{const p=pct(a,b);if(!p)return{t:'—',c:'neutral'};const u=parseFloat(p)>=0;return{t:(u?'▲ +':'▼ ')+p+'%',c:u?'up':'down'}};

// ── METAS EN localStorage ──────────────────────────────────
function metaKey(codigo,año,mes){return`jm_meta_${codigo}_${año}_${mes}`}
function metaAnualKey(año){return`jm_meta_anual_${año}`}
function getMeta(codigo,año,mes){return parseFloat(localStorage.getItem(metaKey(codigo,año,mes))||0)}
function setMeta(codigo,año,mes,val){localStorage.setItem(metaKey(codigo,año,mes),val)}
function getMetaAnual(año){return parseFloat(localStorage.getItem(metaAnualKey(año))||0)}
function setMetaAnual(año,val){localStorage.setItem(metaAnualKey(año),val)}

// ── MODAL KPI ────────────────────────────────────────────────
function openMo(arr,i){kpArr=arr;kpIdx=i;rkm();document.getElementById('kpiMo').classList.add('open')}
function closeMo(e){if(e.target.id==='kpiMo')closeMoBtn()}
function closeMoBtn(){document.getElementById('kpiMo').classList.remove('open')}
function sk(d){kpIdx=(kpIdx+d+kpArr.length)%kpArr.length;rkm()}
function rkm(){
  const d=kpArr[kpIdx];
  document.getElementById('ml').textContent=d.label;
  document.getElementById('mv').textContent=d.value;
  document.getElementById('ms').textContent=d.sub||'';
  const c2=document.getElementById('mc2');
  c2.innerHTML=d.change?`<span class="tag ${d.cc}">${d.change}</span>`:'';
  document.getElementById('mdts').innerHTML=kpArr.map((_,i)=>`<div class="mdt ${i===kpIdx?'active':''}"></div>`).join('');
  const pf=document.getElementById('mc-pf');
  if(pf)pf.style.width=`${((kpIdx+1)/kpArr.length)*100}%`;
}
let tx=0;
document.getElementById('kpiMo').addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.getElementById('kpiMo').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)sk(dx<0?1:-1)},{passive:true});
document.addEventListener('keydown',e=>{if(!document.getElementById('kpiMo').classList.contains('open'))return;if(e.key==='ArrowLeft')sk(-1);if(e.key==='ArrowRight')sk(1);if(e.key==='Escape')closeMoBtn()});

// ── BARRA DE PROGRESO DE CARGA ───────────────────────────────
function setProg(pct,show=true){
  const b=document.getElementById('prog-bar');
  b.style.display=show?'block':'none';
  b.style.width=pct+'%';
}

// ── CARGA CON PAGINACIÓN DINÁMICA ────────────────────────────
async function cargar(){
  const btn=document.getElementById('br');
  btn.disabled=true;
  btn.innerHTML='<span class="ls-small"></span>Cargando…';
  document.getElementById('ct').innerHTML='<div class="loading"><div class="ls"></div>Consultando SIESA…</div>';
  setProg(5);
  try{
    // Página 1 → obtener total_paginas
    const r1=await fetch(`${WH}?pagina=1`);
    if(!r1.ok)throw new Error('HTTP '+r1.status);
    const j1=await r1.json();
    const det1=j1.detalle||j1;
    const totalPags=parseInt(det1.total_paginas||det1.totalPaginas||1);
    let datos=[...(det1.Datos||[])];

    setProg(Math.round(100/totalPags));

    // Páginas restantes en lotes de 5
    if(totalPags>1){
      const restantes=Array.from({length:totalPags-1},(_,i)=>i+2);
      const loteSize=5;
      for(let i=0;i<restantes.length;i+=loteSize){
        const lote=restantes.slice(i,i+loteSize);
        const res=await Promise.all(lote.map(p=>fetch(`${WH}?pagina=${p}`).then(r=>r.json())));
        res.forEach(r=>{const d=r.detalle||r;datos.push(...(d.Datos||[]))});
        setProg(Math.round(((i+lote.length+1)/totalPags)*100));
      }
    }

    raw=datos;
    setProg(100);
    setTimeout(()=>setProg(0,false),500);

    // Poblar select de asesores
    const ns=[...new Set(raw.map(r=>(r.asesor_nombre||'').trim()).filter(Boolean))].sort();
    const sel=document.getElementById('fa');
    const cur=sel.value;
    sel.innerHTML='<option value="">Todos los asesores</option>'+ns.map(n=>`<option value="${n}" ${n===cur?'selected':''}>${n}</option>`).join('');

    document.getElementById('ts').textContent=new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('bl').style.display='flex';
    ap();
  }catch(e){
    setProg(0,false);
    document.getElementById('ct').innerHTML=`<div class="err">❌ Error: ${e.message}<br><small>Verifica que el workflow n8n esté activo.</small></div>`;
  }finally{
    btn.disabled=false;
    btn.innerHTML='↻ Actualizar';
  }
}

// ── FILTROS ──────────────────────────────────────────────────
function gF(){return{asesor:document.getElementById('fa').value,año:parseInt(document.getElementById('fy').value)||null,mes:parseInt(document.getElementById('fm').value)||null,desde:document.getElementById('fd').value,hasta:document.getElementById('fh').value}}
function fil(data,f){
  return data.filter(r=>{
    if(f.asesor&&(r.asesor_nombre||'').trim()!==f.asesor)return false;
    if(f.desde||f.hasta){
      const fR=r.fecha||(r.año+'-'+String(r.mes).padStart(2,'0')+'-'+String(r.dia||15).padStart(2,'0'));
      if(f.desde&&fR<f.desde)return false;
      if(f.hasta&&fR>f.hasta)return false;
      return true;
    }
    if(f.año&&parseInt(r.año)!==f.año)return false;
    if(f.mes&&parseInt(r.mes)!==f.mes)return false;
    return true;
  });
}
function ap(){
  dC();
  const f=gF();
  document.getElementById('filtro-nota').style.display=(f.desde||f.hasta)?'block':'none';
  const d=fil(raw,f);
  render(d,f);
}
function rst(){['fa','fm','fd','fh'].forEach(id=>document.getElementById(id).value='');document.getElementById('fy').value='2026';ap()}
function sv(v,el){
  vista=v;
  document.querySelectorAll('.vt').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const lbl={r:'Resumen',c:'Comparativo',t:'Tendencia',k:'Ranking',m:'Cumplimiento',p:'Predicción'};
  document.getElementById('bcVista').textContent=lbl[v]||v;
  ap();
}
function dC(){Object.values(ch).forEach(c=>{try{c.destroy()}catch(e){}});ch={}}

// ── AGREGACIÓN ───────────────────────────────────────────────
function agA(data){
  const m={};
  data.forEach(r=>{
    const k=(r.asesor_codigo||'').trim();
    if(!k||k==='9999')return;
    if(!m[k])m[k]={codigo:k,nombre:(r.asesor_nombre||k).trim(),neto:0,bruto:0,facturas:0};
    m[k].neto+=parseFloat(r.venta_neta||0);
    m[k].bruto+=parseFloat(r.venta_bruta||0);
    m[k].facturas+=parseInt(r.num_facturas||0);
  });
  return Object.values(m).sort((a,b)=>b.bruto-a.bruto);
}
function pLbl(f){
  if(f.desde&&f.hasta)return`${f.desde} → ${f.hasta}`;
  if(f.mes&&f.año)return`${MF[f.mes]} ${f.año}`;
  if(f.año)return`Año ${f.año}`;
  return'Período completo';
}
function render(d,f){
  const c=document.getElementById('ct');
  if(!d.length){c.innerHTML='<div class="loading" style="color:var(--text3)">Sin datos para los filtros seleccionados.</div>';return}
  if(vista==='r')vR(d,f,c);
  else if(vista==='c')vC(f,c);
  else if(vista==='t')vT(d,f,c);
  else if(vista==='k')vK(d,f,c);
  else if(vista==='m')vM(d,f,c);
  else if(vista==='p')vP(f,c);
}

Chart.defaults.font.family="'Inter',sans-serif";
const cOpts=(cb)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(11,31,74,.92)',titleColor:'rgba(255,255,255,.7)',titleFont:{size:11},bodyColor:'#fff',bodyFont:{size:13,weight:'600'},padding:12,cornerRadius:10,callbacks:{label:cb||undefined}}},scales:{y:{ticks:{callback:v=>fM(v),color:'#7A90B8',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9},maxRotation:40},grid:{display:false},border:{display:false}}}});

// ── RESUMEN ──────────────────────────────────────────────────
function vR(d,f,c){
  const a=agA(d);
  const tot=a.reduce((s,x)=>s+x.neto,0);
  const totB=a.reduce((s,x)=>s+x.bruto,0);
  const totF=a.reduce((s,x)=>s+x.facturas,0);
  const top=a[0];
  let prev=[],pL='';
  if(f.mes&&f.año){const pm=f.mes===1?12:f.mes-1,pa=f.mes===1?f.año-1:f.año;prev=fil(raw,{...f,mes:pm,año:pa});pL=`${MN[pm]} ${pa}`}
  else if(f.año){prev=fil(raw,{...f,año:f.año-1});pL=`${f.año-1}`}
  const pT=prev.reduce((s,r)=>s+parseFloat(r.venta_neta||0),0);
  const cam=pObj(tot,pT);
  const kps=[
    {icon:'💰',label:'Venta Neta',value:fCOP(tot),sub:pLbl(f),change:pT>0?cam.t:'',cc:cam.c},
    {icon:'📦',label:'Venta Bruta',value:fCOP(totB),sub:pLbl(f)},
    {icon:'🏆',label:'Líder',value:top?top.nombre.split(' ').slice(-2).join(' '):'—',sub:top?fCOP(top.bruto):''},
    {icon:'📄',label:'Facturas',value:totF.toLocaleString('es-CO'),sub:`${a.length} asesores activos`},
    {icon:'🎯',label:'Ticket Prom.',value:fCOP(totF>0?totB/totF:0),sub:'Por factura (bruto)'},
    {icon:'📊',label:'vs Anterior',value:pT>0?cam.t:'—',sub:pT>0?`${pL}: ${fCOP(pT)}`:'Sin período anterior',cc:cam.c}
  ];
  const kj=JSON.stringify(kps).replace(/'/g,"\\'");
  c.innerHTML=`
    <div class="kpis">
      ${kps.map((k,i)=>`
        <div class="kpi" onclick='openMo(${kj},${i})'>
          <div class="kpi-hint">Clic para ampliar</div>
          <div class="kpi-ic">${k.icon}</div>
          <div class="kpi-lbl">${k.label}</div>
          <div class="kpi-val">${k.value}</div>
          <div class="kpi-sub">${k.sub||''}</div>
          ${k.change?`<div class="kpi-ch ${k.cc}">${k.change} vs ${pL}</div>`:''}
        </div>`).join('')}
    </div>
    <div class="g2">
      <div class="card"><div class="ct">Venta bruta por asesor <span class="ct-line"></span></div><div class="cw h280"><canvas id="cB"></canvas></div></div>
      <div class="card"><div class="ct">Participación de mercado <span class="ct-line"></span></div><div class="cw h280"><canvas id="cD"></canvas></div></div>
    </div>
    <div class="card gf">
      <div class="ct">Detalle por asesor — ${pLbl(f)} <span class="ct-line"></span></div>
      <div class="tw"><table><thead><tr>
        <th>#</th><th>Asesor</th>
        <th class="num">Venta Bruta</th><th class="num">Venta Neta</th>
        <th class="num">Facturas</th><th class="num">Ticket Prom.</th>
        <th>Participación</th>
      </tr></thead><tbody>
        ${a.map((x,i)=>{
          const p=totB>0?((x.bruto/totB)*100).toFixed(2):0;
          const bw=a[0]&&a[0].bruto>0?Math.round((x.bruto/a[0].bruto)*100):0;
          const ic=['🥇','🥈','🥉'];
          const odd=i%2===0?'':'background:rgba(238,241,248,.5)';
          return`<tr style="${odd}">
            <td style="font-size:14px">${ic[i]||`<span style="color:var(--text3);font-weight:700;font-family:'JetBrains Mono',monospace">${i+1}</span>`}</td>
            <td><div style="font-weight:600;color:var(--navy)">${x.nombre}</div><div style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">${x.codigo}</div></td>
            <td class="num"><span style="color:var(--navy2);font-weight:700;font-size:13px">${fCOP(x.bruto)}</span></td>
            <td class="num">${fCOP(x.neto)}</td>
            <td class="num">${x.facturas.toLocaleString('es-CO')}</td>
            <td class="num">${fCOP(x.facturas>0?x.bruto/x.facturas:0)}</td>
            <td style="min-width:110px"><span class="tag tag-blue">${p}%</span><div class="bb"><div class="bf bf-blue" style="width:${bw}%"></div></div></td>
          </tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`;
  const t8=a.slice(0,8);
  ch.b=new Chart(document.getElementById('cB'),{type:'bar',data:{labels:t8.map(x=>x.nombre.split(' ').slice(-2).join(' ')),datasets:[{data:t8.map(x=>x.bruto),backgroundColor:CL.map(c=>c+'22'),borderColor:CL,borderWidth:2,borderRadius:8,borderSkipped:false}]},options:cOpts(ctx=>' '+fCOP(ctx.raw))});
  ch.d=new Chart(document.getElementById('cD'),{type:'doughnut',data:{labels:t8.map(x=>x.nombre.split(' ').slice(-2).join(' ')),datasets:[{data:t8.map(x=>x.bruto),backgroundColor:CL,borderWidth:4,borderColor:'#fff',hoverOffset:10}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#3D5280',font:{size:10},padding:12,boxWidth:10,boxHeight:10}},tooltip:{backgroundColor:'rgba(11,31,74,.92)',bodyColor:'#fff',bodyFont:{size:12,weight:'600'},padding:10,cornerRadius:8,callbacks:{label:ctx=>` ${fCOP(ctx.raw)} (${((ctx.raw/totB)*100).toFixed(1)}%)`}}},cutout:'60%'}});
}

// ── COMPARATIVO ──────────────────────────────────────────────
function vC(f,c){
  const yA=f.año||2026,mA=f.mes||new Date().getMonth()+1;
  c.innerHTML=`
    <div class="cb2">
      <div class="ct" style="margin-bottom:12px">Configura tu comparativo <span class="ct-line"></span></div>
      <div class="cr2">
        <div class="fg"><label>Tipo A</label><select id="cpAt" onchange="bC()"><option value="mes">Mes específico</option><option value="ano">Año completo</option></select></div>
        <div class="fg" id="cpAmw"><label>Mes A</label><select id="cpAm">${MF.slice(1).map((m,i)=>`<option value="${i+1}" ${i+1===mA?'selected':''}>${m}</option>`).join('')}</select></div>
        <div class="fg"><label>Año A</label><select id="cpAy">${[2026,2025,2024,2023].map(y=>`<option value="${y}" ${y===yA?'selected':''}>${y}</option>`).join('')}</select></div>
        <span class="cvs">VS</span>
        <div class="fg"><label>Tipo B</label><select id="cpBt" onchange="bC()"><option value="mesant">Mes anterior (auto)</option><option value="mes">Mes específico</option><option value="anoant">Año anterior (auto)</option><option value="ano">Año completo</option></select></div>
        <div class="fg" id="cpBmw" style="display:none"><label>Mes B</label><select id="cpBm">${MF.slice(1).map((m,i)=>`<option value="${i+1}">${m}</option>`).join('')}</select></div>
        <div class="fg" id="cpByw" style="display:none"><label>Año B</label><select id="cpBy">${[2026,2025,2024,2023].map(y=>`<option value="${y}" ${y===(yA-1)?'selected':''}>${y}</option>`).join('')}</select></div>
        <div class="fg"><label>Asesor</label><select id="cpAs"><option value="">Todos</option>${[...new Set(raw.map(r=>(r.asesor_nombre||'').trim()).filter(Boolean))].sort().map(n=>`<option value="${n}">${n}</option>`).join('')}</select></div>
        <button class="ba" onclick="bC()">Comparar</button>
      </div>
    </div>
    <div id="cr3"><div class="loading" style="padding:30px;color:var(--text3)">Configura los períodos y presiona Comparar.</div></div>`;
  bC();
}
function bC(){
  const tA=document.getElementById('cpAt')?.value,tB=document.getElementById('cpBt')?.value;
  if(!tA)return;
  const amw=document.getElementById('cpAmw'),bmw=document.getElementById('cpBmw'),byw=document.getElementById('cpByw');
  if(amw)amw.style.display=tA==='ano'?'none':'';
  if(bmw)bmw.style.display=tB==='mes'?'':'none';
  if(byw)byw.style.display=tB==='ano'?'':'none';
  const yA=parseInt(document.getElementById('cpAy')?.value)||2026;
  const mA=parseInt(document.getElementById('cpAm')?.value)||3;
  let yB,mB;
  if(tB==='mesant'){mB=mA===1?12:mA-1;yB=mA===1?yA-1:yA}
  else if(tB==='anoant'){yB=yA-1;mB=null}
  else if(tB==='ano'){yB=parseInt(document.getElementById('cpBy')?.value)||yA-1;mB=null}
  else{yB=parseInt(document.getElementById('cpBy')?.value)||yA-1;mB=parseInt(document.getElementById('cpBm')?.value)||3}
  const ase=document.getElementById('cpAs')?.value||'';
  const fA={asesor:ase,año:yA,mes:tA==='ano'?null:mA,desde:'',hasta:''};
  const fB={asesor:ase,año:yB,mes:mB,desde:'',hasta:''};
  const aA=agA(fil(raw,fA)),aB=agA(fil(raw,fB));
  const tA2=aA.reduce((s,x)=>s+x.bruto,0),tB2=aB.reduce((s,x)=>s+x.bruto,0);
  const lA=tA==='ano'?`Año ${yA}`:`${MF[mA]} ${yA}`;
  const lB=(tB==='ano'||tB==='anoant')?`Año ${yB}`:`${MF[mB||1]} ${yB}`;
  const cam=pObj(tA2,tB2);
  const todos=[...new Set([...aA.map(x=>x.nombre),...aB.map(x=>x.nombre)])];
  const mA2=Object.fromEntries(aA.map(x=>[x.nombre,x.bruto]));
  const mB2=Object.fromEntries(aB.map(x=>[x.nombre,x.bruto]));
  const comp=todos.map(n=>({n,a:mA2[n]||0,b:mB2[n]||0})).sort((x,y)=>y.a-x.a);
  const res=document.getElementById('cr3');if(!res)return;
  res.innerHTML=`
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr))">
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📅</div><div class="kpi-lbl">${lA}</div><div class="kpi-val">${fCOP(tA2)}</div></div>
      <div class="kpi" style="cursor:default"><div class="kpi-ic">📅</div><div class="kpi-lbl">${lB}</div><div class="kpi-val">${fCOP(tB2)}</div></div>
      <div class="kpi" style="cursor:default;border-color:var(--blue2)"><div class="kpi-ic">⚖️</div><div class="kpi-lbl">Variación</div><div class="kpi-val" style="font-size:22px">${cam.t}</div><div class="kpi-sub">${fCOP(Math.abs(tA2-tB2))} diferencia</div></div>
    </div>
    <div class="card gf"><div class="ct">${lA} vs ${lB} — venta bruta <span class="ct-line"></span></div><div class="cw h320"><canvas id="cCB"></canvas></div></div>
    <div class="card"><div class="ct">Tabla comparativa <span class="ct-line"></span></div>
      <div class="tw"><table><thead><tr><th>Asesor</th><th class="num">${lA}</th><th class="num">${lB}</th><th class="num">Diferencia</th><th class="num">Var. %</th></tr></thead><tbody>
        ${comp.map((x,i)=>{const df=x.a-x.b,u=df>=0;const odd=i%2===0?'':'background:rgba(238,241,248,.5)';return`<tr style="${odd}"><td style="font-weight:600">${x.n}</td><td class="num" style="color:var(--navy2);font-weight:700">${fCOP(x.a)}</td><td class="num">${fCOP(x.b)}</td><td class="num"><span class="tag ${u?'up':'down'}">${u?'+':''}${fCOP(df)}</span></td><td class="num">${pHtml(x.a,x.b)}</td></tr>`}).join('')}
      </tbody></table></div>
    </div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('cCB');if(!ctx)return;
    if(ch.cb)ch.cb.destroy();
    ch.cb=new Chart(ctx,{type:'bar',data:{labels:comp.slice(0,10).map(x=>x.n.split(' ').slice(-2).join(' ')),datasets:[{label:lA,data:comp.slice(0,10).map(x=>x.a),backgroundColor:'rgba(26,58,110,.8)',borderRadius:6,borderSkipped:false},{label:lB,data:comp.slice(0,10).map(x=>x.b),backgroundColor:'rgba(26,58,110,.2)',borderRadius:6,borderSkipped:false}]},options:{...cOpts(ctx=>' '+fCOP(ctx.raw)),plugins:{legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:11},boxWidth:12,padding:16}},tooltip:{backgroundColor:'rgba(11,31,74,.92)',bodyColor:'#fff',bodyFont:{size:12,weight:'600'},padding:10,cornerRadius:8,callbacks:{label:ctx=>' '+fCOP(ctx.raw)}}}}});
  },100);
}

// ── TENDENCIA ────────────────────────────────────────────────
function vT(d,f,c){
  const ase=f.asesor||'';
  const base=ase?raw.filter(r=>(r.asesor_nombre||'').trim()===ase):raw;
  let usaDias=false;
  if(f.desde&&f.hasta){const diff=(new Date(f.hasta)-new Date(f.desde))/(1000*60*60*24);usaDias=diff<=62}
  const pm={};
  base.forEach(r=>{
    let k,l;
    if(usaDias&&r.fecha){k=r.fecha;l=r.fecha.split('-').reverse().join('/')}
    else{k=`${r.año}-${String(r.mes).padStart(2,'0')}`;l=`${MN[r.mes]} ${r.año}`}
    if(!pm[k])pm[k]={l,n:0,b:0,f:0};
    pm[k].n+=parseFloat(r.venta_neta||0);
    pm[k].b+=parseFloat(r.venta_bruta||0);
    pm[k].f+=parseInt(r.num_facturas||0);
  });
  let mk=Object.keys(pm).sort();
  if(f.desde||f.hasta){mk=mk.filter(k=>{if(f.desde&&k<f.desde.substring(0,usaDias?10:7))return false;if(f.hasta&&k>f.hasta.substring(0,usaDias?10:7))return false;return true})}
  const top5=agA(d).slice(0,5);
  const td={};
  top5.forEach(a=>{td[a.nombre]=mk.map(k=>{return base.filter(r=>{if((r.asesor_nombre||'').trim()!==a.nombre)return false;if(usaDias)return r.fecha===k;return`${r.año}-${String(r.mes).padStart(2,'0')}`===k;}).reduce((s,r)=>s+parseFloat(r.venta_bruta||0),0)})});
  const etq=usaDias?'diaria':'mensual';
  c.innerHTML=`
    <div class="g2">
      <div class="card"><div class="ct">Venta bruta ${etq} <span class="ct-line"></span></div><div class="cw h240"><canvas id="cTM"></canvas></div></div>
      <div class="card"><div class="ct">Facturas por ${usaDias?'día':'mes'} <span class="ct-line"></span></div><div class="cw h240"><canvas id="cTF"></canvas></div></div>
    </div>
    <div class="card gf"><div class="ct">Top 5 asesores — tendencia ${etq} venta bruta <span class="ct-line"></span></div><div class="cw h320"><canvas id="cTA"></canvas></div></div>`;
  const tO={responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(11,31,74,.92)',titleColor:'rgba(255,255,255,.6)',titleFont:{size:11},bodyColor:'#fff',bodyFont:{size:12,weight:'600'},padding:12,cornerRadius:10,callbacks:{label:ctx=>' '+fCOP(ctx.raw)}}},scales:{y:{ticks:{callback:v=>fM(v),color:'#7A90B8',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:9},maxRotation:45},grid:{display:false},border:{display:false}}}};
  ch.tM=new Chart(document.getElementById('cTM'),{type:'line',data:{labels:mk.map(k=>pm[k]?.l||k),datasets:[{data:mk.map(k=>pm[k]?.b||0),borderColor:'#1A3A6E',backgroundColor:'rgba(26,58,110,.06)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#1A3A6E',pointBorderColor:'#fff',pointBorderWidth:2,pointHoverRadius:7}]},options:tO});
  ch.tF=new Chart(document.getElementById('cTF'),{type:'bar',data:{labels:mk.map(k=>pm[k]?.l||k),datasets:[{data:mk.map(k=>pm[k]?.f||0),backgroundColor:'rgba(59,111,212,.18)',borderColor:'rgba(59,111,212,.6)',borderWidth:1.5,borderRadius:6}]},options:{...tO,plugins:{...tO.plugins,tooltip:{...tO.plugins.tooltip,callbacks:{label:ctx=>` ${ctx.raw.toLocaleString('es-CO')} facturas`}}}}});
  ch.tA=new Chart(document.getElementById('cTA'),{type:'line',data:{labels:mk.map(k=>pm[k]?.l||k),datasets:top5.map((a,i)=>({label:a.nombre.split(' ').slice(-2).join(' '),data:td[a.nombre],borderColor:CL[i],backgroundColor:'transparent',tension:.4,pointRadius:3,borderWidth:2,pointBackgroundColor:CL[i],pointBorderColor:'#fff',pointBorderWidth:1.5,pointHoverRadius:6}))},options:{...tO,plugins:{...tO.plugins,legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:10},boxWidth:10,padding:14}}}}});
}

// ── RANKING ──────────────────────────────────────────────────
function vK(d,f,c){
  const a=agA(d);
  const tot=a.reduce((s,x)=>s+x.bruto,0);
  const mA=f.mes||new Date().getMonth()+1,yA=f.año||2026;
  const mP=mA===1?12:mA-1,yP=mA===1?yA-1:yA;
  const prev=agA(fil(raw,{asesor:'',año:yP,mes:mP,desde:'',hasta:''}));
  const pp={};prev.forEach((x,i)=>pp[x.codigo]=i+1);
  c.innerHTML=`
    <div class="card">
      <div class="ct">Ranking — ${pLbl(f)} <span class="ct-line"></span><span class="tag tag-blue" style="font-size:10px">vs ${MN[mP]} ${yP}</span></div>
      <div class="tw"><table><thead><tr>
        <th>Pos.</th><th>Mov.</th><th>Asesor</th>
        <th class="num">Venta Bruta</th><th class="num">Venta Neta</th>
        <th class="num">Facturas</th><th class="num">Ticket Prom.</th>
        <th class="num">% Total</th><th>Barra</th>
      </tr></thead><tbody>
        ${a.map((x,i)=>{
          const p=tot>0?((x.bruto/tot)*100).toFixed(2):0;
          const bw=a[0]&&a[0].bruto>0?Math.round((x.bruto/a[0].bruto)*100):0;
          const pos=i+1,pv=pp[x.codigo];
          let mov='<span style="color:var(--text4)">—</span>';
          if(pv){const dv=pv-pos;mov=dv>0?`<span class="tag up">▲${dv}</span>`:dv<0?`<span class="tag down">▼${Math.abs(dv)}</span>`:'<span style="color:var(--text4)">=</span>'}
          const ic=['🥇','🥈','🥉'];
          const odd=i%2===0?'':'background:rgba(238,241,248,.5)';
          return`<tr style="${odd}">
            <td style="font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;font-size:14px">${ic[i]||pos}</td>
            <td>${mov}</td>
            <td><div style="font-weight:600;color:var(--navy)">${x.nombre}</div><div style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">${x.codigo}</div></td>
            <td class="num" style="color:var(--navy2);font-weight:700">${fCOP(x.bruto)}</td>
            <td class="num">${fCOP(x.neto)}</td>
            <td class="num">${x.facturas.toLocaleString('es-CO')}</td>
            <td class="num">${fCOP(x.facturas>0?x.bruto/x.facturas:0)}</td>
            <td class="num"><span class="tag tag-blue">${p}%</span></td>
            <td style="min-width:80px"><div class="bb"><div class="bf bf-blue" style="width:${bw}%"></div></div></td>
          </tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`;
}

// ── CUMPLIMIENTO ─────────────────────────────────────────────
function vM(d,f,c){
  const a=agA(d);
  const totB=a.reduce((s,x)=>s+x.bruto,0);
  const año=f.año||new Date().getFullYear();
  const mes=f.mes||new Date().getMonth()+1;
  const periodoLabel=pLbl(f);

  // ── META ANUAL ────────────────────────────────────────────
  const metaAnual=getMetaAnual(año);
  // ventas brutas del año completo
  const ventaAnual=raw.filter(r=>parseInt(r.año)===año).reduce((s,r)=>s+parseFloat(r.venta_bruta||0),0);
  const pctAnual=metaAnual>0?Math.min((ventaAnual/metaAnual)*100,999):0;
  const colorAnual=pctAnual>=90?'#34D399':pctAnual>=70?'#FBBF24':'#F87171';

  c.innerHTML=`
    <!-- META ANUAL -->
    <div class="cump-anual">
      <div class="cump-anual-title">🗓 Meta Anual ${año}</div>
      <div class="cump-anual-row">
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:3px">Meta anual</div>
          <div class="meta-input-label" style="margin-bottom:3px">Ingresa o edita la meta del año</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input class="meta-input" id="metaAnualInput" placeholder="Ej: 5000 (millones)" value="${metaAnual>0?(metaAnual/1e6).toFixed(0):''}">
            <button class="btn-meta-save" onclick="guardarMetaAnual(${año})">Guardar</button>
          </div>
          <div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:4px">Ingresa en millones · Ej: 5000 = $5,000,000,000</div>
        </div>
        <div style="flex:1;min-width:220px">
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px">
            <div><div style="font-size:11px;color:rgba(255,255,255,.5)">Ventas brutas ${año}</div><div class="cump-anual-val">${fM(ventaAnual)}</div></div>
            <div class="cump-anual-pct" style="color:${colorAnual}">${metaAnual>0?pctAnual.toFixed(1)+'%':'—'}</div>
          </div>
          <div class="cump-anual-bar-bg"><div class="cump-anual-bar-fill" style="width:${Math.min(pctAnual,100)}%;background:${colorAnual}"></div></div>
          <div class="cump-anual-sub">${metaAnual>0?`Meta: ${fM(metaAnual)} · Faltante: ${fM(Math.max(metaAnual-ventaAnual,0))}`:'Define la meta anual para ver el avance'}</div>
        </div>
      </div>
    </div>

    <!-- META GLOBAL DEL MES — suma automática de individuales -->
    <div class="global-meta-banner">
      <label>⚡ Meta total ${periodoLabel}</label>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div id="metaGlobalDisplay" style="font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy)">—</div>
        <div style="font-size:10px;color:var(--gold);font-weight:600">Suma automática de metas individuales</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div id="metaGlobalPct" style="font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy)">—</div>
        <div style="font-size:10px;color:var(--gold);font-weight:600">% cumplimiento total del período</div>
      </div>
      <div style="margin-left:auto;display:flex;flex-direction:column;gap:3px">
        <div style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px">Aplicar meta rápida a todos</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input class="global-meta-input" id="metaGlobalInput" placeholder="Ej: 215 (millones)">
          <button class="btn-aplicar-global" onclick="aplicarMetaGlobal(${año},${mes})">Aplicar a todos</button>
        </div>
        <div style="font-size:10px;color:rgba(0,0,0,.4)">Ingresa en millones · Ej: 215 = $215,000,000</div>
      </div>
    </div>

    <!-- TABLA CUMPLIMIENTO MENSUAL -->
    <div class="card gf">
      <div class="ct">Cumplimiento mensual por asesor — ${periodoLabel} <span class="ct-line"></span>
        <span class="tag tag-blue">Venta bruta</span>
      </div>
      <div class="cump-hint" style="margin-bottom:12px">💡 Haz clic en cualquier meta para editarla. Los valores se guardan automáticamente en este navegador.</div>
      <div class="tw"><table><thead><tr>
        <th>#</th><th>Asesor</th>
        <th class="num">Venta Bruta</th>
        <th class="num cump-table-meta">Meta (millones)</th>
        <th class="num">% Cumplim.</th>
        <th>Progreso</th>
        <th class="num">Faltante / Excedente</th>
        <th class="num">Facturas</th>
      </tr></thead><tbody id="cumpTableBody">
        ${a.map((x,i)=>{
          const meta=getMeta(x.codigo,año,mes);
          const p=meta>0?(x.bruto/meta)*100:0;
          const ic=['🥇','🥈','🥉'];
          const odd=i%2===0?'':'background:rgba(238,241,248,.5)';
          return`<tr style="${odd}" id="crow_${x.codigo}">
            <td style="font-size:14px">${ic[i]||`<span style="font-weight:700;color:var(--text3);font-family:'JetBrains Mono',monospace">${i+1}</span>`}</td>
            <td><div style="font-weight:600;color:var(--navy)">${x.nombre}</div><div style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">${x.codigo}</div></td>
            <td class="num" style="color:var(--navy2);font-weight:700;font-size:13px">${fCOP(x.bruto)}</td>
            <td class="num">
              <input class="meta-cell-input" id="meta_${x.codigo}"
                value="${meta>0?(meta/1e6).toFixed(0):''}"
                placeholder="MM"
                onchange="actualizarFila('${x.codigo}',${x.bruto},${año},${mes})"
                onkeydown="if(event.key==='Enter')this.blur()">
            </td>
            <td class="num" id="pct_${x.codigo}">
              ${meta>0?renderPctTag(p):'<span style="color:var(--text4);font-size:12px">Sin meta</span>'}
            </td>
            <td id="bar_${x.codigo}" style="min-width:140px">
              ${meta>0?renderBar(p):'<div style="color:var(--text4);font-size:11px">— define meta →</div>'}
            </td>
            <td class="num" id="diff_${x.codigo}">
              ${meta>0?renderDiff(x.bruto,meta):'—'}
            </td>
            <td class="num">${x.facturas.toLocaleString('es-CO')}</td>
          </tr>`;
        }).join('')}
      </tbody></table></div>
    </div>

    <!-- GRÁFICO CUMPLIMIENTO -->
    <div class="card gf">
      <div class="ct">% de cumplimiento por asesor <span class="ct-line"></span>
        <span style="font-size:10px;color:var(--text3)">Solo asesores con meta definida</span>
      </div>
      <div class="cw h320"><canvas id="cCump"></canvas></div>
    </div>`;

  dibujarGraficoCump(a,año,mes);
  // Inicializar total global con metas ya guardadas
  actualizarTotalGlobal(totB,año,mes);
}

function renderPctTag(p){
  const cls=p>=90?'tag-green':p>=70?'tag-orange':'tag-red';
  return`<span class="tag ${cls}" style="font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace">${p.toFixed(1)}%</span>`;
}
function renderBar(p){
  const cls=p>=90?'bf-green':p>=70?'bf-orange':'bf-red';
  const w=Math.min(p,100);
  const sem=p>=90?'sem-green':p>=70?'sem-orange':'sem-red';
  return`<div class="pct-bar-wrap">
    <div class="semaforo ${sem}"></div>
    <div style="flex:1"><div class="bb"><div class="bf ${cls}" style="width:${w}%"></div></div></div>
    <span class="pct-label" style="color:${p>=90?'var(--green)':p>=70?'var(--orange)':'var(--red)'}">${p.toFixed(0)}%</span>
  </div>`;
}
function renderDiff(venta,meta){
  const diff=venta-meta;
  const u=diff>=0;
  return`<span class="tag ${u?'up':'down'}">${u?'+':''}${fCOP(diff)}</span>`;
}

function actualizarTotalGlobal(totBruto,año,mes){
  let suma=0;
  document.querySelectorAll('[id^="meta_"]').forEach(el=>{
    const codigo=el.id.replace('meta_','');
    suma+=getMeta(codigo,año,mes);
  });
  const disp=document.getElementById('metaGlobalDisplay');
  const pctEl=document.getElementById('metaGlobalPct');
  if(disp) disp.textContent=suma>0?fCOP(suma):'Sin metas definidas';
  if(pctEl){
    if(suma>0){
      const p=(totBruto/suma)*100;
      const col=p>=90?'var(--green)':p>=70?'var(--orange)':'var(--red)';
      pctEl.textContent=p.toFixed(1)+'%';
      pctEl.style.color=col;
    } else {
      pctEl.textContent='—';
      pctEl.style.color='var(--navy)';
    }
  }
}

function actualizarFila(codigo,bruto,año,mes){
  const inp=document.getElementById(`meta_${codigo}`);
  if(!inp)return;
  const val=parseMeta(inp.value);
  setMeta(codigo,año,mes,val);
  // Normalizar display a millones
  if(val>0) inp.value=(val/1e6).toFixed(0);
  const p=val>0?(bruto/val)*100:0;
  const pEl=document.getElementById(`pct_${codigo}`);
  const bEl=document.getElementById(`bar_${codigo}`);
  const dEl=document.getElementById(`diff_${codigo}`);
  if(pEl)pEl.innerHTML=val>0?renderPctTag(p):'<span style="color:var(--text4);font-size:12px">Sin meta</span>';
  if(bEl)bEl.innerHTML=val>0?renderBar(p):'<div style="color:var(--text4);font-size:11px">— define meta →</div>';
  if(dEl)dEl.innerHTML=val>0?renderDiff(bruto,val):'—';
  // Actualizar total global y gráfico
  const f=gF();const dd=fil(raw,f);const aa=agA(dd);
  const tb=aa.reduce((s,x)=>s+x.bruto,0);
  actualizarTotalGlobal(tb,año,mes);
  dibujarGraficoCump(aa,año,mes);
}

function guardarMetaAnual(año){
  const inp=document.getElementById('metaAnualInput');
  if(!inp)return;
  const val=parseMeta(inp.value);
  setMetaAnual(año,val);
  // rerender
  const f=gF();const d=fil(raw,f);vM(d,f,document.getElementById('ct'));
}

function aplicarMetaGlobal(año,mes){
  const inp=document.getElementById('metaGlobalInput');
  if(!inp||!inp.value)return;
  const val=parseMeta(inp.value);
  if(!val){alert('Ingresa un valor válido en millones. Ej: 215');return}
  document.querySelectorAll('[id^="meta_"]').forEach(el=>{
    const codigo=el.id.replace('meta_','');
    el.value=(val/1e6).toFixed(0);
    setMeta(codigo,año,mes,val);
  });
  const f=gF();const dd=fil(raw,f);const aa=agA(dd);
  const tb=aa.reduce((s,x)=>s+x.bruto,0);
  aa.forEach(x=>{
    const p=(x.bruto/val)*100;
    const pEl=document.getElementById(`pct_${x.codigo}`);
    const bEl=document.getElementById(`bar_${x.codigo}`);
    const dEl=document.getElementById(`diff_${x.codigo}`);
    if(pEl)pEl.innerHTML=renderPctTag(p);
    if(bEl)bEl.innerHTML=renderBar(p);
    if(dEl)dEl.innerHTML=renderDiff(x.bruto,val);
  });
  actualizarTotalGlobal(tb,año,mes);
  dibujarGraficoCump(aa,año,mes);
}

function dibujarGraficoCump(a,año,mes){
  const conMeta=a.filter(x=>getMeta(x.codigo,año,mes)>0);
  if(!conMeta.length)return;
  const ctx=document.getElementById('cCump');
  if(!ctx)return;
  if(ch.cump)ch.cump.destroy();
  const pcts=conMeta.map(x=>{const m=getMeta(x.codigo,año,mes);return m>0?(x.bruto/m)*100:0});
  const bgColors=pcts.map(p=>p>=90?'rgba(10,122,90,.8)':p>=70?'rgba(217,119,6,.8)':'rgba(192,57,43,.8)');
  const borderColors=pcts.map(p=>p>=90?'#0A7A5A':p>=70?'#D97706':'#C0392B');
  ch.cump=new Chart(ctx,{
    type:'bar',
    data:{
      labels:conMeta.map(x=>x.nombre.split(' ').slice(-2).join(' ')),
      datasets:[
        {label:'% Cumplimiento',data:pcts,backgroundColor:bgColors,borderColor:borderColors,borderWidth:2,borderRadius:8,borderSkipped:false},
        {label:'Meta (100%)',data:conMeta.map(()=>100),type:'line',borderColor:'rgba(11,31,74,.3)',borderDash:[6,4],borderWidth:1.5,pointRadius:0,fill:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#3D5280',font:{size:10},boxWidth:10,padding:14}},
        tooltip:{backgroundColor:'rgba(11,31,74,.92)',bodyColor:'#fff',bodyFont:{size:12,weight:'600'},padding:10,cornerRadius:8,callbacks:{label:ctx=>ctx.dataset.label==='% Cumplimiento'?` ${ctx.raw.toFixed(1)}% de cumplimiento`:` Línea de meta 100%`}}
      },
      scales:{
        y:{ticks:{callback:v=>v+'%',color:'#7A90B8',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false},suggestedMax:120},
        x:{ticks:{color:'#7A90B8',font:{size:9}},grid:{display:false},border:{display:false}}
      }
    }
  });
}

// ── PREDICCIÓN ───────────────────────────────────────────────
function vP(f,c){
  const ahora=new Date();
  const mP2=ahora.getMonth()+2,aP=mP2>12?ahora.getFullYear()+1:ahora.getFullYear(),mP=mP2>12?1:mP2;
  const hist={};
  raw.forEach(r=>{if(parseInt(r.mes)===mP){const ano=parseInt(r.año);if(!hist[ano])hist[ano]=0;hist[ano]+=parseFloat(r.venta_bruta||0)}});
  const anos=Object.keys(hist).map(Number).sort();
  const vals=anos.map(a=>hist[a]);
  if(!vals.length){c.innerHTML=`<div class="pc"><div class="loading" style="padding:30px">Sin historial para predecir ${MF[mP]}.</div></div>`;return}
  const pw=vals.map((_,i)=>i+1),tpw=pw.reduce((s,p)=>s+p,0);
  const pBase=vals.reduce((s,v,i)=>s+(v*pw[i]),0)/tpw;
  const crec=[];for(let i=1;i<vals.length;i++){if(vals[i-1]>0)crec.push((vals[i]-vals[i-1])/vals[i-1])}
  const tend=crec.length>0?crec.reduce((s,c)=>s+c,0)/crec.length:0;
  const pAdj=pBase*(1+tend),margen=pBase*0.12;
  const asesPred=agA(raw.filter(r=>parseInt(r.año)===ahora.getFullYear()));
  const totAP=asesPred.reduce((s,a)=>s+a.bruto,0);
  c.innerHTML=`
    <div class="pc">
      <div class="pb">🔮 Predicción · ${MF[mP]} ${aP}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6">
        Basado en historial de <strong style="color:var(--navy)">${MF[mP]}</strong> años <strong style="color:var(--navy)">${anos.join(', ')}</strong>.
        Tendencia interanual: <strong style="color:${tend>=0?'var(--green)':'var(--red)'};">${tend>=0?'+':''}${(tend*100).toFixed(1)}%</strong>
        ${anos.length<2?'<span style="color:var(--orange);font-size:11px"> · ⚠ Poco historial — predicción orientativa</span>':''}
      </div>
      <div class="pg">
        <div class="pi"><div class="pl">Predicción central</div><div class="pv">${fCOP(pAdj)}</div><div class="ps">Prom. ponderado + tendencia</div></div>
        <div class="pi"><div class="pl">Optimista +12%</div><div class="pv" style="color:var(--green)">${fCOP(pAdj+margen)}</div><div class="ps">Escenario alto</div></div>
        <div class="pi"><div class="pl">Conservador -12%</div><div class="pv" style="color:var(--red)">${fCOP(pAdj-margen)}</div><div class="ps">Escenario bajo</div></div>
        <div class="pi"><div class="pl">Tendencia</div><div class="pv" style="color:${tend>=0?'var(--green)':'var(--red)'};">${tend>=0?'▲ +':'▼ '}${(tend*100).toFixed(1)}%</div><div class="ps">Promedio interanual</div></div>
      </div>
    </div>
    <div class="g2">
      <div class="card"><div class="ct">Historial ${MF[mP]} + predicción <span class="ct-line"></span></div><div class="cw h280"><canvas id="cPH"></canvas></div></div>
      <div class="card"><div class="ct">Escenarios <span class="ct-line"></span></div><div class="cw h280"><canvas id="cPS"></canvas></div></div>
    </div>
    <div class="card gf">
      <div class="ct">Predicción por asesor — ${MF[mP]} ${aP} <span class="ct-line"></span></div>
      <div class="tw"><table><thead><tr>
        <th>Asesor</th><th class="num">% año actual</th><th class="num">Meta sugerida</th><th class="num">Optimista</th><th class="num">Conservador</th>
      </tr></thead><tbody>
        ${asesPred.slice(0,12).map((a,i)=>{const part=totAP>0?a.bruto/totAP:0,meta=pAdj*part;const odd=i%2===0?'':'background:rgba(238,241,248,.5)';return`<tr style="${odd}"><td style="font-weight:600">${a.nombre}</td><td class="num"><span class="tag tag-blue">${(part*100).toFixed(1)}%</span></td><td class="num" style="color:var(--navy2);font-weight:700">${fCOP(meta)}</td><td class="num" style="color:var(--green)">${fCOP(meta*1.12)}</td><td class="num" style="color:var(--red)">${fCOP(meta*0.88)}</td></tr>`}).join('')}
      </tbody></table></div>
    </div>`;
  setTimeout(()=>{
    const c1=document.getElementById('cPH');
    if(c1)ch.pH=new Chart(c1,{type:'bar',data:{labels:[...anos.map(String),`${aP} ✦`],datasets:[{data:[...vals,pAdj],backgroundColor:[...anos.map(()=>'rgba(26,58,110,.2)'),CL[0]],borderColor:[...anos.map(()=>CL[0]),CL[0]],borderWidth:2,borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(11,31,74,.92)',bodyColor:'#fff',bodyFont:{size:12,weight:'600'},padding:10,cornerRadius:8,callbacks:{label:ctx=>' '+fCOP(ctx.raw)}}},scales:{y:{ticks:{callback:v=>fM(v),color:'#7A90B8',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:10}},grid:{display:false},border:{display:false}}}}});
    const c2=document.getElementById('cPS');
    if(c2)ch.pS=new Chart(c2,{type:'bar',data:{labels:['Conservador','Central','Optimista'],datasets:[{data:[pAdj-margen,pAdj,pAdj+margen],backgroundColor:['rgba(192,57,43,.2)','rgba(26,58,110,.8)','rgba(10,122,90,.2)'],borderColor:['#C0392B','#1A3A6E','#0A7A5A'],borderWidth:2,borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(11,31,74,.92)',bodyColor:'#fff',bodyFont:{size:12,weight:'600'},padding:10,cornerRadius:8,callbacks:{label:ctx=>' '+fCOP(ctx.raw)}}},scales:{y:{ticks:{callback:v=>fM(v),color:'#7A90B8',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},x:{ticks:{color:'#7A90B8',font:{size:10}},grid:{display:false},border:{display:false}}}}});
  },100);
}

cargar();
setInterval(cargar,30*60*1000);
</script>
